    signature: "HousesResult calcHousesRelocate({   required double natalMc,   required double natalLng,   required double tapLat,   required double tapLng,   String houseSystem = 'placidus', })"
    doc_jp: "natalMc + natalLng (chart fetch時の lng) から LST を逆算し、 任意の (tapLat, tapLng) でハウスを再計算する。  LST 復元戦略: RA(MC) = LST  (子午線の赤経 = LST、定義より) Worker calcMC: MC = atan2(sin(LST), cos(LST)·cos(ε)) 逆算: LST = atan2(sin(MC)·cos(ε), cos(MC)) 同一 UTC 瞬間における経度差: LST_tap = LST_home + (tapLng - natalLng)  この戦略により birthDate/birthTime/tz から UTC を再構築する必要がなく、 IANA TZ や DST 補正の問題を完全に回避できる。"
    name_words_en: ["calc", "houses", "relocate"]
    comment_keywords_jp: ["この戦略により", "fetch時の", "birthDate", "瞬間における経度差", "MC", "同一", "natalLng", "UTC", "DST", "atan", "任意の", "home", "を再構築する必要がなく", "tap", "補正の問題を完全に回避できる", "cos", "calcMC", "tz", "birthTime", "定義より", "RA", "sin", "TZ", "natalMc", "子午線の赤経", "LST", "tapLat", "tapLng", "lng", "を逆算し", "chart", "Worker", "IANA", "でハウスを再計算する", "逆算", "復元戦略", "から"]
