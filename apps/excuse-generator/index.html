</head>
<body>
    <div class="container">
        <a href="../../" class="home-btn" style="display:inline-block;margin:8px 0 0;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#999;text-decoration:none;font-size:0.8rem;transition:all 0.2s;" onmouseover="this.style.color='#56ccf2';this.style.borderColor='#56ccf2'" onmouseout="this.style.color='#999';this.style.borderColor='rgba(255,255,255,0.15)'">< ツール一覧に戻る</a>
        <header>
            <h1>🤥 AI言い訳ジェネレーター</h1>
            <p class="subtitle">どんなピンチもAIが救う。天才的な言い訳を瞬時に生成。</p>
        </header>

        <main>
            <section class="input-section">
                <h2>シチュエーションを選んでください</h2>
                <div class="situation-grid" id="situationGrid">
                    <button class="situation-btn" data-situation="遅刻">😴 遅刻</button>
                    <button class="situation-btn" data-situation="欠席">🏠 欠席</button>
                    <button class="situation-btn" data-situation="宿題忘れ">📚 宿題忘れ</button>
                    <button class="situation-btn" data-situation="締切遅れ">⏰ 締切遅れ</button>
                    <button class="situation-btn" data-situation="ドタキャン">💨 ドタキャン</button>
                    <button class="situation-btn" data-situation="既読スルー">📱 既読スルー</button>
                    <button class="situation-btn" data-situation="寝坊">😪 寝坊</button>
                    <button class="situation-btn" data-situation="サボり">🎮 サボり</button>
                    <button class="situation-btn" data-situation="忘れ物">🎒 忘れ物</button>
                    <button class="situation-btn" data-situation="遅刻(デート)">💕 デート遅刻</button>
                    <button class="situation-btn" data-situation="飲み会断り">🍺 飲み会断り</button>
                    <button class="situation-btn" data-situation="連絡忘れ">📞 連絡忘れ</button>
                </div>

                <div class="level-section">
                    <h2>言い訳レベル</h2>
                    <div class="level-buttons" id="levelButtons">
                        <button class="level-btn active" data-level="normal">😊 普通</button>
                        <button class="level-btn" data-level="creative">🎨 クリエイティブ</button>
                        <button class="level-btn" data-level="genius">🧠 天才</button>
                        <button class="level-btn" data-level="chaos">🔥 カオス</button>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn" disabled>
                    言い訳を生成する 🎲
                </button>
            </section>

            <section class="result-section" id="resultSection" style="display: none;">
                <div class="result-card" id="resultCard">
                    <div class="result-header">
                        <span class="result-situation" id="resultSituation"></span>
                        <span class="result-level" id="resultLevel"></span>
                    </div>
                    <div class="excuse-text" id="excuseText"></div>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-label">説得力</span>
                            <div class="stat-bar">
                                <div class="stat-fill" id="convincingBar"></div>
                            </div>
                            <span class="stat-value" id="convincingValue"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">創造性</span>
                            <div class="stat-bar">
                                <div class="stat-fill creativity" id="creativityBar"></div>
                            </div>
                            <span class="stat-value" id="creativityValue"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">バレにくさ</span>
                            <div class="stat-bar">
                                <div class="stat-fill stealth" id="stealthBar"></div>
                            </div>
                            <span class="stat-value" id="stealthValue"></span>
                        </div>
                    </div>
                    <div class="risk-badge" id="riskBadge"></div>
                </div>

                <div class="action-buttons share-buttons">
                    <button class="action-btn btn-x" id="shareXBtn">𝕏 でシェア</button>
                    <button class="action-btn btn-line" id="shareLINEBtn">LINE で送る</button>
                    <button class="action-btn btn-copy" id="copyBtn">📋 コピー</button>
                </div>
                <div class="action-buttons">
                    <button class="action-btn btn-retry" id="retryBtn">🎲 もう一回</button>
                </div>
            </section>

            <section class="history-section" id="historySection" style="display: none;">
                <h2>📜 言い訳履歴</h2>
                <div id="historyList"></div>
            </section>
        </main>

        <footer>
            <p>※ このツールはジョークです。実際の言い訳に使って起きた問題には責任を負いません 😇</p>
            <p class="copyright">© 2026 AI言い訳ジェネレーター</p>

            </div>
        </footer>
    </div>

    <div class="toast" id="toast">コピーしました！</div>

    <script src="app.js"></script>
</body>
</html>
