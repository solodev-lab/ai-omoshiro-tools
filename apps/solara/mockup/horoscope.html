<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solara - Horoscope Chart</title>
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
<script src="shared/nav.js"></script>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0A0A14;
  color: #E8E0D0;
  font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 20px 90px;
}

/* -- BOTTOM NAV -- */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
  background: rgba(10, 10, 20, 0.95);
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 20px 10px; z-index: 200;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  opacity: 0.4; cursor: pointer; transition: opacity 0.3s; background: none; border: none; color: #E8E0D0;
}
.nav-item.active { opacity: 1; }
.nav-item.active .nav-label { color: #C9A84C; }
.nav-icon { font-size: 20px; }
.nav-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }

h1 { font-size: 24px; color: #F6BD60; letter-spacing: 4px; margin-bottom: 8px; }

/* ============================================================
   ANIMATIONS (CSS opacity only - no blur/will-change)
   ============================================================ */
@keyframes pattern-pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.7; }
}
.anim-pattern { animation: pattern-pulse 3s ease-in-out infinite; }

/* ============================================================
   LAYOUT
   ============================================================ */
.tab-nav {
  display: flex; gap: 4px; margin-bottom: 20px;
  background: rgba(255,255,255,0.03); border-radius: 12px; padding: 4px;
}
.tab-btn {
  padding: 10px 20px; border: none; background: transparent;
  color: #888; font-size: 13px; cursor: pointer;
  border-radius: 8px; transition: all 0.3s; letter-spacing: 1px;
}
.tab-btn.active { background: rgba(246,189,96,0.15); color: #F6BD60; }
.tab-btn:hover:not(.active) { color: #bbb; }

.main-layout { display: flex; gap: 20px; align-items: flex-start; max-width: 1400px; width: 100%; }
.left-column { position: sticky; top: 10px; flex-shrink: 0; max-width: 600px; }
.right-column { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }

.chart-container { position: relative; }
.chart-watermark {
  position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%);
  font-size: 14px; font-weight: 700; letter-spacing: 4px;
  color: rgba(246,189,96,0.18);
  pointer-events: none; z-index: 2; user-select: none;
  white-space: nowrap;
}
.chart-container svg { position: relative; z-index: 1; width: 100%; height: auto; }
.chart-legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px; font-size: 11px; color: #888; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ============================================================
   PANEL CARDS
   ============================================================ */
.panel-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px; padding: 20px;
}
.panel-card h3 { font-size: 13px; color: #F6BD60; letter-spacing: 2px; margin-bottom: 12px; }

/* ============================================================
   FORMS
   ============================================================ */
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; letter-spacing: 1px; }
.form-group input, .form-group select {
  width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  color: #E8E0D0; font-size: 13px; outline: none; transition: border-color 0.3s;
}
.form-group input:focus, .form-group select:focus { border-color: rgba(246,189,96,0.4); }
.form-row { display: flex; gap: 8px; }
.form-row .form-group { flex: 1; }

.vp-hint { font-size: 10px; color: #888; margin-top: 4px; line-height: 1.4; }

.btn-generate {
  width: 100%; padding: 10px;
  background: linear-gradient(135deg, #F6BD60, #E8A840);
  border: none; border-radius: 10px; color: #0A0A14;
  font-size: 13px; font-weight: 600; cursor: pointer;
  letter-spacing: 1px; transition: opacity 0.3s; margin-top: 4px;
}
.btn-generate:hover { opacity: 0.85; }

/* ============================================================
   PLANET TABLE
   ============================================================ */
.planet-row { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.planet-row:last-child { border-bottom: none; }
.planet-glyph { width: 24px; font-size: 16px; text-align: center; }
.planet-name  { width: 60px; color: #aaa; font-size: 12px; }
.planet-pos   { flex: 1; color: #E8E0D0; font-family: 'Courier New', monospace; font-size: 12px; }

/* ============================================================
   FILTER UI
   ============================================================ */
.filter-section { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.filter-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 8px; }
.filter-section-title {
  font-size: 10px; color: #888; letter-spacing: 1.5px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.filter-label {
  background: rgba(255,255,255,0.08); color: #aaa;
  padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 600;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.filter-chip {
  padding: 4px 10px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03); color: #888; font-size: 11px;
  cursor: pointer; border-radius: 6px; transition: all 0.2s; user-select: none;
}
.filter-chip:hover { border-color: rgba(255,255,255,0.25); color: #ccc; }
.filter-chip.active { border-color: var(--chip-color, #F6BD60); color: var(--chip-color, #F6BD60); background: rgba(246,189,96,0.08); }
.filter-chip.exclusive { border-style: dashed; }
.filter-chip.exclusive.active { border-style: solid; }

.filter-reset-btn {
  padding: 4px 12px; border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: #666; font-size: 10px;
  cursor: pointer; border-radius: 6px; transition: all 0.2s; margin-left: auto;
}
.filter-reset-btn:hover { color: #F6BD60; border-color: rgba(246,189,96,0.3); }

/* ============================================================
   PREDICTIONS
   ============================================================ */
.prediction-panel { margin-top: 0; }
.prediction-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.03); }
.prediction-item:last-child { border-bottom: none; }
.prediction-time { color: #F6BD60; font-size: 10px; margin-left: auto; white-space: nowrap; }
.prediction-type { font-size: 10px; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }

/* Collapsible analysis container */
.analysis-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; }
.analysis-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; cursor: pointer; user-select: none; }
.analysis-header:hover { background: rgba(255,255,255,0.03); }
.analysis-header h3 { font-size: 13px; color: #F6BD60; letter-spacing: 2px; margin: 0; }
.analysis-toggle { color: #F6BD60; font-size: 14px; transition: transform 0.3s ease; }
.analysis-toggle.collapsed { transform: rotate(-90deg); }
.analysis-tabs { display: flex; gap: 0; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.analysis-tab { flex: 1; padding: 8px 0; text-align: center; font-size: 11px; letter-spacing: 1px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.analysis-tab:hover { color: #ccc; }
.analysis-tab.active { color: #F6BD60; border-bottom-color: #F6BD60; }
.analysis-body { padding: 16px 20px; transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease; max-height: 2000px; opacity: 1; overflow: hidden; }
.analysis-body.collapsed { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; }
.analysis-body .panel-card { background: none; border: none; border-radius: 0; padding: 0; }
.analysis-body .panel-card h3 { display: none; }

/* ============================================================
   ASPECT LIST
   ============================================================ */
.aspect-lists-row { display: flex; gap: 15px; margin-top: 0; }

/* ============================================================
   FORTUNE READING CARDS
   ============================================================ */
.fortune-reading { margin-bottom: 16px; }
.fortune-reading h3 { font-size: 13px; color: #F6BD60; letter-spacing: 2px; margin-bottom: 12px; }
.fortune-cards-wrap { position: relative; overflow: hidden; border-radius: 16px; }
.fortune-cards-track {
  display: flex; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
.fortune-card {
  min-width: 100%; padding: 20px; border-radius: 16px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
}
.fortune-card-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.fortune-card-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.fortune-card-title { font-size: 15px; font-weight: 700; }
.fortune-card-score {
  margin-left: auto; font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #F6BD60, #F9D976);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.fortune-card-body {
  font-size: 13px; line-height: 1.8; color: rgba(232,224,208,0.85);
}
.fortune-card-direction {
  margin-top: 12px; padding: 10px 14px; border-radius: 12px;
  background: rgba(249,217,118,0.06); border: 1px solid rgba(249,217,118,0.15);
  font-size: 12px; color: #F6BD60;
}
.fortune-card-direction strong { font-weight: 700; }
.fortune-dots {
  display: flex; justify-content: center; gap: 6px; margin-top: 12px;
}
.fortune-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.15); cursor: pointer; transition: all 0.3s;
}
.fortune-dot.active {
  background: #F6BD60; box-shadow: 0 0 8px rgba(246,189,96,0.5);
  width: 20px; border-radius: 4px;
}
.fortune-nav-row {
  display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
}
.fortune-nav-btn {
  background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
  padding: 6px 14px; font-size: 11px; color: #ACACAC; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.fortune-nav-btn:hover { border-color: rgba(246,189,96,0.4); color: #F6BD60; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
.desktop-only { }
.mobile-bottom-sheet { display: none; }
/* モバイルメニュー: デスクトップでは非表示 */
.chart-menu-btn { display: none; }
.chart-menu-panel { display: none; }

@media (max-width: 900px) {
  html { overflow: hidden; }
  body { padding: 10px 8px 0; overflow: hidden; }
  h1 { font-size: 18px; margin-bottom: 4px; }
  .subtitle { font-size: 10px; margin-bottom: 12px; }
  .main-layout { flex-direction: column; align-items: center; }
  .left-column { position: relative; top: auto; width: 100%; max-width: 600px; }
  .right-column { display: none !important; }
  .chart-container { display: flex; flex-direction: column; align-items: center; position: relative; }
  .chart-container svg { width: 100%; max-width: 600px; height: auto; }
  .tab-nav { display: none !important; }
  .desktop-only { display: none !important; }

  /* Mobile chart menu button */
  .chart-menu-btn {
    display: flex; position: fixed; top: 12px; right: 12px; z-index: 300;
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(12,12,26,0.92); border: 1px solid rgba(246,189,96,0.3);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 4px; cursor: pointer;
  }
  .chart-menu-bar { width: 18px; height: 2px; border-radius: 1px; background: #F6BD60; }
  .chart-menu-panel {
    display: none; position: fixed; top: 58px; right: 12px; z-index: 299;
    background: rgba(12,12,26,0.97); border: 1px solid rgba(246,189,96,0.2);
    border-radius: 14px; padding: 8px; min-width: 150px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .chart-menu-panel.open { display: block; }
  .chart-menu-item {
    width: 100%; padding: 10px 14px; background: none; border: none;
    color: #ACACAC; font-size: 13px; text-align: left; cursor: pointer;
    border-radius: 8px; transition: background 0.2s;
  }
  .chart-menu-item:hover { background: rgba(246,189,96,0.08); }
  .chart-menu-item.active { color: #F6BD60; background: rgba(246,189,96,0.12); }
  body { padding-bottom: 380px; }

  /* Bottom Sheet mini label */
  .bs-mini-label {
    display: none;
    text-align: center;
    padding: 2px 16px 10px;
    font-size: 11px;
    color: #F6BD60;
    letter-spacing: 1.5px;
    opacity: 0.9;
    cursor: pointer;
  }
  .bs-mini-label .bs-mini-chevron {
    display: inline-block;
    font-size: 9px;
    margin-right: 6px;
    opacity: 0.7;
    vertical-align: middle;
  }

  /* Bottom Sheet */
  .mobile-bottom-sheet {
    display: block;
    position: fixed; left: 0; right: 0; bottom: 70px;
    z-index: 100;
    background: rgba(12,12,22,0.97);
    border-top: 1px solid rgba(246,189,96,0.3);
    border-radius: 16px 16px 0 0;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    max-height: 85vh;
    touch-action: none;
  }
  .bs-drag-handle {
    display: flex; justify-content: center; align-items: center;
    padding: 10px 0 6px; cursor: grab;
  }
  .bs-drag-handle::after {
    content: ''; width: 36px; height: 4px;
    background: rgba(246,189,96,0.4); border-radius: 2px;
  }
  .bs-tabs {
    display: flex; gap: 0; padding: 0 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .bs-tab {
    flex: 1; padding: 8px 4px; text-align: center;
    font-size: 11px; color: #777; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s; letter-spacing: 0.5px;
    background: none; border-left: none; border-right: none; border-top: none;
  }
  .bs-tab.active { color: #F6BD60; border-bottom-color: #F6BD60; }
  .bs-tab.hidden-tab { display: none; }
  .bs-body {
    overflow-y: auto; padding: 12px 14px 24px;
    -webkit-overflow-scrolling: touch;
  }
  .bs-body .form-group { margin-bottom: 10px; }
  .bs-body .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; letter-spacing: 1px; }
  .bs-body .form-group input,
  .bs-body .form-group select {
    width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    color: #E8E0D0; font-size: 13px; outline: none;
  }
  .bs-body .btn-generate {
    width: 100%; padding: 10px; border: none; border-radius: 10px;
    color: #0A0A14; font-size: 13px; font-weight: 600; cursor: pointer;
    margin-top: 6px;
  }
  .bs-body h3 { font-size: 12px; color: #F6BD60; margin-bottom: 10px; letter-spacing: 1px; }
  .bs-section { display: none; }
  .bs-section.active { display: block; }
}
</style>
</head>
<body>

<!-- Mobile Chart Menu Button (モバイルのみ表示) -->
<div class="chart-menu-btn" id="chartMenuBtn" onclick="toggleChartMenu()">
  <div class="chart-menu-bar"></div>
  <div class="chart-menu-bar"></div>
  <div class="chart-menu-bar"></div>
</div>
<div class="chart-menu-panel" id="chartMenuPanel">
  <button class="chart-menu-item active" id="cmItem0" onclick="setChartModeMenu('single')">1重 NATAL</button>
  <button class="chart-menu-item" id="cmItem1" onclick="setChartModeMenu('nt')">2重 N+T</button>
  <button class="chart-menu-item" id="cmItem2" onclick="setChartModeMenu('np')">2重 N+P</button>
  <button class="chart-menu-item" id="cmItem3" onclick="setChartModeMenu('astrology')">✦ 星読み</button>
</div>

<!-- Chart Mode Tabs: 1重/2重N+T/2重N+P/今日 -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="setChartMode('single')">1重 NATAL</button>
  <button class="tab-btn" onclick="setChartMode('nt')">2重 N+T</button>
  <button class="tab-btn" onclick="setChartMode('np')">2重 N+P</button>
  <button class="tab-btn" onclick="setChartMode('astrology')" style="position:relative;z-index:200">✦ 星読み<br><span style="font-size:9px;letter-spacing:1px;opacity:0.7">Astrology</span></button>
</div>

<!-- Astrology View: 占い結果を縦に全表示 -->
<div id="astrologyView" style="display:none;padding:16px;overflow-y:auto;height:calc(100vh - 120px);">
  <div id="astrologyCardsAll"></div>
</div>

<div id="noProfileBanner" style="display:none; background:rgba(249,217,118,0.08); border:1px solid rgba(249,217,118,0.25); border-radius:12px; padding:14px 18px; margin-bottom:16px; max-width:1400px; width:100%; text-align:center;">
  <span style="font-size:13px; color:#F6BD60;">✦ SANCTUARYでプロフィールを設定すると、あなた専用のホロスコープが表示されます</span><br>
  <a href="sanctuary.html" style="color:#F9D976; font-size:12px; text-decoration:underline; margin-top:4px; display:inline-block;">設定する →</a>
</div>

<div class="main-layout">
  <!-- Left: Chart -->
  <div class="left-column">
    <div class="chart-container">
      <div class="chart-watermark">SOLARA</div>
      <svg id="horoscopeChart" width="600" height="600" viewBox="0 0 600 600"></svg>
      <div class="chart-legend" id="chartLegend"></div>
    </div>
  </div>

  <!-- Right: Panels -->
  <div class="right-column">

    <!-- Birth Data -->
    <div class="panel-card" id="birthPanel">
      <h3 class="desktop-only">&#9881; BIRTH DATA</h3>
      <div class="form-group">
        <label>氏名 NAME</label>
        <input type="text" id="inputName" placeholder="氏名を入力">
      </div>
      <div class="form-row">
        <div class="form-group"><label>生年月日 DATE</label><input type="date" id="inputDate"></div>
        <div class="form-group"><label>出生時刻 TIME</label><input type="time" id="inputTime" step="60"></div>
      </div>
      <div class="form-group">
        <label>出生地 BIRTHPLACE</label>
        <select id="inputPlaceSelect" onchange="onBirthPlaceChange()">
          <option value="manual" selected>手動入力</option>
        </select>
        <div id="birthVpHint" class="vp-hint" style="display:none">💡 Map画面で場所を保存すると選択できます</div>
        <input type="text" id="inputPlace" placeholder="例: 岐阜県岐阜市" style="margin-top:6px">
      </div>
      <div class="form-row" id="birthCustomLatLng">
        <div class="form-group"><label>緯度 LAT</label><input type="number" id="inputLat" step="0.0001" placeholder="35.4233"></div>
        <div class="form-group"><label>経度 LNG</label><input type="number" id="inputLng" step="0.0001" placeholder="136.7607"></div>
      </div>
      <button class="btn-generate" onclick="generateFromInput()">ホロスコープ生成</button>
    </div>

    <!-- Transit/Progressed Data -->
    <div class="panel-card" id="transitPanel" style="display:none">
      <h3 class="desktop-only" id="transitPanelTitle">&#9790; TRANSIT DATA</h3>
      <div class="form-row">
        <div class="form-group"><label>日付 DATE</label><input type="date" id="transitDate"></div>
        <div class="form-group"><label>時刻 TIME</label><input type="time" id="transitTime" step="60"></div>
      </div>
      <div class="form-group">
        <label>場所 LOCATION</label>
        <select id="transitLocation" onchange="onTransitLocationChange()">
          <option value="manual">手動入力</option>
        </select>
        <div id="transitVpHint" class="vp-hint" style="display:none">💡 Map画面で場所を保存すると選択できます</div>
      </div>
      <div class="form-row" id="transitCustomLatLng">
        <div class="form-group"><label>緯度 LAT</label><input type="number" id="transitLat" step="0.0001"></div>
        <div class="form-group"><label>経度 LNG</label><input type="number" id="transitLng" step="0.0001"></div>
      </div>
      <button class="btn-generate" id="transitBtn" onclick="renderChart()" style="background:linear-gradient(135deg,#6BB5FF,#4A90D9)">トランジット更新</button>
    </div>


    <!-- Planet Positions -->
    <div class="panel-card" id="planetsPanel">
      <h3 class="desktop-only">&#9737; PLANET POSITIONS</h3>
      <div id="planetTable"></div>
    </div>

    <!-- Analysis: Aspect Filter + Predictions (collapsible) -->
    <div class="analysis-container" id="analysisContainer">
      <div class="analysis-header" onclick="toggleAnalysis()">
        <h3>&#9881; ANALYSIS</h3>
        <span class="analysis-toggle" id="analysisToggle">&#9660;</span>
      </div>
      <div class="analysis-body" id="analysisBody">
        <div class="panel-card" id="aspectFilterPanel">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span style="font-size:11px;color:#888;letter-spacing:1.5px">ASPECT FILTER</span>
            <button class="filter-reset-btn" onclick="resetFilters()">RESET</button>
          </div>

          <!-- A: Aspect Quality -->
          <div class="filter-section">
            <div class="filter-section-title"><span class="filter-label">A</span> アスペクト性質</div>

// ============================================================
//  MATH UTILITIES
// ============================================================
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function normalize(deg) { deg = deg % 360; return deg < 0 ? deg + 360 : deg; }
function angleDiff(a, b) { var d = Math.abs(a - b); return d > 180 ? 360 - d : d; }

// ============================================================
//  ASTRONOMICAL CALCULATIONS (astronomy-engine, geocentric)
// ============================================================
function makeUTCDate(dateStr, timeStr, tzHours) {
  var parts = dateStr.split('-');
  var y = parseInt(parts[0]), m = parseInt(parts[1]), d = parseInt(parts[2]);
  var tp = timeStr.split(':');
  var h = parseInt(tp[0]), min = parseInt(tp[1]);
  return new Date(Date.UTC(y, m - 1, d, h - tzHours, min, 0, 0));
}

function getEclipticLongitude(body, date) {
  if (body === Astronomy.Body.Moon) return Astronomy.EclipticGeoMoon(date).lon;
  if (body === Astronomy.Body.Sun)  return Astronomy.SunPosition(date).elon;
  var geo = Astronomy.GeoVector(body, date, true);
  return Astronomy.Ecliptic(geo).elon;
}

function calcAllPlanets(date) {
  var result = {};
  for (var i = 0; i < BODIES.length; i++) {
    result[i] = getEclipticLongitude(BODIES[i], date);
  }
  return result;
}

function calcAscendant(date, lat, lng) {
  var gmstHours = Astronomy.SiderealTime(date);
  var lstDeg = normalize(gmstHours * 15 + lng);
  var lstRad = toRad(lstDeg);
  var jd = (date.getTime() / 86400000) + 2440587.5;
  var T = (jd - 2451545.0) / 36525.0;
  var eps = 23.4393 - 0.013 * T;
  var epsRad = toRad(eps);
  var latRad = toRad(lat);
  var y = -Math.cos(lstRad);
  var x = Math.sin(epsRad) * Math.tan(latRad) + Math.cos(epsRad) * Math.sin(lstRad);
  return normalize(toDeg(Math.atan2(y, x)) + 180);
}

function calcMC(date, lng) {
  var gmstHours = Astronomy.SiderealTime(date);
  var lstDeg = normalize(gmstHours * 15 + lng);
  var lstRad = toRad(lstDeg);
  var jd = (date.getTime() / 86400000) + 2440587.5;
  var T = (jd - 2451545.0) / 36525.0;
  var eps = 23.4393 - 0.013 * T;
  var epsRad = toRad(eps);
  return normalize(toDeg(Math.atan2(Math.sin(lstRad), Math.cos(lstRad) * Math.cos(epsRad))));
}

// Placidus house cusp calculation (iterative semi-arc trisection)
function calcHousesPlacidus(mc, asc, lat, obliquity) {
  var epsR = toRad(obliquity);
  var cosEps = Math.cos(epsR), sinEps = Math.sin(epsR);
  var tanLat = Math.tan(toRad(lat));
  var houses = new Array(12);
  houses[0] = asc;
  houses[9] = mc;
  houses[6] = normalize(asc + 180);
  houses[3] = normalize(mc + 180);

  // RAMC: right ascension of MC
  var mcR = toRad(mc);
  var ramc = normalize(toDeg(Math.atan2(Math.sin(mcR) * cosEps, Math.cos(mcR))));

  // Iterative Placidus cusp calculation
  // Hour angle H = RAMC - RA. Each cusp is defined by its position in the diurnal circle:
  //   11H: H = -(DSA/3)  => RA = RAMC + DSA/3     (DSA = 90+AD)
  //   12H: H = -(2DSA/3) => RA = RAMC + 2·DSA/3
  //   2H:  H = 180+2NSA/3 => RA = RAMC - 240 + 2AD/3  (NSA = 90-AD)
  //   3H:  H = 180+NSA/3  => RA = RAMC - 210 + AD/3
  function placidusCusp(house) {
    var lon = (house <= 12) ? normalize(mc + (house - 10) * 30) : normalize(asc + (house - 1) * 30);
    for (var iter = 0; iter < 50; iter++) {
      var sinDecl = Math.sin(toRad(lon)) * sinEps;
      sinDecl = Math.max(-1, Math.min(1, sinDecl));
      var decl = Math.asin(sinDecl);
      var adArg = Math.max(-1, Math.min(1, tanLat * Math.tan(decl)));
      var AD = toDeg(Math.asin(adArg));
      var targetRA;
      if (house === 11) targetRA = ramc + (90 + AD) / 3;
      else if (house === 12) targetRA = ramc + 2 * (90 + AD) / 3;
      else if (house === 2) targetRA = ramc - 240 + 2 * AD / 3;
      else targetRA = ramc - 210 + AD / 3; // house 3
      var raR = toRad(targetRA);
      var newLon = normalize(toDeg(Math.atan2(Math.sin(raR), Math.cos(raR) * cosEps)));
      if (Math.abs(newLon - lon) < 0.001 || Math.abs(newLon - lon) > 359.999) break;
      lon = newLon;
    }
    return lon;
  }

  houses[10] = placidusCusp(11);
  houses[11] = placidusCusp(12);
  houses[1] = placidusCusp(2);
  houses[2] = placidusCusp(3);
  // Opposite cusps
  houses[4] = normalize(houses[10] + 180);
  houses[5] = normalize(houses[11] + 180);
  houses[7] = normalize(houses[1] + 180);
  houses[8] = normalize(houses[2] + 180);
  return houses;
}

// Whole Sign house system (ASC sign = 1st house, each sign = 1 house)
function calcHousesWholeSigns(asc) {
  var signStart = Math.floor(asc / 30) * 30;
  var houses = [];
  for (var i = 0; i < 12; i++) houses.push(normalize(signStart + i * 30));
  return houses;
}

// Equal House (legacy fallback)
function calcHousesEqual(asc) {
  var houses = [];
  for (var i = 0; i < 12; i++) houses.push(normalize(asc + i * 30));
  return houses;
}

// Main dispatcher - reads localStorage setting
function calcHouses(mc, asc, lat, obliquity) {
  var sys = localStorage.getItem('solara_house_system') || 'placidus';
  if (sys === 'whole_sign') return calcHousesWholeSigns(asc);
  // Placidus fails at extreme latitudes
  if (Math.abs(lat) > 66) return calcHousesEqual(asc);
  return calcHousesPlacidus(mc, asc, lat, obliquity);
}

function calcProgressedDate(birthDate, currentDate) {
  var msPerDay = 86400000;
  var daysLived = (currentDate.getTime() - birthDate.getTime()) / msPerDay;
  var progDays = daysLived / 365.25;
  return new Date(birthDate.getTime() + progDays * msPerDay);
}

// ============================================================
//  ASPECT DETECTION
// ============================================================
function collectAspects(p1, p2, isCross, label) {
  var found = [];
  for (var i = 0; i < 10; i++) {
    var jStart = isCross ? 0 : i + 1;
    for (var j = jStart; j < 10; j++) {
      var diff = angleDiff(p1[i], p2[j]);
      for (var k = 0; k < ASPECT_TYPES.length; k++) {
        var asp = ASPECT_TYPES[k];
        if (Math.abs(diff - asp.angle) <= asp.orb) {
          found.push({
            p1: i, p2: j, type: asp, diff: diff,
            label: label,
            lon1: p1[i], lon2: p2[j], visible: true
          });
        }
      }
    }
  }
  return found;
}

// ============================================================
//  PATTERN DETECTION (GT, TSQ, Yod) - 3deg orb
// ============================================================
function detectPatterns(aspects, natal, secondary) {
  var patterns = { grandtrine: [], tsquare: [], yod: [] };
  var pool = [];
  for (var i = 0; i < 10; i++) pool.push({ lon: natal[i], source: 'N', idx: i });
  if (secondary) {
    var src = (chartMode === 'nt') ? 'T' : 'P';
    for (var i = 0; i < 10; i++) pool.push({ lon: secondary[i], source: src, idx: i });
  }

  function countNatal(arr) { var c = 0; for (var x = 0; x < arr.length; x++) if (arr[x].source === 'N') c++; return c; }
  function hasPersonal(arr) { for (var x = 0; x < arr.length; x++) { if (PLANET_GROUPS.personal.indexOf(arr[x].idx) >= 0) return true; } return false; }
  function isDuplicate(list, trio) {
    var key = trio.map(function(p) { return p.source + p.idx; }).sort().join(',');
    for (var i = 0; i < list.length; i++) {
      var eKey = list[i].planets.map(function(p) { return p.source + p.idx; }).sort().join(',');
      if (eKey === key) return true;
    }
    return false;
  }

  var len = pool.length;

  // Grand Trine: 120deg x3
  for (var i = 0; i < len; i++) {
    for (var j = i + 1; j < len; j++) {
      if (Math.abs(angleDiff(pool[i].lon, pool[j].lon) - 120) > 3) continue;
      for (var k = j + 1; k < len; k++) {
        if (Math.abs(angleDiff(pool[i].lon, pool[k].lon) - 120) > 3) continue;
        if (Math.abs(angleDiff(pool[j].lon, pool[k].lon) - 120) > 3) continue;
        var trio = [pool[i], pool[j], pool[k]];
        if (countNatal(trio) < 2 || !hasPersonal(trio) || isDuplicate(patterns.grandtrine, trio)) continue;
        patterns.grandtrine.push({ planets: trio });
      }
    }
  }

  // T-Square: 180deg + 2x90deg
  for (var i = 0; i < len; i++) {
    for (var j = i + 1; j < len; j++) {
      if (Math.abs(angleDiff(pool[i].lon, pool[j].lon) - 180) > 3) continue;
      for (var k = 0; k < len; k++) {
        if (k === i || k === j) continue;
        if (Math.abs(angleDiff(pool[i].lon, pool[k].lon) - 90) > 2.5) continue;
        if (Math.abs(angleDiff(pool[j].lon, pool[k].lon) - 90) > 2.5) continue;
        var trio = [pool[i], pool[j], pool[k]];
        if (countNatal(trio) < 2 || !hasPersonal(trio) || isDuplicate(patterns.tsquare, trio)) continue;
        patterns.tsquare.push({ planets: trio, apex: pool[k] });
      }
    }
  }

  // Yod: 60deg + 2x150deg
  for (var i = 0; i < len; i++) {
    for (var j = i + 1; j < len; j++) {
      if (Math.abs(angleDiff(pool[i].lon, pool[j].lon) - 60) > 2.5) continue;
      for (var k = 0; k < len; k++) {
        if (k === i || k === j) continue;
        if (Math.abs(angleDiff(pool[i].lon, pool[k].lon) - 150) > 1.2) continue;
        if (Math.abs(angleDiff(pool[j].lon, pool[k].lon) - 150) > 1.2) continue;
        var trio = [pool[i], pool[j], pool[k]];
        if (countNatal(trio) < 2 || !hasPersonal(trio) || isDuplicate(patterns.yod, trio)) continue;
        patterns.yod.push({ planets: trio, apex: pool[k] });
      }
    }
  }

  return patterns;
}

// ============================================================
//  60-DAY PREDICTION (computed once on generate)
// ============================================================
function predictPatternCompletions(natal, birthDate, daysAhead) {
  daysAhead = daysAhead || 60;
  var predictions = [];
  var now = new Date();

  function scanTransit(targetDeg, patternType, ni, nj) {
    for (var body = 0; body < 10; body++) {
      var prevLon = null;
      for (var day = 0; day <= daysAhead; day++) {
        var checkDate = new Date(now.getTime() + day * 86400000);
        var lon = getEclipticLongitude(BODIES[body], checkDate);
        var dist = angleDiff(lon, targetDeg);
        if (prevLon !== null) {
          var prevDist = angleDiff(prevLon, targetDeg);
          if (dist <= 3 && prevDist > dist) {
            var hoursFromNow = (day - 1) * 24 + (prevDist / (prevDist + dist)) * 24;
            if (hoursFromNow < 0) hoursFromNow = 0;
            predictions.push({
              type: patternType, natalPair: [ni, nj], completeDegree: targetDeg,
              transitBody: body,
              dateEstimate: new Date(now.getTime() + hoursFromNow * 3600000),
              hoursUntil: hoursFromNow
            });
            break;
          }
        }
        prevLon = lon;
      }
    }
  }

  for (var i = 0; i < 10; i++) {
    for (var j = i + 1; j < 10; j++) {
      if (PLANET_GROUPS.personal.indexOf(i) < 0 && PLANET_GROUPS.personal.indexOf(j) < 0) continue;
      var dij = angleDiff(natal[i], natal[j]);

      if (Math.abs(dij - 120) <= 3) {
        var t1 = normalize(natal[i] + 120);
        var t2 = normalize(natal[i] - 120);
        if (Math.abs(angleDiff(t1, natal[j]) - 120) <= 5) scanTransit(t1, 'grandtrine', i, j);
        if (Math.abs(angleDiff(t2, natal[j]) - 120) <= 5) scanTransit(t2, 'grandtrine', i, j);
      }
      if (Math.abs(dij - 180) <= 3) {
        var mid = normalize((natal[i] + natal[j]) / 2);
        scanTransit(normalize(mid), 'tsquare', i, j);
        scanTransit(normalize(mid + 180), 'tsquare', i, j);
      }
      if (Math.abs(dij - 60) <= 2.5) {
        var t1 = normalize(natal[i] + 150);
        var t2 = normalize(natal[i] - 150);
        if (Math.abs(angleDiff(t1, natal[j]) - 150) <= 2.5) scanTransit(t1, 'yod', i, j);
        if (Math.abs(angleDiff(t2, natal[j]) - 150) <= 2.5) scanTransit(t2, 'yod', i, j);
      }
    }
  }

  predictions.sort(function(a, b) { return a.hoursUntil - b.hoursUntil; });
  return predictions;
}

// ============================================================
//  FILTER LOGIC
// ============================================================
function getPlanetGroup(idx) {
  if (idx >= 10) return 'angle'; // ASC/MC/DSC/IC - always visible
  if (PLANET_GROUPS.personal.indexOf(idx) >= 0) return 'personal';
  if (PLANET_GROUPS.social.indexOf(idx) >= 0) return 'social';
  return 'generational';
}

function aspectPassesFilter(a) {
  if (!activeFilters.quality[a.type.quality]) return false;
  if (activeFilters.fortune) {
    var fp = FORTUNE_PLANETS[activeFilters.fortune];
    if (fp.indexOf(a.p1) < 0 && fp.indexOf(a.p2) < 0) return false;
  }
  var g1 = getPlanetGroup(a.p1), g2 = getPlanetGroup(a.p2);
  // Angles always pass planet group filter; check the other side
  if (g1 === 'angle' || g2 === 'angle') {
    var other = (g1 === 'angle') ? g2 : g1;
    if (other !== 'angle' && !activeFilters.pgroup[other]) return false;
  } else if (!activeFilters.pgroup[g1] && !activeFilters.pgroup[g2]) return false;
  return true;
}

// ============================================================
//  SVG RENDERING - PATTERN POLYGONS (no ghost, CSS opacity only)
// ============================================================
function buildPatternPolygons(patterns, natal, asc, cx, cy, r) {
  var h = '';
  var types = ['grandtrine', 'tsquare', 'yod'];

  for (var t = 0; t < types.length; t++) {
    var type = types[t];
    var style = PATTERN_STYLES[type];
    var list = patterns[type] || [];
    for (var p = 0; p < list.length; p++) {
      var planets = list[p].planets;
      var points = [];
      var cxP = 0, cyP = 0;
      for (var i = 0; i < planets.length; i++) {
        var angle = toRad(asc - planets[i].lon + 180);
        var x = cx + r * Math.cos(angle);
        var y = cy + r * Math.sin(angle);
        points.push(x.toFixed(1) + ',' + y.toFixed(1));
        cxP += cx + (r * 0.6) * Math.cos(angle);
        cyP += cy + (r * 0.6) * Math.sin(angle);
      }
      cxP /= planets.length;
      cyP /= planets.length;

      h += '<polygon points="' + points.join(' ') + '" fill="' + style.fill + '" stroke="' + style.stroke + '" stroke-width="2" stroke-opacity="0.6" class="anim-pattern"/>';

      var pNames = planets.map(function(pl) { return (pl.source !== 'N' ? pl.source : '') + PLANET_GLYPHS[pl.idx]; }).join('');
      h += '<text x="' + cxP.toFixed(1) + '" y="' + (cyP - 6).toFixed(1) + '" text-anchor="middle" dominant-baseline="central" fill="' + style.stroke + '" font-size="9" opacity="0.8">' + style.label + '</text>';
      h += '<text x="' + cxP.toFixed(1) + '" y="' + (cyP + 6).toFixed(1) + '" text-anchor="middle" dominant-baseline="central" fill="' + style.stroke + '" font-size="8" opacity="0.6">' + pNames + '</text>';
    }
  }
  return h;
}

function buildAspectLinesHTML(aspects, asc, cx, cy, r, patterns, natal) {
  var h = '<g id="aspectLines">';
  if (natal && patterns) h += buildPatternPolygons(patterns, natal, asc, cx, cy, r);

  for (var i = 0; i < aspects.length; i++) {
    var a = aspects[i];
    var key = getAspectKey(a);
    if (hiddenAspects[key]) { a.visible = false; continue; }
    if (!aspectPassesFilter(a)) { a.visible = false; continue; }
    a.visible = true;

    var a1 = toRad(asc - a.lon1 + 180);
    var a2 = toRad(asc - a.lon2 + 180);
    var opacity = 1 - Math.abs(a.diff - a.type.angle) / a.type.orb * 0.5;
    h += '<line x1="' + (cx + r * Math.cos(a1)).toFixed(1) + '" y1="' + (cy + r * Math.sin(a1)).toFixed(1) + '" x2="' + (cx + r * Math.cos(a2)).toFixed(1) + '" y2="' + (cy + r * Math.sin(a2)).toFixed(1) + '" stroke="' + a.type.color + '" stroke-opacity="' + (opacity * 0.95).toFixed(2) + '" stroke-width="1.5"/>';
  }
  h += '</g>';
  return h;
}

function redrawAspectLines() {
  if (!lastRenderParams || !lastAspectsFound.length) return;
  var p = lastRenderParams;
  var oldG = document.getElementById('aspectLines');
  if (!oldG) return;
  var temp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  temp.innerHTML = buildAspectLinesHTML(lastAspectsFound, p.asc, p.cx, p.cy, p.aspectR, cachedPatterns, p.natal);
  var newG = temp.querySelector('#aspectLines');
  if (newG) oldG.parentNode.replaceChild(newG, oldG);
}

// ============================================================
//  FORMATTING HELPERS
// ============================================================
function formatDegree(lon) {
  lon = normalize(lon);
  var si = Math.floor(lon / 30);
  var inSign = lon % 30;
  var deg = Math.floor(inSign);
  var min = Math.floor((inSign - deg) * 60);
  return deg + '\u00B0' + String(min).padStart(2, '0') + "' " + ZODIAC_EN[si];
}

function getHouseNumber(lon, houses) {
  for (var i = 0; i < 12; i++) {
    var start = houses[i];
    var end = houses[(i + 1) % 12];
    if (end < start) { if (lon >= start || lon < end) return i + 1; }
    else { if (lon >= start && lon < end) return i + 1; }
  }
  return 1;
}

function getAspectKey(a) { return a.label + '_' + a.p1 + '_' + a.p2 + '_' + a.type.angle; }

// ============================================================
//  MAIN CHART RENDER (no heavy recomputation - uses cache)
// ============================================================
function renderChart() {
  var user = defaultUser;
  var birthDate = makeUTCDate(user.date, user.time, user.tz);
  var transitDate = getTransitDateTime();
  var transitLoc = getTransitLocation();

  var natal   = calcAllPlanets(birthDate);
  var asc     = calcAscendant(birthDate, user.lat, user.lng);
  var mc      = calcMC(birthDate, user.lng);
  var dsc     = normalize(asc + 180);
  var ic      = normalize(mc + 180);
  // Obliquity for Placidus
  var jd = (birthDate.getTime() / 86400000) + 2440587.5;
  var T = (jd - 2451545.0) / 36525.0;
  var obliquity = 23.4393 - 0.013 * T;
  var houses  = calcHouses(mc, asc, user.lat, obliquity);

  var secondary = null;
  var secondaryColor = TRANSIT_COLOR;
  var secondaryLabel = 'Transit';
  if (chartMode === 'nt') {
    secondary = calcAllPlanets(transitDate);
  } else if (chartMode === 'np') {
    secondary = calcAllPlanets(calcProgressedDate(birthDate, transitDate));
    secondaryColor = PROGRESSED_COLOR;
    secondaryLabel = 'Progressed';
  }

  var svg = document.getElementById('horoscopeChart');
  var cx = 300, cy = 300;

  // Ring radii: 2-ring (outer+inner) or single
  var rings;
  if (chartMode === 'single') {
    rings = { outer: 270, inner: 220, zodiac: 280, planetR: 185 };
  } else {
    rings = { outer: 270, inner: 220, zodiac: 280, natalR: 185, secondaryR: 248 };
  }

  var zodiacOuter = rings.zodiac + 15;
  var zodiacInner = rings.outer;
  var innerR = rings.inner;

  var h = '';

  // SVG defs
  h += '<defs>';
  h += '<radialGradient id="bgGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#12122a"/><stop offset="100%" stop-color="#0A0A14"/></radialGradient>';
  h += '<filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  h += '</defs>';

  // Background
  h += '<circle cx="' + cx + '" cy="' + cy + '" r="295" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>';

  // Zodiac wheel
  for (var i = 0; i < 12; i++) {
    var sa = toRad(asc - i * 30 + 180);
    var ea = toRad(asc - (i + 1) * 30 + 180);
    var x1o = cx + zodiacOuter * Math.cos(sa), y1o = cy + zodiacOuter * Math.sin(sa);
    var x2o = cx + zodiacOuter * Math.cos(ea), y2o = cy + zodiacOuter * Math.sin(ea);
    var x1i = cx + zodiacInner * Math.cos(sa), y1i = cy + zodiacInner * Math.sin(sa);
    var x2i = cx + zodiacInner * Math.cos(ea), y2i = cy + zodiacInner * Math.sin(ea);
    var fc = ZODIAC_COLORS[i];

    h += '<path d="M' + x1i + ',' + y1i + ' A' + zodiacInner + ',' + zodiacInner + ' 0 0,0 ' + x2i + ',' + y2i + ' L' + x2o + ',' + y2o + ' A' + zodiacOuter + ',' + zodiacOuter + ' 0 0,1 ' + x1o + ',' + y1o + ' Z" fill="' + fc + '" fill-opacity="0.12" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>';

    var midAngle = toRad(asc - i * 30 - 15 + 180);
    var glyphR = (zodiacOuter + zodiacInner) / 2;
    var gx = cx + glyphR * Math.cos(midAngle), gy = cy + glyphR * Math.sin(midAngle);
    h += '<g class="zodiac-tap" onclick="showZodiacName(evt,' + i + ')" style="cursor:pointer">';
    h += '<circle cx="' + gx + '" cy="' + gy + '" r="18" fill="transparent"/>';
    h += '<text x="' + gx + '" y="' + gy + '" text-anchor="middle" dominant-baseline="central" fill="#B49774" fill-opacity="0.8" font-size="14">' + ZODIAC_SIGNS[i] + '</text>';
    h += '</g>';
    h += '<line x1="' + (cx + zodiacInner * Math.cos(sa)) + '" y1="' + (cy + zodiacInner * Math.sin(sa)) + '" x2="' + (cx + zodiacOuter * Math.cos(sa)) + '" y2="' + (cy + zodiacOuter * Math.sin(sa)) + '" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>';
  }

  // Ring circles
  h += '<circle cx="' + cx + '" cy="' + cy + '" r="' + zodiacOuter + '" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>';
  h += '<circle cx="' + cx + '" cy="' + cy + '" r="' + zodiacInner + '" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
  h += '<circle cx="' + cx + '" cy="' + cy + '" r="' + innerR + '" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>';

  // House lines (non-angular cusps)
  for (var i = 0; i < 12; i++) {
    var angle = toRad(asc - houses[i] + 180);
    h += '<line x1="' + (cx + innerR * Math.cos(angle)) + '" y1="' + (cy + innerR * Math.sin(angle)) + '" x2="' + (cx + zodiacInner * Math.cos(angle)) + '" y2="' + (cy + zodiacInner * Math.sin(angle)) + '" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>';

    var nextH = houses[(i + 1) % 12];
    var midH = houses[i] + ((nextH - houses[i] + 360) % 360) / 2;
    var hAngle = toRad(asc - midH + 180);
    var hR = innerR + 14;
    h += '<text x="' + (cx + hR * Math.cos(hAngle)) + '" y="' + (cy + hR * Math.sin(hAngle)) + '" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.2)" font-size="9">' + (i + 1) + '</text>';
  }
  // 4 Angle axes: ASC-DSC and MC-IC (full-width lines through chart)
  var ANGLE_COLOR = 'rgba(255,215,112,0.25)';
  var ANGLE_WIDTH = 1;
  // ASC-DSC axis — full span from zodiacOuter to zodiacOuter through center
  var ascAngle = toRad(asc - asc + 180); // = 180° = left (9 o'clock)
  var dscAngle = toRad(asc - dsc + 180);
  h += '<line x1="' + (cx + zodiacOuter * Math.cos(ascAngle)) + '" y1="' + (cy + zodiacOuter * Math.sin(ascAngle)) + '" x2="' + (cx + zodiacOuter * Math.cos(dscAngle)) + '" y2="' + (cy + zodiacOuter * Math.sin(dscAngle)) + '" stroke="' + ANGLE_COLOR + '" stroke-width="' + ANGLE_WIDTH + '"/>';
  // MC-IC axis
  var mcAng = toRad(asc - mc + 180);
  var icAng = toRad(asc - ic + 180);
  h += '<line x1="' + (cx + zodiacOuter * Math.cos(mcAng)) + '" y1="' + (cy + zodiacOuter * Math.sin(mcAng)) + '" x2="' + (cx + zodiacOuter * Math.cos(icAng)) + '" y2="' + (cy + zodiacOuter * Math.sin(icAng)) + '" stroke="' + ANGLE_COLOR + '" stroke-width="' + ANGLE_WIDTH + '"/>';

  // 4 Angle labels: ASC / DSC / MC / IC (just inside inner ring of zodiac band)
  var labelR = zodiacInner - 12;
  h += '<text x="' + (cx + labelR * Math.cos(ascAngle)) + '" y="' + (cy + labelR * Math.sin(ascAngle)) + '" text-anchor="middle" dominant-baseline="central" fill="' + NATAL_COLOR + '" font-size="10" font-weight="bold" filter="url(#glow)">ASC</text>';
  h += '<text x="' + (cx + labelR * Math.cos(dscAngle)) + '" y="' + (cy + labelR * Math.sin(dscAngle)) + '" text-anchor="middle" dominant-baseline="central" fill="' + NATAL_COLOR + '" font-size="10" font-weight="bold" filter="url(#glow)">DSC</text>';
  h += '<text x="' + (cx + labelR * Math.cos(mcAng)) + '" y="' + (cy + labelR * Math.sin(mcAng)) + '" text-anchor="middle" dominant-baseline="central" fill="' + NATAL_COLOR + '" font-size="10" font-weight="bold" filter="url(#glow)">MC</text>';
  h += '<text x="' + (cx + labelR * Math.cos(icAng)) + '" y="' + (cy + labelR * Math.sin(icAng)) + '" text-anchor="middle" dominant-baseline="central" fill="' + NATAL_COLOR + '" font-size="10" font-weight="bold" filter="url(#glow)">IC</text>';

  // Aspect collection
  var aspectsFound = [];
  var aspectR = innerR - 5;

  if (chartMode === 'single') {
    aspectsFound = collectAspects(natal, natal, false, 'N-N');
  } else if (chartMode === 'nt') {
    aspectsFound = collectAspects(natal, secondary, true, 'N-T');
  } else {
    aspectsFound = collectAspects(natal, secondary, true, 'N-P');
  }

  // Angle aspects: ASC/MC/DSC/IC vs natal planets
  var anglePoints = [
    { lon: asc, idx: 10, glyph: 'ASC' },
    { lon: mc,  idx: 11, glyph: 'MC' },
    { lon: dsc, idx: 12, glyph: 'DSC' },
    { lon: ic,  idx: 13, glyph: 'IC' }
  ];
  for (var ai = 0; ai < anglePoints.length; ai++) {
    var ap = anglePoints[ai];
    for (var pi = 0; pi < 10; pi++) {
      var diff = angleDiff(ap.lon, natal[pi]);
      for (var k = 0; k < ASPECT_TYPES.length; k++) {
        var asp = ASPECT_TYPES[k];
        if (Math.abs(diff - asp.angle) <= asp.orb) {
          aspectsFound.push({
            p1: ap.idx, p2: pi, type: asp, diff: diff,
            label: 'N-N', lon1: ap.lon, lon2: natal[pi], visible: true,
            isAngle: true
          });
        }
      }
    }
  }

  // Use cached patterns (computed once on generate)
  var patterns = cachedPatterns || detectPatterns(aspectsFound, natal, secondary);
  var predictions = cachedPredictions || [];

  lastRenderParams = { asc: asc, cx: cx, cy: cy, aspectR: aspectR, natal: natal, angleLons: { 10: asc, 11: mc, 12: dsc, 13: ic } };

  // Aspect lines + pattern polygons
  h += buildAspectLinesHTML(aspectsFound, asc, cx, cy, aspectR, patterns, natal);

  // Planet placement
  function placePlanet(lon, r, color, glyph, fontSize) {
    var angle = toRad(asc - lon + 180);
    var x = cx + r * Math.cos(angle);
    var y = cy + r * Math.sin(angle);
    h += '<circle cx="' + x + '" cy="' + y + '" r="2" fill="' + color + '" filter="url(#glow)"/>';
    h += '<text x="' + x + '" y="' + (y - 10) + '" text-anchor="middle" dominant-baseline="central" fill="' + color + '" font-size="' + fontSize + '" filter="url(#glow)">' + glyph + '</text>';
  }

  var natalR = (chartMode === 'single') ? rings.planetR : rings.natalR;
  for (var i = 0; i < 10; i++) placePlanet(natal[i], natalR, NATAL_COLOR, PLANET_GLYPHS[i], 13);

  if (secondary) {
    for (var i = 0; i < 10; i++) placePlanet(secondary[i], rings.secondaryR, secondaryColor, PLANET_GLYPHS[i], 12);
  }

  // Center info
  var centerR = (chartMode === 'single') ? 50 : 55;
  h += '<circle cx="' + cx + '" cy="' + cy + '" r="' + centerR + '" fill="rgba(10,10,20,0.85)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>';
  h += '<text x="' + cx + '" y="' + (cy - 20) + '" text-anchor="middle" fill="' + BRAND_PLATINUM + '" font-size="10">' + user.name + '</text>';
  h += '<text x="' + cx + '" y="' + (cy - 6) + '" text-anchor="middle" fill="#888" font-size="7">' + user.date + ' ' + user.time + '</text>';
  h += '<text x="' + cx + '" y="' + (cy + 6) + '" text-anchor="middle" fill="#666" font-size="7">ASC ' + formatDegree(asc) + '</text>';
  if (chartMode !== 'single') {
    var tDateStr = document.getElementById('transitDate').value || '';
    var tTimeStr = document.getElementById('transitTime').value || '';
    var locSel = document.getElementById('transitLocation');
    var locName = locSel.options[locSel.selectedIndex].text.split('(')[0].trim();
    h += '<text x="' + cx + '" y="' + (cy + 19) + '" text-anchor="middle" fill="' + secondaryColor + '" font-size="7">' + (chartMode === 'nt' ? 'T' : 'P') + ': ' + tDateStr + ' ' + tTimeStr + '</text>';
    h += '<text x="' + cx + '" y="' + (cy + 31) + '" text-anchor="middle" fill="' + secondaryColor + '" font-size="6">' + locName + '</text>';
  } else {
    h += '<text x="' + cx + '" y="' + (cy + 19) + '" text-anchor="middle" fill="#888" font-size="7">' + user.place + '</text>';
  }

  svg.innerHTML = h;
  lastAspectsFound = aspectsFound;

  renderPlanetTable(natal, secondary, secondaryColor, secondaryLabel, asc, mc, dsc, ic, houses);

  renderAspectInfo(aspectsFound, patterns);

  // Natal mode: hide predictions (only relevant for transit/progressed)
  var predictionPanel = document.getElementById('predictionPanel');
  if (chartMode === 'single') {
    predictionPanel.style.display = 'none';
  } else {
    predictionPanel.style.display = '';
    renderPredictions(predictions, patterns);
  }

  renderLegend(secondaryColor, secondaryLabel);
  updateHouseSystemLabel();
  refreshActiveBS();
}

function toggleAspectVisibility(key) {
  hiddenAspects[key] = !hiddenAspects[key];
  var isHidden = hiddenAspects[key];
  document.querySelectorAll('[data-aspect-key="' + key + '"]').forEach(function(row) {
    row.style.opacity = isHidden ? '0.25' : '';
    var check = row.querySelector('.aspect-check');
    if (check) {
      check.textContent = isHidden ? '\u2610' : '\u2611';
      check.style.color = isHidden ? '#444' : '';
    }
  });
  redrawAspectLines();
}

function renderAspectList(container, allAspects, filteredAspects) {
  if (allAspects.length === 0) {
    container.innerHTML = '<div style="color:#666;font-size:11px">アスペクトなし</div>';
    return;
  }
  var filteredKeys = {};
  filteredAspects.forEach(function(a) { filteredKeys[getAspectKey(a)] = true; });

  var html = '<div style="max-height:250px;overflow-y:auto">';
  allAspects.forEach(function(a) {
    var key = getAspectKey(a);
    var isHidden = !!hiddenAspects[key];
    var passesFilter = !!filteredKeys[key];
    var dimmed = isHidden || !passesFilter;
    var checkColor = isHidden ? '#444' : a.type.color;
    var checkIcon = isHidden ? '\u2610' : '\u2611';
    var filterTag = !passesFilter ? '<span style="color:#555;font-size:8px;margin-left:2px">F</span>' : '';

    html += '<div data-aspect-key="' + key + '" style="display:flex;align-items:center;gap:5px;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;' + (dimmed ? 'opacity:0.25;' : '') + '" onclick="toggleAspectVisibility(\'' + key + '\')">';
    html += '<span class="aspect-check" style="color:' + checkColor + ';font-size:14px;width:16px;text-align:center;flex-shrink:0">' + checkIcon + '</span>';
    html += '<span style="color:' + a.type.color + ';font-size:13px;width:18px;text-align:center">' + a.type.symbol + '</span>';
    html += '<span style="color:#ccc">' + PLANET_GLYPHS[a.p1] + '</span>';
    html += '<span style="color:' + a.type.color + ';font-size:10px">' + a.type.name + '</span>';
    html += '<span style="color:#ccc">' + PLANET_GLYPHS[a.p2] + '</span>';
    html += '<span style="color:#666;margin-left:auto;font-size:10px">' + a.diff.toFixed(1) + '\u00B0' + filterTag + '</span>';
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderAspectInfo(aspects, patterns) {
  var container = document.getElementById('aspectInfo');
  var containerTitle = document.getElementById('aspectsContainerTitle');

  var filtered = aspects.filter(function(a) {
    if (hiddenAspects[getAspectKey(a)]) return false;
    if (!aspectPassesFilter(a)) return false;
    return true;
  });

  var countText = ' <span style="color:#666;font-size:11px">(' + filtered.length + '/' + aspects.length + ')</span>';

  if (chartMode === 'single') {
    containerTitle.innerHTML = '&#9651; ASPECTS — Natal' + countText;
  } else if (chartMode === 'nt') {
    containerTitle.innerHTML = '&#9651; ASPECTS — <span style="color:' + TRANSIT_COLOR + '">N ↔ T</span>' + countText;
  } else {
    containerTitle.innerHTML = '&#9651; ASPECTS — <span style="color:' + PROGRESSED_COLOR + '">N ↔ P</span>' + countText;
  }
  renderAspectList(container, aspects, filtered);
}


function renderPredictions(predictions, detectedPatterns) {
  var panel = document.getElementById('predictionPanel');
  var list = document.getElementById('predictionList');
  var map = { yod: 'ヨッド', grandtrine: 'グランドトライン', tsquare: 'Tスクエア' };
  var colorMap = { yod: '#26D0CE', grandtrine: '#C9A84C', tsquare: '#6B5CE7' };
  var sourceColor = { N: NATAL_COLOR, T: TRANSIT_COLOR, P: PROGRESSED_COLOR };
  var types = ['grandtrine', 'tsquare', 'yod'];

  var activeCount = 0;
  for (var t = 0; t < types.length; t++) activeCount += (detectedPatterns[types[t]] || []).length;

  if (predictions.length === 0 && activeCount === 0) { panel.style.display = 'none'; return; }
  panel.style.display = '';

  var html = '';

  // Active patterns
  for (var t = 0; t < types.length; t++) {
    var pList = detectedPatterns[types[t]] || [];
    for (var p = 0; p < pList.length; p++) {
      var planets = pList[p].planets;
      var pNames = planets.map(function(pl) {
        return '<span style="color:' + sourceColor[pl.source] + '">' + pl.source + PLANET_GLYPHS[pl.idx] + '</span>';
      }).join(' ');
      html += '<div class="prediction-item">';
      html += '<span class="prediction-type" style="background:' + colorMap[types[t]] + '22;color:' + colorMap[types[t]] + '">' + map[types[t]] + '</span>';
      html += '<span style="color:#ccc">' + pNames + '</span>';
      html += '<span class="prediction-time" style="color:#C9A84C">\u2714 成立中</span>';
      html += '</div>';
    }
  }

  // Upcoming (max 5)
  for (var i = 0; i < Math.min(predictions.length, 5); i++) {
    var pred = predictions[i];
    var timeLabel = pred.hoursUntil < 1 ? 'まもなく' : pred.hoursUntil < 24 ? Math.round(pred.hoursUntil) + '時間後' : Math.round(pred.hoursUntil / 24) + '日後';
    var dateStr = pred.dateEstimate.getFullYear() + '/' + (pred.dateEstimate.getMonth() + 1) + '/' + pred.dateEstimate.getDate();

    html += '<div class="prediction-item">';
    html += '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:' + BRAND_GOLD + ';margin-right:4px"></span>';
    html += '<span class="prediction-type" style="background:' + colorMap[pred.type] + '22;color:' + colorMap[pred.type] + '">' + map[pred.type] + '</span>';
    html += '<span style="font-size:10px"><span style="color:' + NATAL_COLOR + '">N' + PLANET_GLYPHS[pred.natalPair[0]] + '-N' + PLANET_GLYPHS[pred.natalPair[1]] + '</span> + <span style="color:' + TRANSIT_COLOR + '">T' + PLANET_GLYPHS[pred.transitBody] + '</span></span>';
    html += '<span class="prediction-time">' + timeLabel + ' <span style="color:#666;font-size:9px">' + dateStr + '</span></span>';
    html += '</div>';
  }

  list.innerHTML = html;
}

var bsState = 'half';
var bsActiveTab = 'birth';
var BS_MINI_H = 52;
var BS_SMALL_RATIO = 0.25;
var BS_HALF_RATIO = 0.45;
var BS_FULL_RATIO = 0.85;

function isMobileView() { return window.innerWidth <= 900; }

function initBottomSheet() {
  var sheet = document.getElementById('bottomSheet');
  if (!sheet) return;
  var handle = document.getElementById('bsDragHandle');
  var startY = 0, startH = 0, dragging = false;

  handle.addEventListener('touchstart', function(e) {
    dragging = true; startY = e.touches[0].clientY; startH = sheet.offsetHeight;
    sheet.style.transition = 'none';
  });
  document.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    var dy = startY - e.touches[0].clientY;
    var newH = Math.max(BS_MINI_H, Math.min(window.innerHeight * BS_FULL_RATIO, startH + dy));
    sheet.style.height = newH + 'px';
    updateBSBodyHeight();
  });
  document.addEventListener('touchend', function() {
    if (!dragging) return;
    dragging = false; sheet.style.transition = '';
    var h = sheet.offsetHeight, wh = window.innerHeight;
    setBSState(h > wh * 0.65 ? 'full' : h > wh * 0.35 ? 'half' : h > wh * 0.175 ? 'small' : 'mini');
  });

  handle.addEventListener('mousedown', function(e) {
    dragging = true; startY = e.clientY; startH = sheet.offsetHeight;
    sheet.style.transition = 'none'; e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var dy = startY - e.clientY;
    var newH = Math.max(BS_MINI_H, Math.min(window.innerHeight * BS_FULL_RATIO, startH + dy));
    sheet.style.height = newH + 'px';
    updateBSBodyHeight();
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false; sheet.style.transition = '';
    var h = sheet.offsetHeight, wh = window.innerHeight;
    setBSState(h > wh * 0.65 ? 'full' : h > wh * 0.35 ? 'half' : h > wh * 0.175 ? 'small' : 'mini');
  });

  setBSState('half');
  buildBSBirthContent();
  buildBSTransitContent();
  switchBSTab('birth');

  window.addEventListener('resize', function() {
    if (isMobileView()) setBSState(bsState);
  });
}

function setBSState(state) {
  bsState = state;
  var sheet = document.getElementById('bottomSheet');
  if (!sheet) return;
  var wh = window.innerHeight;
  var miniLabel = document.getElementById('bsMiniLabel');
  var bsTabs   = document.getElementById('bsTabs');
  var bsBody   = document.getElementById('bsBody');

  if (state === 'mini') {
    sheet.style.height = BS_MINI_H + 'px';
    if (miniLabel) miniLabel.style.display = 'block';
    if (bsTabs)   bsTabs.style.display   = 'none';
    if (bsBody)   bsBody.style.display   = 'none';
  } else {
    if (miniLabel) miniLabel.style.display = 'none';
    if (bsTabs)   bsTabs.style.display   = '';
    if (bsBody)   bsBody.style.display   = '';
    if (state === 'small') sheet.style.height = Math.round(wh * BS_SMALL_RATIO) + 'px';
    else if (state === 'half') sheet.style.height = Math.round(wh * BS_HALF_RATIO) + 'px';
    else sheet.style.height = Math.round(wh * BS_FULL_RATIO) + 'px';
  }
  updateBSBodyHeight();
}

function updateBSBodyHeight() {
  var sheet = document.getElementById('bottomSheet');
  var body = document.getElementById('bsBody');
  var tabs = document.getElementById('bsTabs');
  var handle = document.getElementById('bsDragHandle');
  if (!sheet || !body) return;
  var used = (handle ? handle.offsetHeight : 0) + (tabs ? tabs.offsetHeight : 0);
  body.style.maxHeight = Math.max(0, sheet.offsetHeight - used - 4) + 'px';
}

function switchBSTab(tab) {
  bsActiveTab = tab;
  document.querySelectorAll('.bs-tab').forEach(function(t) {
    t.classList.toggle('active', t.getAttribute('data-bs') === tab);
  });
  document.querySelectorAll('.bs-section').forEach(function(s) { s.classList.remove('active'); });
  var section = document.getElementById('bs' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (section) section.classList.add('active');

  if (tab === 'birth') syncBSBirthForm();
  if (tab === 'transit') syncBSTransitForm();
  if (tab === 'fortune') buildBSFortuneContent();
  if (tab === 'planets') buildBSPlanetsContent();
  if (tab === 'filter') buildBSFilterContent();
  if (tab === 'aspects') buildBSAspectsContent();
  if (bsState === 'min') setBSState('half');
}

function updateBSTransitTab() {
  var tab = document.getElementById('bsTransitTab');
  if (tab) {
    tab.classList.toggle('hidden-tab', chartMode === 'single');
    if (chartMode === 'np') {
      tab.innerHTML = '&#9734; 進行';
    } else {
      tab.innerHTML = '&#9790; 経過';
    }

}

function onMobileTransitLocChange() {
  var sel = document.getElementById('mTransitLocation');
  var custom = document.getElementById('mTransitCustom');

  if (sel.value === 'manual') {
    custom.style.display = '';

    var vps = loadViewpoints();

    var vp = vps[idx];

// ============================================================
function initFortuneSwipe() {
  var wrap = document.querySelector('.fortune-cards-wrap');
  if (!wrap) return;
  var startX = 0, diffX = 0, swiping = false;
  wrap.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX; diffX = 0; swiping = true;
  }, { passive: true });
  wrap.addEventListener('touchmove', function(e) {
    if (!swiping) return;
    diffX = e.touches[0].clientX - startX;
  }, { passive: true });
  wrap.addEventListener('touchend', function() {
    if (!swiping) return; swiping = false;
    if (Math.abs(diffX) > 40) {
      if (diffX < 0) fortuneNext(); else fortunePrev();
    }
  });
  // Mouse drag for desktop
  wrap.addEventListener('mousedown', function(e) {
    startX = e.clientX; diffX = 0; swiping = true; e.preventDefault();
  });
  window.addEventListener('mousemove', function(e) {
    if (!swiping) return; diffX = e.clientX - startX;
  });
  window.addEventListener('mouseup', function() {
    if (!swiping) return; swiping = false;
    if (Math.abs(diffX) > 40) {
      if (diffX < 0) fortuneNext(); else fortunePrev();
    }
  });
}

var FORTUNE_CACHE_KEY = 'solara_fortune_cache';

function loadFortuneCacheOrGenerate() {
  var today = new Date().toISOString().slice(0, 10);
  try {
    var cached = JSON.parse(localStorage.getItem(FORTUNE_CACHE_KEY));
    if (cached && cached.date === today) {
      FORTUNE_MOCK = cached.data;
      return;
    }
  } catch(e) {}
  // Save current mock data as today's cache
  localStorage.setItem(FORTUNE_CACHE_KEY, JSON.stringify({ date: today, data: FORTUNE_MOCK }));
}
