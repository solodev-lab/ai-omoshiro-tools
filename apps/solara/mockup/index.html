<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Solara - Seed Alignment Mockup</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A14;
    color: #E8E0D0;
    font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== Phone frame ===== */
  .phone-frame {
    width: 375px;
    height: 812px;
    background: #0A0A14;
    border-radius: 40px;
    border: 2px solid #1a1a2e;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(107, 92, 231, 0.15), 0 0 120px rgba(201, 168, 76, 0.05);
  }

  /* ===== Status bar ===== */
  .status-bar {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #666;
    letter-spacing: 1px;
    position: relative;
    z-index: 100;
  }

  /* ===== Map container ===== */
  .map-container {
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 80px;
    overflow: hidden;
  }

  #mapCanvas {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* ===== Particle canvas ===== */
  #particleCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
  }

  /* ===== Search bar ===== */
  .search-bar {
    position: absolute;
    top: 55px;
    left: 16px;
    right: 56px;
    z-index: 110;
    display: none;
  }

  .search-bar.visible {
    display: flex;
    gap: 6px;
  }

  .search-input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(15, 15, 30, 0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    color: #E8E0D0;
    font-size: 13px;
    outline: none;
  }

  .search-input:focus {
    border-color: rgba(201, 168, 76, 0.4);
  }

  .search-input::placeholder {
    color: #555;
  }

  .search-btn {
    padding: 10px 14px;
    background: rgba(201, 168, 76, 0.15);
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 10px;
    color: #C9A84C;
    font-size: 14px;
    cursor: pointer;
  }

  /* Search result popup */
  .search-result {
    position: absolute;
    bottom: 160px;
    left: 16px;
    right: 16px;
    z-index: 110;
    background: rgba(15, 15, 30, 0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 14px 16px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
  }

  .search-result.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .search-result-name {
    font-size: 13px;
    color: #E8E0D0;
    margin-bottom: 6px;
  }

  .search-result-sector {
    font-size: 12px;
    line-height: 1.5;
  }

  .search-result-sector.positive { color: #C9A84C; }
  .search-result-sector.negative { color: #8B7AE8; }
  .search-result-sector.neutral { color: #6B8AAB; }

  .search-result-close {
    position: absolute;
    top: 8px;
    right: 12px;
    background: none;
    border: none;
    color: #555;
    font-size: 16px;
    cursor: pointer;
  }

  /* ===== Leaflet overrides ===== */
  .leaflet-control-zoom, .leaflet-control-attribution {
    display: none !important;
  }

  /* Sector glow via CSS (score-based) */
  .sector-positive {
    filter: drop-shadow(0 0 6px rgba(201, 168, 76, 0.5)) drop-shadow(0 0 12px rgba(80, 210, 255, 0.2));
  }
  .sector-negative {
    filter: drop-shadow(0 0 4px rgba(107, 92, 231, 0.3));
  }

  /* ===== Stella message ===== */
  .stella-message {
    position: absolute;
    bottom: 90px;
    left: 20px;
    right: 20px;
    z-index: 110;
    background: rgba(15, 15, 30, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 16px;
    padding: 16px 20px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
  }

  .stella-message.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .stella-name {
    font-size: 10px;
    letter-spacing: 2px;
    color: #6B5CE7;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stella-text {
    font-size: 13px;
    line-height: 1.6;
    color: #E8E0D0;
  }

  .stella-text .highlight {
    color: #C9A84C;
    font-weight: 600;
  }

  /* ===== Seed badge ===== */
  .seed-badge {
    position: absolute;
    top: 56px;
    right: 20px;
    z-index: 110;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(201, 168, 76, 0.15);
    border: 1px solid rgba(201, 168, 76, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.5s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .seed-badge.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* ===== Card overlay (full screen tarot draw) ===== */
  .card-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    background: rgba(5, 5, 12, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .card-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .card-prompt {
    font-size: 14px;
    color: #666;
    letter-spacing: 2px;
    margin-bottom: 40px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s 0.3s forwards;
  }

  .tarot-card {
    width: 160px;
    height: 260px;
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .card-back, .card-front {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
  }

  .card-back {
    background: linear-gradient(135deg, #1a0a30, #0d0520);
    border: 1px solid rgba(107, 92, 231, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(107, 92, 231, 0.2);
  }

  .card-back-pattern {
    width: 80%;
    height: 80%;
    border: 1px solid rgba(107, 92, 231, 0.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    background: radial-gradient(circle, rgba(107, 92, 231, 0.1), transparent);
  }

  .card-front {
    background: linear-gradient(135deg, #1a1025, #0f0a18);
    border: 1px solid rgba(201, 168, 76, 0.5);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(201, 168, 76, 0.3);
  }

  .card-element {
    font-size: 48px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 15px rgba(201, 168, 76, 0.6));
  }

  .card-name {
    font-size: 14px;
    letter-spacing: 3px;
    color: #C9A84C;
    text-transform: uppercase;
  }

  .card-subtitle {
    font-size: 11px;
    color: #8B7A5E;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .tarot-card.flipped {
    transform: rotateY(180deg);
  }

  .tarot-card.shrinking {
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    transform: rotateY(180deg) scale(0.15) translate(400px, -800px);
    opacity: 0;
  }

  /* ===== Bottom nav ===== */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: rgba(10, 10, 20, 0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 20px 15px;
    z-index: 90;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.4;
    cursor: pointer;
    transition: opacity 0.3s;
  }

  .nav-item.active {
    opacity: 1;
  }

  .nav-icon {
    font-size: 20px;
  }

  .nav-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .nav-item.active .nav-label {
    color: #C9A84C;
  }

  /* ===== Fortune Bottom Sheet ===== */
  .fortune-sheet {
    position: absolute;
    left: 0; right: 0;
    bottom: 80px; /* above bottom-nav */
    z-index: 85;
    background: rgba(10, 10, 25, 0.95);
    border-top: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 16px 16px 0 0;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 55vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .fortune-sheet.open {
    transform: translateY(0);
  }
  .fortune-sheet-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    margin: 10px auto 6px;
    cursor: grab;
  }
  .fortune-sheet-tabs {
    display: flex;
    gap: 0;
    padding: 0 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .fortune-sheet-tabs::-webkit-scrollbar { display: none; }
  .fortune-sheet-tab {
    flex: 0 0 auto;
    padding: 8px 12px;
    font-size: 11px;
    color: #666;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .fortune-sheet-tab.active {
    color: #C9A84C;
    border-bottom-color: #C9A84C;
  }
  .fortune-sheet-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 14px;
    scrollbar-width: thin;
  }
  .fortune-dir-row {
    display: flex;
    align-items: center;
    padding: 7px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
  }
  .fortune-dir-row:active {
    background: rgba(255,255,255,0.08);
  }
  .fortune-dir-row:last-child { border-bottom: none; }
  .fortune-dir-label {
    width: 36px;
    font-size: 12px;
    font-weight: 600;
    color: #B49774;
  }
  .fortune-dir-bar-wrap {
    flex: 1;
    height: 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 7px;
    overflow: hidden;
    margin: 0 10px;
    position: relative;
  }
  .fortune-dir-tick {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,255,255,0.13);
    pointer-events: none;
    z-index: 1;
  }
  .fortune-dir-bar {
    height: 100%;
    border-radius: 7px;
    transition: width 0.4s ease-out;
    min-width: 2px;
  }
  .fortune-dir-bar.positive { background: linear-gradient(90deg, #C9A84C, #F6BD60); }
  .fortune-dir-bar.negative { background: linear-gradient(90deg, #6B5CE7, #4A3AAA); }
  .fortune-dir-bar.zero     { background: rgba(255,255,255,0.08); width: 2px !important; }
  .fortune-dir-score {
    width: 48px;
    text-align: right;
    font-size: 11px;
    font-family: monospace;
  }
  .fortune-dir-score.positive { color: #F6BD60; }
  .fortune-dir-score.negative { color: #8B7BE7; }
  .fortune-dir-score.zero     { color: #555; }
  .fortune-dir-badge {
    font-size: 10px;
    margin-left: 4px;
    width: 20px;
  }
  .fortune-sheet-pull {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 86;
    background: rgba(10, 10, 25, 0.8);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 12px 12px 0 0;
    border-bottom: none;
    padding: 4px 18px 2px;
    cursor: pointer;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .fortune-sheet-pull:active { color: #C9A84C; }

  /* ===== CTA Button ===== */
  .cta-button {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 80;
    padding: 14px 32px;
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.2), rgba(201, 168, 76, 0.1));
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 30px;
    color: #C9A84C;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  .cta-button:hover {
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.3), rgba(201, 168, 76, 0.15));
    box-shadow: 0 0 30px rgba(201, 168, 76, 0.2);
  }

  .cta-button.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(20px);
  }

  /* ===== Layer control button ===== */
  .layer-btn {
    position: absolute;
    top: 56px;
    right: 12px;
    z-index: 80;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(15, 15, 30, 0.7);
    border: 1px solid rgba(201, 168, 76, 0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s, border-color 0.3s;
  }

  .layer-btn.visible { opacity: 1; }
  .layer-btn.active { border-color: rgba(201, 168, 76, 0.5); }

  .layer-btn-bar {
    width: 16px;
    height: 2px;
    border-radius: 1px;
  }
  .layer-btn-bar:nth-child(1) { background: #E8E0D0; }
  .layer-btn-bar:nth-child(2) { background: #C9A84C; }
  .layer-btn-bar:nth-child(3) { background: #00D4FF; }

  /* ===== Layer panel ===== */
  .layer-panel {
    position: absolute;
    top: 56px;
    right: 12px;
    z-index: 85;
    width: 180px;
    background: rgba(12, 12, 26, 0.92);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 14px;
    padding: 14px;
    opacity: 0;
    pointer-events: none;
    transform: translateX(10px);
    transition: opacity 0.25s, transform 0.25s;
  }

  .layer-panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }

  .layer-panel-title {
    font-size: 9px;
    color: #666;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .layer-panel-section {
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }
  .layer-panel-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .layer-panel-label {
    font-size: 8px;
    color: #555;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .layer-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    cursor: pointer;
    user-select: none;
  }

  .layer-toggle-check {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .layer-toggle.on .layer-toggle-check {
    border-color: var(--toggle-color, #C9A84C);
    color: var(--toggle-color, #C9A84C);
    background: rgba(201, 168, 76, 0.1);
  }

  .layer-toggle-text {
    font-size: 11px;
    color: #666;
    transition: color 0.2s;
  }

  /* ===== Fortune filter pills ===== */
  .fortune-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  .fortune-pill {
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 10px;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #555;
    background: transparent;
    user-select: none;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .fortune-pill.active {
    border-color: var(--pill-color, #C9A84C);
    color: var(--pill-color, #C9A84C);
    background: rgba(201, 168, 76, 0.1);
  }

  .fortune-rest-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 800;
    cursor: pointer;
    justify-content: center;
    align-items: center;
  }
  .fortune-rest-overlay.visible {
    display: flex;
  }
  .fortune-rest-inner {
    background: rgba(15, 15, 30, 0.85);
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 16px;
    padding: 20px 28px;
    text-align: center;
    max-width: 260px;
    animation: fortuneRestFadeIn 0.4s ease-out;
  }
  .fortune-rest-icon {
    font-size: 28px;
    margin-bottom: 8px;
  }
  .fortune-rest-text {
    font-size: 13px;
    line-height: 1.7;
    color: #C9A84C;
    white-space: pre-line;
  }
  @keyframes fortuneRestFadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .layer-toggle.on .layer-toggle-text { color: #bbb; }

  /* ===== Screen flash ===== */
  .screen-flash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(201, 168, 76, 0.15);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
  }

  /* ===== Gray overlay for pre-seed state ===== */
  .gray-veil {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 10, 20, 0.5);
    z-index: 5;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }

  .gray-veil.lifted {
    opacity: 0;
  }

  /* ===== Effect video overlay ===== */
  .effect-video {
    position: absolute;
    z-index: 18;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.3s;
    object-fit: cover;
  }

  .effect-video.playing {
    opacity: 1;
    animation: effectColorShift 1.5s ease-in-out;
  }

  @keyframes effectColorShift {
    0%   { filter: hue-rotate(0deg) brightness(1.2) saturate(1.5); }
    25%  { filter: hue-rotate(-30deg) brightness(1.5) saturate(1.8); }
    50%  { filter: hue-rotate(160deg) brightness(1.3) saturate(1.6); }
    75%  { filter: hue-rotate(60deg) brightness(1.4) saturate(1.4); }
    100% { filter: hue-rotate(0deg) brightness(1.0) saturate(1.0); }
  }

  /* ===== Pre-seed prompt ===== */
  .preseed-prompt {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    text-align: center;
    pointer-events: none;
    transition: all 0.6s ease;
  }

  .preseed-prompt.bottom {
    top: auto;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.7;
  }

  .preseed-prompt.bottom .preseed-icon {
    font-size: 20px;
    margin-bottom: 6px;
    animation: none;
  }

  .preseed-prompt.bottom .preseed-text {
    font-size: 10px;
    line-height: 1.5;
  }

  .preseed-prompt.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .preseed-icon {
    font-size: 32px;
    margin-bottom: 16px;
    opacity: 0.6;
    animation: float 3s ease-in-out infinite;
  }

  .preseed-text {
    font-size: 12px;
    color: #555;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* ===== Animations ===== */
  @keyframes fadeIn {

function astroNormalize(deg) { return ((deg % 360) + 360) % 360; }

function getEclipticLongitude(body, date) {
  if (body === Astronomy.Body.Moon) return Astronomy.EclipticGeoMoon(date).lon;
  if (body === Astronomy.Body.Sun)  return Astronomy.SunPosition(date).elon;
  var geo = Astronomy.GeoVector(body, date, true);
  return Astronomy.Ecliptic(geo).elon;
}

function calcAllPlanets(date) {
  var result = {};
  ASTRO_BODIES.forEach(function(b) {
    result[b.key] = { angle: Math.round(astroNormalize(getEclipticLongitude(b.body, date)) * 100) / 100 };
  });
  return result;
}

function calcProgressedDate(birthDate, currentDate) {
  var msPerDay = 86400000;
  var daysLived = (currentDate.getTime() - birthDate.getTime()) / msPerDay;
  var progDays = daysLived / 365.25;
  return new Date(birthDate.getTime() + progDays * msPerDay);
}

function computeTripleChart() {
  var now = new Date();
  var natal = calcAllPlanets(BIRTH_DATA.date);
  var progDate = calcProgressedDate(BIRTH_DATA.date, now);
  var progressed = calcAllPlanets(progDate);
  var transit = calcAllPlanets(now);
  return { natal: natal, progressed: progressed, transit: transit };
}

// ===== Compute aspects from angle map { planetName: degrees } =====
function computeAspects(angleMap) {
  const planets = Object.keys(angleMap);
  const result = [];
  for (let i = 0; i < planets.length; i++) {
    for (let j = i + 1; j < planets.length; j++) {
      const p1 = planets[i], p2 = planets[j];
      let diff = Math.abs(angleMap[p1] - angleMap[p2]);
      if (diff > 180) diff = 360 - diff;
      for (const asp of ASPECT_DEFS) {
        if (Math.abs(diff - asp.angle) <= asp.orb) {
          result.push({ p1, p2, type: asp.name, quality: asp.quality, weight: asp.weight });
          break;
        }
      }
    }
  }
  return result;
}

// ===== 16-direction continuous scoring =====
// Planet influence spreads via cosine falloff — no hard sector boundaries.
// 16 compass directions are sampling points of a continuous field.
var DIR16 = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
var DIR16_ANGLE = {};
DIR16.forEach(function(d, i) { DIR16_ANGLE[d] = i * 22.5; });

// Angular distance (0–180°)
function angleDist(a, b) {
  var d = Math.abs(((a % 360 + 360) % 360) - ((b % 360 + 360) % 360));
  return d > 180 ? 360 - d : d;
}

// Cosine falloff: full at 0°, zero at ±spread
function cosFalloff(dist, spread) {
  if (dist >= spread) return 0;
  return (1 + Math.cos(Math.PI * dist / spread)) / 2;
}

var INFLUENCE_SPREAD = 30; // degrees — planet influence reaches ±30° from its position

function scoreSectorsByAspects() {
  // Transit angles
  var transitAngles = {};
  Object.entries(TRIPLE_CHART.transit).forEach(function(e) { transitAngles[e[0]] = e[1].angle; });
  // Natal angles
  var natalAngles = {};
  Object.entries(TRIPLE_CHART.natal).forEach(function(e) { natalAngles[e[0]] = e[1].angle; });

  // Nearest 16-dir for each transit planet (for display labels)
  var planetDir = {};
  Object.entries(transitAngles).forEach(function(e) {
    var p = e[0], a = e[1];
    var best = 'N', bestDist = 999;
    DIR16.forEach(function(d) {
      var dist = angleDist(a, DIR16_ANGLE[d]);
      if (dist < bestDist) { bestDist = dist; best = d; }
    });
    planetDir[p] = best;
  });

  // Transit-transit aspects
  var transitAspects = computeAspects(transitAngles);
  // Natal-transit cross aspects
  var crossAspects = [];
  Object.entries(transitAngles).forEach(function(te) {
    var tp = te[0], ta = te[1];
    Object.entries(natalAngles).forEach(function(ne) {
      var np = ne[0], na = ne[1];
      if (tp === np) return;
      var diff = angleDist(ta, na);
      for (var i = 0; i < ASPECT_DEFS.length; i++) {
        var asp = ASPECT_DEFS[i];
        if (Math.abs(diff - asp.angle) <= asp.orb) {
          crossAspects.push({ p1: tp, p2: 'N:' + np, type: asp.name, quality: asp.quality, weight: asp.weight * 0.6 });
          break;
        }
      }
    });
  });

  // Per-planet aspect score (same as before)
  var planetScore = {};
  Object.keys(transitAngles).forEach(function(p) { planetScore[p] = 0; });
  transitAspects.forEach(function(asp) {
    planetScore[asp.p1] += asp.weight;
    planetScore[asp.p2] += asp.weight;
  });
  crossAspects.forEach(function(asp) {
    if (planetScore[asp.p1] !== undefined) planetScore[asp.p1] += asp.weight;
  });

  // === Continuous scoring: spread each planet's score across 16 directions ===
  var sectorScores = {};
  DIR16.forEach(function(d) { sectorScores[d] = 0; });

  Object.entries(transitAngles).forEach(function(e) {
    var planet = e[0], pAngle = e[1], pScore = planetScore[planet] || 0;
    DIR16.forEach(function(d) {
      var dist = angleDist(pAngle, DIR16_ANGLE[d]);
      sectorScores[d] += pScore * cosFalloff(dist, INFLUENCE_SPREAD);
    });
  });

  // === Per-category continuous scoring ===
  var fortuneScores = {};
  Object.keys(FORTUNE_PAIRS).forEach(function(cat) {
    fortuneScores[cat] = {};
    DIR16.forEach(function(d) { fortuneScores[cat][d] = 0; });

    var catPlanets = [];
    FORTUNE_PAIRS[cat].forEach(function(pair) {
      if (catPlanets.indexOf(pair[0]) === -1) catPlanets.push(pair[0]);
      if (catPlanets.indexOf(pair[1]) === -1) catPlanets.push(pair[1]);
    });

    // Per-planet category score from aspects
    var catPlanetScore = {};
    catPlanets.forEach(function(p) { catPlanetScore[p] = 0; });

    transitAspects.forEach(function(asp) {
      var inv1 = catPlanets.indexOf(asp.p1) !== -1;
      var inv2 = catPlanets.indexOf(asp.p2) !== -1;
      if (!inv1 && !inv2) return;
      var pairMatch = FORTUNE_PAIRS[cat].some(function(pair) {
        return (asp.p1===pair[0] && asp.p2===pair[1]) || (asp.p1===pair[1] && asp.p2===pair[0]);
      });
      var w = pairMatch ? asp.weight * 2 : asp.weight * 0.5;
      if (inv1) catPlanetScore[asp.p1] += w;
      if (inv2) catPlanetScore[asp.p2] += w;
    });
    crossAspects.forEach(function(asp) {
      if (catPlanets.indexOf(asp.p1) === -1) return;
      catPlanetScore[asp.p1] += asp.weight * 0.5;
    });

    // Spread category planet scores across directions
    catPlanets.forEach(function(p) {
      var pAngle = transitAngles[p];
      if (pAngle === undefined) return;
      DIR16.forEach(function(d) {
        var dist = angleDist(pAngle, DIR16_ANGLE[d]);
        fortuneScores[cat][d] += catPlanetScore[p] * cosFalloff(dist, INFLUENCE_SPREAD);
      });
    });
  });

  // === Dominant fortune category per direction ===
  var sectorFortune = {};
  DIR16.forEach(function(d) {
    var best = null, bestVal = -Infinity;
    Object.keys(FORTUNE_PAIRS).forEach(function(cat) {
      if (fortuneScores[cat][d] > bestVal) { bestVal = fortuneScores[cat][d]; best = cat; }
    });
    sectorFortune[d] = bestVal > 0.01 ? best : null;
  });

  return { sectorScores: sectorScores, sectorFortune: sectorFortune, planetDir: planetDir, planetScore: planetScore, transitAspects: transitAspects, crossAspects: crossAspects, fortuneScores: fortuneScores };
}

// ===== Draw a random card from 78 =====
function drawRandomCard() {
  const pool = [];
  TAROT_DATA.majorArcana.forEach(c => pool.push({ type:'major', ...c }));
  TAROT_DATA.minorArcana.forEach(c => {
    const suit = TAROT_DATA.suitMapping[c.suit];
    pool.push({ type:'minor', emoji: suit.emoji, ...c });
  });
  return pool[Math.floor(Math.random() * pool.length)];
}

// ===== 16-direction labels =====
var DIR16_LABELS = {
  N:'北', NNE:'北北東', NE:'北東', ENE:'東北東',
  E:'東', ESE:'東南東', SE:'南東', SSE:'南南東',
  S:'南', SSW:'南南西', SW:'南西', WSW:'西南西',
  W:'西', WNW:'西北西', NW:'北西', NNW:'北北西',
};

// Find nearest 16-dir for a given angle
function angleToDir16(angle) {
  var a = ((angle % 360) + 360) % 360;
  var best = 'N', bestDist = 999;
  DIR16.forEach(function(d) {
    var dist = angleDist(a, DIR16_ANGLE[d]);
    if (dist < bestDist) { bestDist = dist; best = d; }
  });
  return best;
}

// ===== Calculate Seed Boost =====
function calculateSeedBoost(card) {
  var planets = TAROT_DATA.planetSymbols;

  // Determine boosted planets and boost amount
  var boostedPlanets = [];
  var boostAmount = 0;
  var boostType = 'element';

  if (card.type === 'major') {
    boostType = card.boostType;
    boostAmount = card.boost;
    if (boostType === 'single') {
      boostedPlanets = [card.planet];
    } else {
      boostedPlanets = Object.keys(planets);
    }
  } else {
    var suit = TAROT_DATA.suitMapping[card.suit];
    boostedPlanets = suit.planets.slice();
    if (card.court) {
      var court = TAROT_DATA.courtBoost[card.court];
      boostAmount = court.boost;
      court.extraPlanets.forEach(function(p) {
        if (boostedPlanets.indexOf(p) === -1) boostedPlanets.push(p);
      });
    } else {
      boostAmount = TAROT_DATA.numberBoost[card.rank] || 0.15;
    }
  }

  // Aspect-based sector scores (continuous 16-dir)
  var aspectResult = scoreSectorsByAspects();
  var rawAspect = aspectResult.sectorScores;
  var rawVals = Object.values(rawAspect);
  var minRaw = Math.min.apply(null, rawVals);
  var maxRaw = Math.max.apply(null, rawVals);
  var rawRange = maxRaw - minRaw || 1;

  // Normalize to [0.15, 0.80]
  var sectorScores = {};
  DIR16.forEach(function(d) {
    sectorScores[d] = 0.15 + 0.65 * ((rawAspect[d] - minRaw) / rawRange);
  });

  // Apply Seed Boost: card-boosted planets amplify nearby directions (continuous)
  var boostedSectors = {};
  boostedPlanets.forEach(function(pName) {
    var transitAngle = TRIPLE_CHART.transit[pName] ? TRIPLE_CHART.transit[pName].angle
                     : (planets[pName] ? planets[pName].angle : null);
    if (transitAngle === null) return;
    // Spread boost across nearby directions
    DIR16.forEach(function(d) {
      var dist = angleDist(transitAngle, DIR16_ANGLE[d]);
      var falloff = cosFalloff(dist, INFLUENCE_SPREAD);
      if (falloff > 0) {
        if (!boostedSectors[d]) boostedSectors[d] = 0;
        boostedSectors[d] += boostAmount * falloff;
        sectorScores[d] *= (1 + boostAmount * falloff);
      }
    });
  });

  // Strongest boosted direction
  var strongestDir = null, strongestBoost = 0;
  Object.entries(boostedSectors).forEach(function(e) {
    if (e[1] > strongestBoost) { strongestBoost = e[1]; strongestDir = e[0]; }
  });
  if (!strongestDir) {
    var sorted = Object.entries(sectorScores).sort(function(a, b) { return b[1] - a[1]; });
    strongestDir = sorted[0] ? sorted[0][0] : 'N';
  }

  return {
    sectorScores: sectorScores,
    sectorFortune: aspectResult.sectorFortune,
    boostedPlanets: boostedPlanets,
    boostedSectors: boostedSectors,
    boostAmount: boostAmount,
    strongestDir: strongestDir,
    strongestDirLabel: DIR16_LABELS[strongestDir] || '',
    aspectResult: aspectResult,
  };
}

// ===== Longitude normalization =====
function normalizeLng(ptLng, refLng) {
  let diff = ptLng - refLng;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  return refLng + diff;
}

// ===== Thin dark gradient overlay on mapCanvas =====
function drawMapOverlay() {
  const ctx = mapCtx;
  ctx.clearRect(0, 0, mapW, mapH);
  const bg = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, mapW * 0.7);
  bg.addColorStop(0, 'rgba(10, 10, 25, 0.1)');
  bg.addColorStop(1, 'rgba(5, 5, 12, 0.25)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, mapW, mapH);
}

// ===== Particle system =====
class Particle {
  constructor(x, y, vx, vy, color, size, life, decay) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.size = size;
    this.life = life;
    this.maxLife = life;
    this.decay = decay;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.life -= this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 12;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function spawnImpactParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    const size = 1 + Math.random() * 2.5;
    const life = 0.4 + Math.random() * 0.4;
    const color = Math.random() > 0.3 ? GOLD : GOLD_LIGHT;
    particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, color, size, life, 0.025));
  }
  startAnimLoop();
}

function spawnConvergingParticles(targetX, targetY, count) {
  const colors = ['#FFFBE6', '#F5D76E', '#FFE8A0', '#C9A84C'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 150 + Math.random() * 250;
    const startX = targetX + Math.cos(angle) * dist;
    const startY = targetY + Math.sin(angle) * dist;
    const speed = 0.012 + Math.random() * 0.018;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const p = new Particle(
      startX, startY,
      (targetX - startX) * speed,
      (targetY - startY) * speed,
      color, 1 + Math.random() * 2.5, 1.2 + Math.random() * 0.8, 0.018
    );
    p.converge = true;
    p.targetX = targetX;
    p.targetY = targetY;
    particles.push(p);
  }
  startAnimLoop();
}

// ===== Meteor =====
function launchMeteor(targetX, targetY) {
  meteor = {
    x: targetX - 40, y: -20,
    targetX: targetX, targetY: targetY,
    progress: 0, speed: 0.025,
  };
  startAnimLoop();
}

function updateMeteor() {
  if (!meteor) return;
  meteor.progress += meteor.speed;
  meteor.speed += 0.002;

  const t = Math.min(1, meteor.progress);
  const ease = t * t;
  meteor.x = (meteor.targetX - 40) + 40 * ease;
  meteor.y = -20 + (meteor.targetY + 20) * ease;

  if (t >= 0.6 && !meteor.effectStarted) {
    meteor.effectStarted = true;
    playEffectVideo(meteor.targetX, meteor.targetY);
  }

  if (t >= 1 && !meteor.impacted) {
    meteor.impacted = true;
    onMeteorImpact(meteor.targetX, meteor.targetY);
  }

  if (t >= 1) meteor = null;
}

function drawMeteor(ctx) {
  if (!meteor) return;
  const t = Math.min(1, meteor.progress);
  if (t >= 1) return;

  ctx.save();
  const headGlow = ctx.createRadialGradient(meteor.x, meteor.y, 0, meteor.x, meteor.y, 12);
  headGlow.addColorStop(0, 'rgba(245, 215, 110, 0.9)');
  headGlow.addColorStop(0.5, 'rgba(201, 168, 76, 0.4)');
  headGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = headGlow;
  ctx.beginPath();
  ctx.arc(meteor.x, meteor.y, 12, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(meteor.x, meteor.y, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ===== Impact handler =====
function onMeteorImpact(x, y) {
  // Screen flash
  const flash = document.getElementById('screenFlash');
  flash.style.transition = 'none';
  flash.style.opacity = '0.6';
  setTimeout(() => {
    flash.style.transition = 'opacity 0.6s ease';
    flash.style.opacity = '0';
  }, 50);

  // Impact ring + converging particles
  impactRings.push({ x, y, progress: 0 });
  startAnimLoop();

  setTimeout(() => {
    spawnConvergingParticles(centerX, centerY, 60);
  }, 300);

  // Haptic
  if (navigator.vibrate) navigator.vibrate([30, 50, 30]);

  // Activate map
  setTimeout(() => {
    sectorAnimating = true;
    sectorAnimProgress = 0;
    startAnimLoop();
    setTimeout(() => { sectorAnimating = false; }, 10000);
    createGeoSectors();
    addBoostedPlanetLines();
    setTimeout(applyLayerVisibility, 100); // apply any active fortune filter to new sectors

    document.getElementById('grayVeil').classList.add('lifted');
    document.getElementById('layerBtn').classList.add('visible');
    document.getElementById('searchBar').classList.add('visible');
  }, 300);

  // Stella message (dynamic)
  setTimeout(() => {
    if (drawnCard && seedBoostData) {
      const msg = generateStellaMessage(drawnCard, seedBoostData);
      document.getElementById('stellaText').innerHTML =
        '<span class="highlight">『' + drawnCard.nameJP + '』</span>' +
        msg.replace('『' + drawnCard.nameJP + '』', '');
    }
    document.getElementById('stellaMsg').classList.add('visible');
  }, 1200);

  // Seed badge
  setTimeout(() => {
    document.getElementById('seedBadge').classList.add('visible');
  }, 800);
}

// ===== Geo-aware sparkles on Canvas =====
function drawGeoSparkles(ctx) {
  if (!window.leafletMap || !window.geoSectorsVisible) return;

  const lat = window.mapCenter[0];
  const lng = window.mapCenter[1];
  const zoom = window.leafletMap.getZoom();
  const radiusKm = 40075 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom) * 0.3;

  const sparkleColors = [
    [255, 250, 220],
    [245, 200, 80],
    [100, 220, 200],
    [80, 180, 255],
    [255, 240, 160],
  ];

  // Dynamic sparkle sectors: score >= 2 (positive/strong)
  const blessedDefs = [];
  if (window.geoSectors) {
    window.geoSectors.forEach(s => {
      if (s.score >= 2) {
        var idx = DIR16.indexOf(s.dir);
        if (idx >= 0) {
          var center = idx * 22.5;
          blessedDefs.push({ start: center - 11.25, end: center + 11.25 });
        }
      }
    });
  }
  if (blessedDefs.length === 0) {
    blessedDefs.push({ start: 85, end: 95 }, { start: 265, end: 275 });
  }

  blessedDefs.forEach((sector, si) => {
    for (let s = 0; s < 5; s++) {
      const angleRange = sector.end - sector.start;
      const angle = sector.start + angleRange * ((s + 0.5) / 5);
      const drift = Math.sin(breathePhase * 1.5 + s * 1.1 + si * 3) * 2;
      const distFrac = 0.2 + 0.5 * ((Math.sin(breathePhase * 1.8 + s * 1.7 + si * 2) + 1) / 2);
      const distKm = radiusKm * distFrac;

      const center = turf.point([lng, lat]);
      const dest = turf.destination(center, distKm, angle + drift, { units: 'kilometers' });
      const screenPt = window.leafletMap.latLngToContainerPoint([dest.geometry.coordinates[1], dest.geometry.coordinates[0]]);

      const sparkleAlpha = 0.5 * sectorAnimProgress * (0.4 + Math.sin(breathePhase * 3.5 + s * 2.3 + si) * 0.6);
      const sparkleSize = 1.2 + Math.sin(breathePhase * 2.5 + s + si) * 0.8;
      const sc = sparkleColors[(s + si * 2) % sparkleColors.length];

      ctx.fillStyle = `rgba(${sc[0]}, ${sc[1]}, ${sc[2]}, ${sparkleAlpha})`;
      ctx.shadowBlur = 8;
      ctx.shadowColor = `rgba(${sc[0]}, ${sc[1]}, ${sc[2]}, 0.6)`;
      ctx.beginPath();
      ctx.arc(screenPt.x, screenPt.y, sparkleSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  // Center glow pulse
  const centerPt = window.leafletMap.latLngToContainerPoint(window.mapCenter);
  const glowSize = 15 + Math.sin(breathePhase * 2) * 5;
  const glowAlpha = 0.15 + Math.sin(breathePhase * 2) * 0.1;
  const centerGlow = ctx.createRadialGradient(centerPt.x, centerPt.y, 0, centerPt.x, centerPt.y, glowSize);
  centerGlow.addColorStop(0, `rgba(201, 168, 76, ${glowAlpha})`);
  centerGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = centerGlow;
  ctx.beginPath();
  ctx.arc(centerPt.x, centerPt.y, glowSize, 0, Math.PI * 2);
  ctx.fill();
}

// ===== Planet lines - Triple chart (Natal / Progressed / Transit) =====
function addBoostedPlanetLines() {
  if (window.boostedLines) return;
  window.boostedLines = [];
  const lat = window.mapCenter[0];
  const lng = window.mapCenter[1];
  const boostDistKm = 20000;
  const center = turf.point([lng, lat]);

  const planetMeta = TAROT_DATA.planetSymbols;
  const boosted = seedBoostData ? seedBoostData.boostedPlanets : [];

  // Layer groups for future ON/OFF control
  window.chartLayerGroups = {};
  window.planetSymbolMarkers = [];

  // Draw lines for each chart layer
  ['natal', 'progressed', 'transit'].forEach(layerKey => {
    const layerStyle = CHART_LAYERS[layerKey];
    const chartData = TRIPLE_CHART[layerKey];
    const layerGroup = L.layerGroup().addTo(window.leafletMap);
    window.chartLayerGroups[layerKey] = layerGroup;

    Object.entries(chartData).forEach(([name, pd]) => {
      const meta = planetMeta[name];
      const isBoosted = boosted.includes(name);

      // Line color: boosted planets use their own color, otherwise layer color
      const lineColor = (layerKey === 'natal' && isBoosted) ? meta.color : layerStyle.color;
      const lineOpacity = (layerKey === 'natal' && isBoosted) ? 0.7 : layerStyle.opacity;
      const lineWeight = (layerKey === 'natal' && isBoosted) ? 2.5 : layerStyle.weight;

      const linePoints = [];
      for (let d = 0; d <= boostDistKm; d += boostDistKm / 20) {
        const pt = turf.destination(center, d, pd.angle, { units: 'kilometers' });
        linePoints.push(L.latLng(pt.geometry.coordinates[1], normalizeLng(pt.geometry.coordinates[0], lng)));
      }
      const line = L.polyline(linePoints, {
        color: lineColor, weight: lineWeight, opacity: lineOpacity,
        dashArray: layerStyle.dash,
      });
      line.addTo(layerGroup);
      window.boostedLines.push(line);

      // Planet symbol marker (viewport edge tracking)
      const markerSize = layerKey === 'natal' ? 28 : 22;
      const fontSize = layerKey === 'natal' ? 15 : 11;
      const borderStyle = layerKey === 'natal' ? 'none' : '1.5px solid ' + layerStyle.color;
      const bgColor = layerStyle.markerBg;
      const fgColor = layerStyle.markerFg;
      const glowShadow = (layerKey === 'natal' && isBoosted)
        ? '0 0 12px ' + meta.color + ',0 2px 4px rgba(0,0,0,0.4)'
        : '0 2px 4px rgba(0,0,0,0.3)';

      const symMarker = L.marker(window.mapCenter, {
        icon: L.divIcon({
          className: '',
          html: '<div style="width:' + markerSize + 'px;height:' + markerSize + 'px;border-radius:50%;' +
                'background:' + bgColor + ';border:' + borderStyle + ';' +
                'display:flex;align-items:center;justify-content:center;font-size:' + fontSize + 'px;' +
                'color:' + fgColor + ';font-weight:bold;box-shadow:' + glowShadow + ';">' +
                meta.symbol + '</div>',
          iconSize: [markerSize, markerSize],
          iconAnchor: [markerSize / 2, markerSize / 2],
        }),
        interactive: false,
        zIndexOffset: layerKey === 'natal' ? 200 : (layerKey === 'transit' ? 100 : 50),
      });
      symMarker.addTo(layerGroup);
      window.boostedLines.push(symMarker);
      window.planetSymbolMarkers.push({
        marker: symMarker, angle: pd.angle, lineLatLngs: linePoints, layer: layerKey,
        planetName: name, line: line, baseOpacity: lineOpacity,
      });
    });
  });

  // Liang-Barsky viewport edge tracking
  function updatePlanetSymbolPositions() {
    if (!window.planetSymbolMarkers) return;
    const map = window.leafletMap;
    const mapSize = map.getSize();
    const m = 30;
    const xmin = m, ymin = m, xmax = mapSize.x - m, ymax = mapSize.y - m;
    window.planetSymbolMarkers.forEach(ps => {
      const pts = ps.lineLatLngs;
      let bestExitPx = null;
      let lastPx = null;
      let anyInside = false;
      for (let i = 0; i < pts.length; i++) {
        const px = map.latLngToContainerPoint(pts[i]);
        if (px.x >= xmin && px.x <= xmax && px.y >= ymin && px.y <= ymax) anyInside = true;
        if (i > 0) {
          const sdx = px.x - lastPx.x;
          const sdy = px.y - lastPx.y;
          let t0 = 0, t1 = 1;
          const sp = [-sdx, sdx, -sdy, sdy];
          const sq = [lastPx.x - xmin, xmax - lastPx.x, lastPx.y - ymin, ymax - lastPx.y];
          let valid = true;
          for (let j = 0; j < 4; j++) {
            if (sp[j] === 0) {
              if (sq[j] < 0) { valid = false; break; }
            } else {
              const t = sq[j] / sp[j];
              if (sp[j] < 0) t0 = Math.max(t0, t);
              else t1 = Math.min(t1, t);
            }
          }
          if (valid && t0 <= t1) {
            bestExitPx = L.point(lastPx.x + sdx * t1, lastPx.y + sdy * t1);
          }
        }
        lastPx = px;
      }
      if (bestExitPx) {
        ps.marker.setLatLng(map.containerPointToLatLng(bestExitPx));
        ps.marker.setOpacity(1);
      } else if (anyInside) {
        ps.marker.setLatLng(pts[pts.length - 1]);
        ps.marker.setOpacity(1);
      } else {
        ps.marker.setOpacity(0);
      }
    });
  }
  window.leafletMap.on('move moveend zoomend', updatePlanetSymbolPositions);
  updatePlanetSymbolPositions();

  // Seed marker (geo)
  const seedGeo = L.circleMarker(window.mapCenter, {
    radius: 6, color: '#C9A84C', fillColor: '#F5D76E',
    fillOpacity: 0.8, weight: 2, opacity: 0.8,
  }).addTo(window.leafletMap);
  window.boostedLines.push(seedGeo);

  // Seed emoji label (dynamic from drawn card)
  const seedEmoji = drawnCard ? drawnCard.emoji : '🌱';
  const seedLabel = L.marker(window.mapCenter, {
    icon: L.divIcon({
      className: '',
      html: '<div style="font-size:16px;text-align:center;filter:drop-shadow(0 0 6px rgba(201,168,76,0.6));">' + seedEmoji + '</div>',
      iconSize: [20, 20],
      iconAnchor: [10, 24],
    }),
    interactive: false,
  }).addTo(window.leafletMap);
  window.boostedLines.push(seedLabel);
}

// ===== Leaflet geo-sector creation (Mercator projection — pole-safe) =====
// Sectors are drawn in Leaflet's pixel coordinate space, then unprojected to lat/lng.
// This eliminates all geodesic pole-crossing issues regardless of user latitude.
// Score-based sector styling: |score| >= 3 → strong, 2-3 → light, <2 → transparent
// positive = gold (#C9A84C), negative = purple (#6B5CE7)
function scoreToStyle(score) {
  var abs = Math.abs(score);
  var isPositive = score >= 0;
  var color = isPositive ? '#C9A84C' : '#6B5CE7';
  var fillColor = isPositive ? '#C9A84C' : '#2D1B4E';
  var fillOpacity, borderOpacity, weight;
  if (abs >= 3) {
    fillOpacity = 0.40; borderOpacity = 0.85; weight = 3;
  } else if (abs >= 2) {
    fillOpacity = 0.20; borderOpacity = 0.50; weight = 2;
  } else {
    fillOpacity = 0; borderOpacity = 0; weight = 0;
  }
  return {
    init: { color: color, fillColor: fillColor, fillOpacity: 0, weight: weight, opacity: 0 },
    target: { color: color, fillColor: fillColor, fillOpacity: fillOpacity, opacity: borderOpacity, weight: weight }
  };
}

function createGeoSectors() {
  // If sectors already exist, remove them first (allows re-draw after card boost)
  if (window.geoSectorsVisible && window.geoSectors) {
    window.geoSectors.forEach(function(s) {
      if (s.polygon && window.leafletMap.hasLayer(s.polygon)) window.leafletMap.removeLayer(s.polygon);
      if (s.wrapPolygons) s.wrapPolygons.forEach(function(wp) {
        if (window.leafletMap.hasLayer(wp)) window.leafletMap.removeLayer(wp);
      });
    });
    window.geoSectors = [];
    window.geoSectorsVisible = false;
  }
  window.geoSectorsVisible = true;

  var lat = window.mapCenter[0];
  var lng = window.mapCenter[1];

  // --- Geodesic approach using turf.destination (no Mercator distortion) ---
  var geoRadius = 20000; // matches compass line distance


  // 16 directional sectors (22.5° each)
  var dirAngles = DIR16.map(function(d, i) {
    var center = i * 22.5;
    var start = ((center - 11.25) + 360) % 360;
    var end = (center + 11.25) % 360;
    return { dir: d, start: start, end: end };
  });

  var sectorScores = (window.aspectData && window.aspectData.sectorScores) || {};
  var centerPoint = turf.point([lng, lat]);

  dirAngles.forEach(function(d, i) {
    var startDeg = d.start;
    var endDeg = d.end;
    if (startDeg > endDeg) endDeg += 360;

    // Pole distance limit: only for N and S sectors (closest to poles)
    // All other sectors use full geoRadius
    var northPoleKm = (90 - lat) * 111.32 - 200;
    var southPoleKm = (90 + lat) * 111.32 - 200;
    var sectorRadius = geoRadius;
    if (d.dir === 'N') sectorRadius = Math.min(geoRadius, Math.max(1000, northPoleKm));
    if (d.dir === 'S') sectorRadius = Math.min(geoRadius, Math.max(1000, southPoleKm));

    // Build polygon using great circle points (100km steps)
    var latLngs = [L.latLng(lat, lng)];
    for (var km = 100; km <= sectorRadius; km += 100) {
      var dest = turf.destination(centerPoint, km, startDeg, { units: 'kilometers' });
      latLngs.push(L.latLng(dest.geometry.coordinates[1], normalizeLng(dest.geometry.coordinates[0], lng)));
    }
    var arcSteps = 40;
    for (var s = 1; s <= arcSteps; s++) {
      var bearing = startDeg + (endDeg - startDeg) * (s / arcSteps);
      var dest = turf.destination(centerPoint, sectorRadius, bearing, { units: 'kilometers' });
      latLngs.push(L.latLng(dest.geometry.coordinates[1], normalizeLng(dest.geometry.coordinates[0], lng)));
    }
    for (var km = sectorRadius - 100; km > 0; km -= 100) {
      var dest = turf.destination(centerPoint, km, endDeg, { units: 'kilometers' });
      latLngs.push(L.latLng(dest.geometry.coordinates[1], normalizeLng(dest.geometry.coordinates[0], lng)));
    }

    var dirScore = sectorScores[d.dir] || 0;
    var ss = scoreToStyle(dirScore);
    // Only apply glow CSS when sector is visible (target fillOpacity > 0)
    var cssClass = ss.target.fillOpacity > 0 ? (dirScore >= 0 ? 'sector-positive' : 'sector-negative') : '';
    var polygon = L.polygon(latLngs, { ...ss.init, className: cssClass }).addTo(window.leafletMap);

    var isBoosted = seedBoostData && seedBoostData.boostedSectors[d.dir];
    var sectorEntry = { polygon: polygon, score: dirScore, index: i, dir: d.dir, boosted: !!isBoosted, wrapPolygons: [] };

    [-360, 360].forEach(function(offset) {
      var shifted = latLngs.map(function(p) { return L.latLng(p.lat, p.lng + offset); });
      var wp = L.polygon(shifted, { ...ss.init, className: cssClass }).addTo(window.leafletMap);
      sectorEntry.wrapPolygons.push(wp);
    });

    window.geoSectors.push(sectorEntry);

    // Fade-in with cascade delay
    var delay = i * 120;
    var target = ss.target;
    setTimeout(function() {
      var step = 0;
      var maxSteps = 20;
      var fadeIn = setInterval(function() {
        step++;
        var t = step / maxSteps;
        var animStyle = {
          fillOpacity: target.fillOpacity * t,
          opacity: target.opacity * t,
          weight: target.weight,
        };
        polygon.setStyle(animStyle);
        sectorEntry.wrapPolygons.forEach(function(wp) { wp.setStyle(animStyle); });
        if (step >= maxSteps) clearInterval(fadeIn);
      }, 30);
    }, delay);
  });

  // Store sector scores globally for search/detection
  window.currentSectorScores = sectorScores;
}

// ===== Search & sector detection =====
let searchMarker = null;

function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) + '&limit=1')
    .then(r => r.json())
    .then(results => {
      if (!results.length) {
        showSearchResult('見つかりませんでした', '', 'neutral');
        return;
      }
      const place = results[0];
      const lat = parseFloat(place.lat);
      const lng = parseFloat(place.lon);
      const name = place.display_name.split(',').slice(0, 2).join(', ');

      document.getElementById('stellaMsg').classList.remove('visible');
      window.leafletMap.flyTo([lat, lng], 15, { duration: 1 });

      if (searchMarker) window.leafletMap.removeLayer(searchMarker);
      searchMarker = L.circleMarker([lat, lng], {
        radius: 8, color: '#fff', fillColor: '#C9A84C',
        fillOpacity: 0.9, weight: 2,
      }).addTo(window.leafletMap);

      const sector = detectSector(lat, lng);
      showSearchResult(name, sector.message, sector.type);
    })
    .catch(() => {
      showSearchResult('検索エラー', '', 'neutral');
    });
}

function detectSector(targetLat, targetLng) {
  const centerLat = window.mapCenter[0];
  const centerLng = window.mapCenter[1];

  const from = turf.point([centerLng, centerLat]);
  const to = turf.point([targetLng, targetLat]);
  let bearing = turf.bearing(from, to);
  if (bearing < 0) bearing += 360;

  const distance = turf.distance(from, to, { units: 'kilometers' });

  // Score-based sector classification (16 directions)
  var scores = window.currentSectorScores || {};
  const sectors = DIR16.map(function(d, i) {
    var center = i * 22.5;
    var start = ((center - 11.25) + 360) % 360;
    var end = (center + 11.25) % 360;
    var s = scores[d] || 0;
    var type = s >= 2 ? 'positive' : (s <= -2 ? 'negative' : 'neutral');
    return { start: start, end: end, type: type, score: s, dir: d, label: DIR16_LABELS[d] || d };
  });

  let matched = sectors[0];
  for (const s of sectors) {
    if (s.start > s.end) {
      if (bearing >= s.start || bearing < s.end) { matched = s; break; }
    } else {
      if (bearing >= s.start && bearing < s.end) { matched = s; break; }
    }
  }

  const distText = distance < 1 ? Math.round(distance * 1000) + 'm' : Math.round(distance) + 'km';
  const header = matched.label + '・' + distText;

  // Dynamic fortune context from aspect-based scoring
  const fortune = seedBoostData && seedBoostData.sectorFortune
    ? seedBoostData.sectorFortune[matched.dir] : null;
  const fortuneLabel = fortune ? FORTUNE_LABELS[fortune] : null;

  // Find dominant aspect type for this sector's planets
  let aspectNote = '';
  if (seedBoostData && seedBoostData.aspectResult) {
    const ar = seedBoostData.aspectResult;
    const planetsHere = Object.entries(ar.planetDir)
      .filter(([p, d]) => d === matched.dir).map(([p]) => p);
    const relevantAsps = ar.transitAspects.filter(a =>
      planetsHere.includes(a.p1) || planetsHere.includes(a.p2));
    const softAsps = relevantAsps.filter(a => a.quality === 'soft');
    const hardAsps = relevantAsps.filter(a => a.quality === 'hard');
    if (matched.type === 'positive' && softAsps.length > 0) {
      const a = softAsps[0];
      const sym1 = TAROT_DATA.planetSymbols[a.p1], sym2 = TAROT_DATA.planetSymbols[a.p2];
      if (sym1 && sym2) aspectNote = sym1.nameJP + '×' + sym2.nameJP + 'の' + a.type + 'が吉兆。';
    } else if (matched.type === 'negative' && hardAsps.length > 0) {
      const a = hardAsps[0];
      const sym1 = TAROT_DATA.planetSymbols[a.p1], sym2 = TAROT_DATA.planetSymbols[a.p2];
      if (sym1 && sym2) aspectNote = sym1.nameJP + '×' + sym2.nameJP + 'の' + a.type + 'に注意。';
    }
  }

  const positiveBody = fortuneLabel
    ? aspectNote + '【' + fortuneLabel + '】に追い風が吹いている方角。'
    : aspectNote + 'トランジットのソフトアスペクトが集まる吉方位。';
  const negativeBody = fortuneLabel
    ? aspectNote + '【' + fortuneLabel + '】の課題に向き合う方角。意識的に動くと成長につながる。'
    : aspectNote + 'ハードアスペクトが重なる方角。今日は意識して動くこと。';
  const neutralBody = fortuneLabel
    ? '【' + fortuneLabel + '】の流れが緩やかに動いている方角。気楽に楽しめる。'
    : 'アスペクトが中立的な方角。悪くないけど、最高でもない。';

  const messages = {
    positive: '✨ 吉方位（' + header + '）\n' + positiveBody,
    negative: '🌙 意識方位（' + header + '）\n' + negativeBody,
    neutral:  '💫 中間方位（' + header + '）\n' + neutralBody,
  };

  return { type: matched.type, message: messages[matched.type], fortune };
}

// ===== Effect video playback =====
function playEffectVideo(x, y) {
  const vid = document.getElementById('effectVideo');
  const size = 110;
  vid.style.width = size + 'px';
  vid.style.height = size + 'px';
  vid.style.left = (x - size / 2) + 'px';
  vid.style.top = (y - size / 2) + 'px';

// ===== Animation loop (auto-stop when idle) =====
function startAnimLoop() {
  if (animLoopRunning) return;
  animLoopRunning = true;
  animate();
}

function animate() {
  try {
    const ctx = particleCtx;
    ctx.clearRect(0, 0, mapW, mapH);

    breathePhase += 0.02;

    // Geo sparkles (Canvas)
    if (sectorAnimating) {
      sectorAnimProgress = Math.min(1, sectorAnimProgress + 0.012);
      drawGeoSparkles(ctx);
    }

    // Impact rings
    impactRings = impactRings.filter(ring => {
      ring.progress += 0.015;
      if (ring.progress < 1) {
        const alpha = (1 - ring.progress) * 0.4;
        ctx.strokeStyle = `rgba(201, 168, 76, ${alpha})`;
        ctx.lineWidth = 2 * (1 - ring.progress);
        ctx.beginPath();
        ctx.arc(ring.x, ring.y, ring.progress * Math.min(mapW, mapH) * 0.3, 0, Math.PI * 2);
        ctx.stroke();
        return true;
      }
      return false;
    });

    // Meteor
    updateMeteor();
    drawMeteor(ctx);

    // Particles
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      if (p.converge) {
        p.vx += (p.targetX - p.x) * 0.003;
        p.vy += (p.targetY - p.y) * 0.003;
      }
      p.update();
      p.draw(ctx);
    });

    ctx.globalAlpha = 1;
  } catch(e) {
    console.error('animate error:', e);
  }

  const hasWork = sectorAnimating || impactRings.length > 0 || meteor || particles.length > 0;
  if (hasWork) {
    setTimeout(animate, 16);
  } else {
    animLoopRunning = false;
  }
}

// ===== Apply tarot card from bridge data =====
function applyBridgeData() {
  var raw = localStorage.getItem('solara_tarot_bridge');
  if (!raw) return false;
  try {
    var bridge = JSON.parse(raw);
  } catch(e) { return false; }

  // Check if it's today's data
  var today = new Date().toISOString().slice(0, 10);
  if (bridge.date !== today) {
    localStorage.removeItem('solara_tarot_bridge');
    return false;
  }

  // Find the card in TAROT_DATA to get full data for calculateSeedBoost
  var allCards = [];
  TAROT_DATA.majorArcana.forEach(function(c) { allCards.push({ type:'major', ...c }); });
  TAROT_DATA.minorArcana.forEach(function(c) {
    var suit = TAROT_DATA.suitMapping[c.suit];
    allCards.push({ type:'minor', emoji: suit.emoji, ...c });
  });

  var matchedCard = null;
  for (var i = 0; i < allCards.length; i++) {
    if (allCards[i].displayName === bridge.cardName) {
      matchedCard = allCards[i];
      break;
    }
  }

  if (!matchedCard) return false;

  drawnCard = matchedCard;
  seedBoostData = calculateSeedBoost(drawnCard);

  // Update seed badge
  document.getElementById('seedBadge').textContent = drawnCard.emoji;

  // Hide pre-seed prompt
  document.getElementById('preseedPrompt').classList.add('hidden');

  // Launch meteor effect after short delay
  setTimeout(function() {
    launchMeteor(centerX, centerY);
    state = 'active';
  }, 800);

  return true;
}

function restart() {
  state = 'idle';
  particles = [];
  impactRings = [];
  meteor = null;
  drawnCard = null;
  seedBoostData = null;
  sectorAnimating = false;
  sectorAnimProgress = 0;

  document.getElementById('preseedPrompt').classList.remove('hidden');
  document.getElementById('preseedPrompt').classList.remove('bottom');
  document.getElementById('grayVeil').classList.remove('lifted');
  document.getElementById('stellaMsg').classList.remove('visible');
  document.getElementById('seedBadge').classList.remove('visible');
  document.getElementById('layerBtn').classList.remove('visible');
  document.getElementById('searchBar').classList.remove('visible');
  document.getElementById('searchResult').classList.remove('visible');
  document.getElementById('screenFlash').style.opacity = '0';
  const vid = document.getElementById('effectVideo');
  vid.pause();
  vid.currentTime = 0;
  vid.classList.remove('playing');

  if (window.leafletMap) {
    const baseLayers = new Set(window.baseOverlays || []);
    window.leafletMap.eachLayer(layer => {
      if (!(layer instanceof L.TileLayer) && !baseLayers.has(layer)) {
        window.leafletMap.removeLayer(layer);
      }
    });
    window.geoSectors = [];
    window.geoSectorsVisible = false;
    window.boostedLines = null;
    window.planetSymbolMarkers = null;
    window.chartLayerGroups = null;
    window.currentSectorScores = null;
  }

  drawMapOverlay();
}

// ===== Layer panel control =====
const PLANET_GROUPS = {
  personal:     ['sun', 'moon', 'mercury', 'venus', 'mars'],
  social:       ['jupiter', 'saturn'],
  generational: ['uranus', 'neptune', 'pluto'],
};

// Planets relevant to each fortune category
const FORTUNE_PLANETS = {
  healing:       ['moon', 'neptune', 'venus'],
  money:         ['jupiter', 'venus', 'sun'],
  love:          ['venus', 'mars', 'moon'],
  work:          ['saturn', 'sun', 'mars', 'jupiter'],
  communication: ['mercury', 'sun', 'venus'],
};

var layerVisibility = { natal: true, progressed: true, transit: true, sectors: true, compass: true };
var groupVisibility  = { personal: true, social: true, generational: true };
var fortuneFilter   = null; // null = show all; otherwise one of FORTUNE_PLANETS keys

function setFortuneFilter(cat) {
  // 'all' = clear filter, show default blessed/shadow/mid
  if (cat === 'all') {
    fortuneFilter = null;
  } else {
    fortuneFilter = (fortuneFilter === cat) ? null : cat;
  }
  document.querySelectorAll('.fortune-pill').forEach(function(el) {
    var ft = el.getAttribute('data-fortune');
    el.classList.toggle('active', fortuneFilter ? ft === fortuneFilter : ft === 'all');
  });
  applyLayerVisibility();

  // Show rest advice if no sectors match the selected fortune
  var overlay = document.getElementById('fortuneRestOverlay');
  var textEl = document.getElementById('fortuneRestText');
  if (!overlay) return;
  if (fortuneFilter) {
    var fScoresAdv = (window.aspectData && window.aspectData.fortuneScores && window.aspectData.fortuneScores[fortuneFilter]) || {};
    var hasMatch = Object.values(fScoresAdv).some(function(v) { return v > 0.01; });
    if (!hasMatch) {
      textEl.textContent = FORTUNE_REST_ADVICE[fortuneFilter] || '';
      overlay.classList.add('visible');
    } else {
      overlay.classList.remove('visible');
    }
  } else {
    overlay.classList.remove('visible');
  }
}

function dismissFortuneAdvice() {
  var overlay = document.getElementById('fortuneRestOverlay');
  if (overlay) overlay.classList.remove('visible');
}

// ===== Fortune Bottom Sheet =====
var fortuneSheetOpen = false;
var fortuneSheetTab = 'all';

function toggleFortuneSheet() {
  var sheet = document.getElementById('fortuneSheet');
  var pull = document.getElementById('fortuneSheetPull');
  fortuneSheetOpen = !fortuneSheetOpen;
  sheet.classList.toggle('open', fortuneSheetOpen);
  pull.innerHTML = fortuneSheetOpen ? '▼ 閉じる' : '▲ 運勢方位';
  if (fortuneSheetOpen) renderFortuneSheet();
}

function switchFortuneTab(tab) {
  fortuneSheetTab = tab;
  document.querySelectorAll('.fortune-sheet-tab').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-ftab') === tab);
  });
  renderFortuneSheet();
  // Also sync map fortune filter (except 'all' which clears it)
  if (tab === 'all') {
    if (fortuneFilter) setFortuneFilter(fortuneFilter); // toggle off
  } else if (fortuneFilter !== tab) {
    if (fortuneFilter) setFortuneFilter(fortuneFilter); // clear old
    setFortuneFilter(tab); // set new
  }
}

function renderFortuneSheet() {
  var body = document.getElementById('fortuneSheetBody');
  if (!body || !window.aspectData) return;

  var dirs = DIR16;
  var scores;
  var label;

  if (fortuneSheetTab === 'all') {
    scores = window.aspectData.sectorScores;
    label = '総合';
  } else {
    scores = (window.aspectData.fortuneScores && window.aspectData.fortuneScores[fortuneSheetTab]) || {};
    label = FORTUNE_LABELS[fortuneSheetTab] || fortuneSheetTab;
  }

  var vals = dirs.map(function(d) { return scores[d] || 0; });

  // Bar width: 1-5 equal spacing (each = 1/6 of bar width), 5+ compressed into last 1/6
  // Total bar = 6 equal zones: |1|2|3|4|5|5+|
  function scoreToPct(v) {
    var abs = Math.abs(v);
    if (abs <= 5) return (abs / 5) * (100 * 5 / 6);           // 0-5 maps to 0-83.3%
    return (5 / 6) * 100 + (1 / 6) * 100 * Math.min((abs - 5) / 5, 1); // 5+ compressed into last 16.7%
  }

  // Tick marks HTML (at positions 1,2,3,4,5)
  var ticks = '';
  for (var t = 1; t <= 5; t++) {
    ticks += '<div class="fortune-dir-tick" style="left:' + (t / 6 * 100) + '%"></div>';
  }

  // Sort by score descending
  var sorted = dirs.slice().sort(function(a, b) { return (scores[b] || 0) - (scores[a] || 0); });

  var html = '';
  sorted.forEach(function(dir) {
    var score = scores[dir] || 0;
    if (Math.abs(score) < 0.01) return; // Hide zero scores
    var pct = scoreToPct(score);
    var cls = score > 0.01 ? 'positive' : 'negative';
    var badge = '';
    if (fortuneSheetTab === 'all' && window.aspectData.sectorFortune) {
      var cat = window.aspectData.sectorFortune[dir];
      if (cat) badge = '<span class="fortune-dir-badge">' + (FORTUNE_LABELS[cat] || '') + '</span>';
    }
    var scoreStr = Math.abs(score).toFixed(2);
    html += '<div class="fortune-dir-row" onclick="flashSector(\'' + dir + '\')">'
      + '<div class="fortune-dir-label">' + (DIR16_LABELS[dir] || dir) + '</div>'
      + '<div class="fortune-dir-bar-wrap">' + ticks + '<div class="fortune-dir-bar ' + cls + '" style="width:' + pct + '%"></div></div>'
      + '<div class="fortune-dir-score ' + cls + '">' + scoreStr + badge + '</div>'
      + '</div>';
  });

  // If tab is a category with all zeros, show rest advice
  if (fortuneSheetTab !== 'all' && vals.every(function(v) { return Math.abs(v) < 0.01; })) {
    html = '<div style="text-align:center;padding:20px 10px;color:#888;font-size:12px;line-height:1.8;white-space:pre-line;">'
      + '🌙\n' + (FORTUNE_REST_ADVICE[fortuneSheetTab] || '') + '</div>';
  }

  body.innerHTML = html;
}

function flashSector(dir) {
  // Close the fortune sheet
  if (fortuneSheetOpen) toggleFortuneSheet();

  // Find the sector
  var sector = window.geoSectors && window.geoSectors.find(function(s) { return s.dir === dir; });
  if (!sector) return;

  // Flash: toggle high opacity on/off for 3 seconds
  var score = sector.score || 0;
  var flashColor = '#26D0CE';
  var flashFill = '#26D0CE';
  var flashStyle = { color: flashColor, fillColor: flashFill, fillOpacity: 0.40, opacity: 0.9, weight: 3 };
  var dimStyle = { color: flashColor, fillColor: flashFill, fillOpacity: 0, opacity: 0, weight: 0 };

  var polys = [sector.polygon].concat(sector.wrapPolygons || []);
  var count = 0;
  var interval = setInterval(function() {
    var on = count % 2 === 0;
    var st = on ? flashStyle : dimStyle;
    polys.forEach(function(p) { p.setStyle(st); });
    count++;
    if (count >= 6) { // 3 on + 3 off = 3 seconds at 500ms
      clearInterval(interval);
      // Restore to score-based style
      var ss = scoreToStyle(score);
      polys.forEach(function(p) { p.setStyle(ss.target); });
    }
  }, 500);
}

// Swipe/drag gesture for fortune sheet (touch + mouse)
(function() {
  var sheet = document.getElementById('fortuneSheet');
  var pull = document.getElementById('fortuneSheetPull');
  if (!sheet) return;
  var startY = 0, dragging = false;

  function handleStart(y) { startY = y; dragging = true; }
  function handleEnd(y) {
    if (!dragging) return;
    dragging = false;
    var dy = y - startY;
    if (dy > 40 && fortuneSheetOpen) toggleFortuneSheet();
    if (dy < -40 && !fortuneSheetOpen) toggleFortuneSheet();
  }

  // Touch events
  function onTouchStart(e) { handleStart(e.touches[0].clientY); }
  function onTouchEnd(e) { handleEnd(e.changedTouches[0].clientY); }

  // Mouse events
  function onMouseDown(e) { handleStart(e.clientY); }
  function onMouseUp(e) { handleEnd(e.clientY); }

  [sheet, pull].forEach(function(el) {
    if (!el) return;
    el.addEventListener('touchstart', onTouchStart, { passive: true });
    el.addEventListener('touchend', onTouchEnd, { passive: true });
    el.addEventListener('mousedown', onMouseDown);
    el.addEventListener('mouseup', onMouseUp);
  });
})();

function toggleLayerPanel() {
  var panel = document.getElementById('layerPanel');
  var btn = document.getElementById('layerBtn');
  var isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');

    }, 0);

}

function closeLayerPanelOutside(e) {
  var panel = document.getElementById('layerPanel');
  var btn = document.getElementById('layerBtn');
  var fortuneOverlay = document.getElementById('fortuneRestOverlay');
  if (!panel.contains(e.target) && !btn.contains(e.target)
      && !(fortuneOverlay && fortuneOverlay.contains(e.target))) {
    panel.classList.remove('open');
    btn.classList.remove('active');
    document.removeEventListener('pointerdown', closeLayerPanelOutside);
  }
}

function toggleLayerItem(el) {
  var layer = el.getAttribute('data-layer');
  var isOn = el.classList.toggle('on');
  layerVisibility[layer] = isOn;
  applyLayerVisibility();
}

function toggleGroupItem(el) {
  var group = el.getAttribute('data-group');
  var isOn = el.classList.toggle('on');
  groupVisibility[group] = isOn;
  applyLayerVisibility();
}

function applyLayerVisibility() {
  if (!window.chartLayerGroups || !window.leafletMap) return;

  // Chart layers (natal/progressed/transit)
  ['natal', 'progressed', 'transit'].forEach(function(key) {
    var group = window.chartLayerGroups[key];
    if (!group) return;
    if (layerVisibility[key]) {
      if (!window.leafletMap.hasLayer(group)) window.leafletMap.addLayer(group);
    } else {
      if (window.leafletMap.hasLayer(group)) window.leafletMap.removeLayer(group);
    }
  });

  // Planet lines: layer + group + fortune filter
  if (window.planetSymbolMarkers) {
    window.planetSymbolMarkers.forEach(function(ps) {
      if (!ps.planetName) return;
      var planetGroup = null;
      for (var g in PLANET_GROUPS) {
        if (PLANET_GROUPS[g].indexOf(ps.planetName) !== -1) { planetGroup = g; break; }
      }
      if (!planetGroup) return;
      var layerOn  = layerVisibility[ps.layer];
      var groupOn  = groupVisibility[planetGroup];
      var fortuneOn = !fortuneFilter || (FORTUNE_PLANETS[fortuneFilter] || []).indexOf(ps.planetName) !== -1;
      var fullyOn  = layerOn && groupOn && fortuneOn;
      var dimmed   = layerOn && groupOn && !fortuneOn && !!fortuneFilter;
      ps.marker.setOpacity(fullyOn ? 1 : (dimmed ? 0.1 : 0));
      if (ps.line) {
        ps.line.setStyle({ opacity: fullyOn ? ps.baseOpacity : (dimmed ? 0.05 : 0) });
      }
    });
  }

  // Sectors: layer visibility + fortune filter (score-based, not dominant-only)
  if (window.geoSectors) {
    var fScores = (window.aspectData && window.aspectData.fortuneScores) || {};
    window.geoSectors.forEach(function(s) {
      if (!s.polygon) return;
      var sectorOn = layerVisibility.sectors;
      var newStyle;
      if (!sectorOn) {
        newStyle = { fillOpacity: 0, opacity: 0 };
      } else if (fortuneFilter && fScores[fortuneFilter]) {
        var catScore = fScores[fortuneFilter][s.dir] || 0;
        var ss = scoreToStyle(catScore);
        newStyle = ss.target;
      } else {
        var ss = scoreToStyle(s.score || 0);
        newStyle = ss.target;
      }
      s.polygon.setStyle(newStyle);
      if (s.wrapPolygons) s.wrapPolygons.forEach(function(wp) { wp.setStyle(newStyle); });
    });
  }

  // Compass (base overlays)
  if (window.baseOverlays) {
    window.baseOverlays.forEach(function(layer) {
      if (layer.setOpacity) layer.setOpacity(layerVisibility.compass ? 1 : 0);
      else if (layer.setStyle) layer.setStyle({ opacity: layerVisibility.compass ? 0.35 : 0 });
    });
  }
}
