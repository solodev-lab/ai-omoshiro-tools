<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Solara - Seed Alignment Mockup</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0A0A14;
    color: #E8E0D0;
    font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== Phone frame ===== */
  .phone-frame {
    width: 375px;
    height: 812px;
    background: #0A0A14;
    border-radius: 40px;
    border: 2px solid #1a1a2e;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(107, 92, 231, 0.15), 0 0 120px rgba(201, 168, 76, 0.05);
  }

  /* ===== Status bar ===== */
  .status-bar {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #666;
    letter-spacing: 1px;
    position: relative;
    z-index: 100;
  }

  /* ===== Map container ===== */
  .map-container {
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    bottom: 80px;
    overflow: hidden;
  }

  #mapCanvas {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* ===== Sectors overlay (CSS for glow) ===== */
  .sector-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* ===== Particle canvas ===== */
  #particleCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
  }

  /* ===== Shockwave canvas ===== */
  #shockwaveCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* ===== Search bar ===== */
  .search-bar {
    position: absolute;
    top: 55px;
    left: 16px;
    right: 16px;
    z-index: 110;
    display: none;
  }

  .search-bar.visible {
    display: flex;
    gap: 6px;
  }

  .search-input {
    flex: 1;
    padding: 10px 14px;
    background: rgba(15, 15, 30, 0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    color: #E8E0D0;
    font-size: 13px;
    outline: none;
  }

  .search-input:focus {
    border-color: rgba(201, 168, 76, 0.4);
  }

  .search-input::placeholder {
    color: #555;
  }

  .search-btn {
    padding: 10px 14px;
    background: rgba(201, 168, 76, 0.15);
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 10px;
    color: #C9A84C;
    font-size: 14px;
    cursor: pointer;
  }

  /* Search result popup */
  .search-result {
    position: absolute;
    bottom: 160px;
    left: 16px;
    right: 16px;
    z-index: 110;
    background: rgba(15, 15, 30, 0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 14px 16px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
  }

  .search-result.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .search-result-name {
    font-size: 13px;
    color: #E8E0D0;
    margin-bottom: 6px;
  }

  .search-result-sector {
    font-size: 12px;
    line-height: 1.5;
  }

  .search-result-sector.blessed { color: #C9A84C; }
  .search-result-sector.shadow { color: #8B7AE8; }
  .search-result-sector.mid { color: #6B8AAB; }

  .search-result-close {
    position: absolute;
    top: 8px;
    right: 12px;
    background: none;
    border: none;
    color: #555;
    font-size: 16px;
    cursor: pointer;
  }

  /* ===== Leaflet overrides ===== */
  .leaflet-control-zoom, .leaflet-control-attribution {
    display: none !important;
  }

  /* Blessed sector glow via CSS */
  .sector-blessed {
    filter: drop-shadow(0 0 6px rgba(201, 168, 76, 0.5)) drop-shadow(0 0 12px rgba(80, 210, 255, 0.2));
  }
  .sector-shadow {
    filter: drop-shadow(0 0 4px rgba(107, 92, 231, 0.3));
  }

  /* ===== Stella message ===== */
  .stella-message {
    position: absolute;
    bottom: 90px;
    left: 20px;
    right: 20px;
    z-index: 110;
    background: rgba(15, 15, 30, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 16px;
    padding: 16px 20px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
  }

  .stella-message.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .stella-name {
    font-size: 10px;
    letter-spacing: 2px;
    color: #6B5CE7;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stella-text {
    font-size: 13px;
    line-height: 1.6;
    color: #E8E0D0;
  }

  .stella-text .highlight {
    color: #C9A84C;
    font-weight: 600;
  }

  /* ===== Seed badge ===== */
  .seed-badge {
    position: absolute;
    top: 56px;
    right: 20px;
    z-index: 110;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(201, 168, 76, 0.15);
    border: 1px solid rgba(201, 168, 76, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.5s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .seed-badge.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* ===== Card overlay (full screen tarot draw) ===== */
  .card-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    background: rgba(5, 5, 12, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .card-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .card-prompt {
    font-size: 14px;
    color: #666;
    letter-spacing: 2px;
    margin-bottom: 40px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s 0.3s forwards;
  }

  .tarot-card {
    width: 160px;
    height: 260px;
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .card-back, .card-front {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
  }

  .card-back {
    background: linear-gradient(135deg, #1a0a30, #0d0520);
    border: 1px solid rgba(107, 92, 231, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(107, 92, 231, 0.2);
  }

  .card-back-pattern {
    width: 80%;
    height: 80%;
    border: 1px solid rgba(107, 92, 231, 0.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    background: radial-gradient(circle, rgba(107, 92, 231, 0.1), transparent);
  }

  .card-front {
    background: linear-gradient(135deg, #1a1025, #0f0a18);
    border: 1px solid rgba(201, 168, 76, 0.5);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(201, 168, 76, 0.3);
  }

  .card-element {
    font-size: 48px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 15px rgba(201, 168, 76, 0.6));
  }

  .card-name {
    font-size: 14px;
    letter-spacing: 3px;
    color: #C9A84C;
    text-transform: uppercase;
  }

  .card-subtitle {
    font-size: 11px;
    color: #8B7A5E;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .tarot-card.flipped {
    transform: rotateY(180deg);
  }

  .tarot-card.shrinking {
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    transform: rotateY(180deg) scale(0.15) translate(400px, -800px);
    opacity: 0;
  }

  /* ===== Bottom nav ===== */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: rgba(10, 10, 20, 0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 20px 15px;
    z-index: 90;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0.4;
    cursor: pointer;
    transition: opacity 0.3s;
  }

  .nav-item.active {
    opacity: 1;
  }

  .nav-icon {
    font-size: 20px;
  }

  .nav-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .nav-item.active .nav-label {
    color: #C9A84C;
  }

  /* ===== CTA Button ===== */
  .cta-button {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 80;
    padding: 14px 32px;
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.2), rgba(201, 168, 76, 0.1));
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 30px;
    color: #C9A84C;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  .cta-button:hover {
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.3), rgba(201, 168, 76, 0.15));
    box-shadow: 0 0 30px rgba(201, 168, 76, 0.2);
  }

  .cta-button.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(20px);
  }

  /* ===== Layer indicator ===== */
  .layer-indicator {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 70;
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .layer-indicator.visible {
    opacity: 1;
  }

  .layer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
  }

  .layer-dot.l1 { background: rgba(107, 92, 231, 0.6); }
  .layer-dot.l2 { background: rgba(201, 168, 76, 0.6); }
  .layer-dot.seed { background: rgba(245, 215, 110, 0.8); }

  /* ===== Screen flash ===== */
  .screen-flash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(201, 168, 76, 0.15);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
  }

  /* ===== Gray overlay for pre-seed state ===== */
  .gray-veil {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 10, 20, 0.5);
    z-index: 5;
    transition: opacity 1s ease;
  }

  .gray-veil.lifted {
    opacity: 0;
    pointer-events: none;
  }

  /* ===== Effect video overlay ===== */
  .effect-video {
    position: absolute;
    z-index: 18;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 0.3s;
    object-fit: cover;
  }

  .effect-video.playing {
    opacity: 1;
    animation: effectColorShift 1.5s ease-in-out;
  }

  @keyframes effectColorShift {
    0%   { filter: hue-rotate(0deg) brightness(1.2) saturate(1.5); }
    25%  { filter: hue-rotate(-30deg) brightness(1.5) saturate(1.8); }
    50%  { filter: hue-rotate(160deg) brightness(1.3) saturate(1.6); }
    75%  { filter: hue-rotate(60deg) brightness(1.4) saturate(1.4); }
    100% { filter: hue-rotate(0deg) brightness(1.0) saturate(1.0); }
  }

  /* ===== Pre-seed prompt ===== */
  .preseed-prompt {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    text-align: center;
    transition: opacity 0.5s;
  }

  .preseed-prompt.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .preseed-icon {
    font-size: 32px;
    margin-bottom: 16px;
    opacity: 0.6;
    animation: float 3s ease-in-out infinite;
  }

  .preseed-text {
    font-size: 12px;
    color: #555;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  /* ===== Animations ===== */
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes sectorBreathe {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 0.85; }
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 10px rgba(201, 168, 76, 0.3); }
    50% { box-shadow: 0 0 25px rgba(201, 168, 76, 0.6); }
  }

  /* ===== Restart button ===== */
  .restart-btn {
    position: absolute;
    top: 16px;
    left: 20px;
    z-index: 150;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    color: #666;
    font-size: 10px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 1px;
  }

  .restart-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #999;
  }
</style>
</head>
<body>

<div class="phone-frame" id="phone">
  <div class="status-bar">SOLARA</div>

  <button class="restart-btn" onclick="restart()">REPLAY</button>

  <!-- Seed badge (appears after card drawn) -->
  <div class="seed-badge" id="seedBadge">&#x1F30A;</div>

  <!-- Search bar -->
  <div class="search-bar" id="searchBar">
    <input class="search-input" id="searchInput" type="text" placeholder="&#x1F50D; &#x5834;&#x6240;&#x3092;&#x691C;&#x7D22;..." />
    <button class="search-btn" onclick="doSearch()">&#x2192;</button>
  </div>

  <!-- Search result -->
  <div class="search-result" id="searchResult">
    <button class="search-result-close" onclick="closeSearchResult()">&#x2715;</button>
    <div class="search-result-name" id="searchResultName"></div>
    <div class="search-result-sector" id="searchResultSector"></div>
  </div>

  <!-- Stella message -->
  <div class="stella-message" id="stellaMsg">
    <div class="stella-name">&#x2728; Stella</div>
    <div class="stella-text">
      <span class="highlight">&#x300E;&#x518D;&#x4F1A;&#x306E;&#x559C;&#x3073;&#x300F;</span>&#x304C;&#x4ECA;&#x65E5;&#x306E;&#x7A2E;&#x3002;&#x5317;&#x6771;&#x306E;&#x98A8;&#x304C;&#x3001;&#x61D0;&#x304B;&#x3057;&#x3044;&#x8AB0;&#x304B;&#x3068;&#x306E;&#x7E01;&#x3092;&#x904B;&#x3093;&#x3067;&#x304F;&#x308B;&#x3088;&#x3002;
    </div>
  </div>

  <!-- Map area -->
  <div class="map-container" id="mapContainer">
    <div id="leafletMap" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;"></div>
    <canvas id="mapCanvas"></canvas>
    <div class="gray-veil" id="grayVeil"></div>
    <canvas id="particleCanvas"></canvas>
    <div class="screen-flash" id="screenFlash"></div>

    <!-- Effect video (additive blend via CSS mix-blend-mode: screen) -->
    <video class="effect-video" id="effectVideo" muted playsinline preload="auto"
           src="effect_impact.mp4"></video>

    <!-- Pre-seed prompt -->
    <div class="preseed-prompt" id="preseedPrompt">
      <div class="preseed-icon">&#x1F331;</div>
      <div class="preseed-text">
        &#x4ECA;&#x65E5;&#x306E;&#x65B9;&#x4F4D;&#x306F;&#x307E;&#x3060;&#x7720;&#x3063;&#x3066;&#x3044;&#x308B;&#x3088;<br>
        Seed&#x30AB;&#x30FC;&#x30C9;&#x3067;&#x8D77;&#x3053;&#x3057;&#x3066;&#xFF1F;
      </div>
    </div>
  </div>

  <!-- CTA Button -->
  <button class="cta-button" id="ctaButton" onclick="startCardDraw()">
    &#x1F331; DRAW SEED CARD
  </button>

  <!-- Layer indicator -->
  <div class="layer-indicator" id="layerIndicator">
    <div class="layer-dot l1"></div>
    <div class="layer-dot l2"></div>
    <div class="layer-dot seed"></div>
  </div>

  <!-- Card overlay -->
  <div class="card-overlay" id="cardOverlay">
    <div class="card-prompt">TAP TO REVEAL</div>
    <div class="tarot-card" id="tarotCard" onclick="flipCard()">
      <div class="card-back">
        <div class="card-back-pattern">&#x2726;</div>
      </div>
      <div class="card-front">
        <div class="card-element">&#x1F30A;</div>
        <div class="card-name">CUP III</div>
        <div class="card-subtitle">&#x518D;&#x4F1A;&#x306E;&#x559C;&#x3073;</div>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon">&#x1F9ED;</div>
      <div class="nav-label">Action</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">&#x1F300;</div>
      <div class="nav-label">Rhythm</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">&#x2728;</div>
      <div class="nav-label">Intentions</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">&#x1F464;</div>
      <div class="nav-label">Profile</div>
    </div>
  </div>
</div>

<script>
// ===== Constants =====
const GOLD = '#C9A84C';
const GOLD_LIGHT = '#F5D76E';
const PURPLE = '#6B5CE7';
const DARK_PURPLE = '#2D1B4E';
const BLUE_GRAY = '#3A4A6B';
const BG = '#0A0A14';

// Sector definitions: startAngle, endAngle (degrees, 0=North clockwise), type
const SECTORS_DORMANT = [
  { start: -22.5, end: 22.5,   type: 'neutral', label: 'N' },
  { start: 22.5,  end: 67.5,   type: 'neutral', label: 'NE' },
  { start: 67.5,  end: 112.5,  type: 'neutral', label: 'E' },
  { start: 112.5, end: 157.5,  type: 'neutral', label: 'SE' },
  { start: 157.5, end: 202.5,  type: 'neutral', label: 'S' },
  { start: 202.5, end: 247.5,  type: 'neutral', label: 'SW' },
  { start: 247.5, end: 292.5,  type: 'neutral', label: 'W' },
  { start: 292.5, end: 337.5,  type: 'neutral', label: 'NW' },
];

// After seed: NE becomes blessed(gold), E/SE become shadow(purple), rest mid
const SECTORS_ACTIVE = [
  { start: -22.5, end: 22.5,   type: 'mid',     label: 'N' },
  { start: 22.5,  end: 67.5,   type: 'blessed',  label: 'NE' },  // Moon line = Cup boost
  { start: 67.5,  end: 112.5,  type: 'shadow',  label: 'E' },
  { start: 112.5, end: 157.5,  type: 'shadow',  label: 'SE' },
  { start: 157.5, end: 202.5,  type: 'mid',     label: 'S' },
  { start: 202.5, end: 247.5,  type: 'mid',     label: 'SW' },
  { start: 247.5, end: 292.5,  type: 'blessed', label: 'W' },   // Neptune line
  { start: 292.5, end: 337.5,  type: 'mid',     label: 'NW' },
];

// ===== State =====
let state = 'idle'; // idle, cardOverlay, flipped, transitioning, active
let particles = [];
let trailParticles = [];
let mapCtx, particleCtx;
let mapW, mapH, centerX, centerY;
let sectorAnimProgress = 0;
let sectorAnimating = false;
let seedMarker = null;
let seedMarkerPulse = 0;
let breathePhase = 0;
let impactRings = [];

// ===== Init =====
function init() {
  const mapCanvas = document.getElementById('mapCanvas');
  const particleCanvas = document.getElementById('particleCanvas');
  const container = document.getElementById('mapContainer');

  const rect = container.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;

  mapW = rect.width;
  mapH = rect.height;
  centerX = mapW / 2;
  centerY = mapH / 2;

  mapCanvas.width = mapW * dpr;
  mapCanvas.height = mapH * dpr;
  mapCanvas.style.width = mapW + 'px';
  mapCanvas.style.height = mapH + 'px';

  particleCanvas.width = mapW * dpr;
  particleCanvas.height = mapH * dpr;
  particleCanvas.style.width = mapW + 'px';
  particleCanvas.style.height = mapH + 'px';

  mapCtx = mapCanvas.getContext('2d');
  mapCtx.scale(dpr, dpr);

  particleCtx = particleCanvas.getContext('2d');
  particleCtx.scale(dpr, dpr);

  // Init Leaflet dark map (skip if already initialized)
  if (window._leafletMapReady) {
    window.leafletMap.invalidateSize();
    drawMap(false);
    return;
  }
  const mapCenter = [35.1815, 136.9262]; // 名古屋市東区役所
  const map = L.map('leafletMap', {
    zoomControl: false,
    attributionControl: false,
    dragging: true,
    scrollWheelZoom: true,
    doubleClickZoom: true,
    touchZoom: true,
    minZoom: 2,
    maxZoom: 18,
    worldCopyJump: true,
  }).setView(mapCenter, 12);

  // Dark base + brighter labels/roads for readability
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    opacity: 0.7,
  }).addTo(map);
  // Overlay: labels and roads only (brighter)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    opacity: 1,
  }).addTo(map);

  // Leaflet geo-sectors (will be shown after seed draw)
  window.leafletMap = map;
  window._leafletMapReady = true;
  window.mapCenter = mapCenter;
  window.geoSectors = [];
  window.geoSectorsVisible = false;
  window.baseOverlays = [];
  // (Globe auto-switch removed - Leaflet only with great circle sectors)

  // ===== Geo-based compass, directions, planet lines, L1 sectors =====
  const lat = mapCenter[0];
  const lng = mapCenter[1];
  const compassRadiusKm = 1.5;

  // Helper: get lat/lng at angle and distance from center
  function geoPoint(angleDeg, distKm) {
    const pLat = lat + Math.cos(angleDeg * Math.PI / 180) * (distKm / 111.32);
    const pLng = lng + Math.sin(angleDeg * Math.PI / 180) * (distKm / (111.32 * Math.cos(lat * Math.PI / 180)));
    return [pLat, pLng];
  }

  // Compass circles
  function makeGeoCircle(radiusKm, color, weight, dashArray) {
    const pts = [];
    for (let a = 0; a <= 360; a += 5) {
      pts.push(geoPoint(a, radiusKm));
    }
    const c = L.polyline(pts, { color, weight, opacity: 0.15, dashArray }).addTo(map);
    window.baseOverlays.push(c);
    return c;
  }
  makeGeoCircle(compassRadiusKm, '#ffffff', 1, null);
  makeGeoCircle(compassRadiusKm * 0.5, '#ffffff', 0.5, '3 6');

  // Direction lines (8 directions)
  [0, 45, 90, 135, 180, 225, 270, 315].forEach(deg => {
    const end = geoPoint(deg, compassRadiusKm * 1.2);
    const line = L.polyline([mapCenter, end], {
      color: '#6B5CE7', weight: 0.5, opacity: 0.2
    }).addTo(map);
    window.baseOverlays.push(line);
  });

  // Direction labels as markers
  const labelOffset = compassRadiusKm * 1.3;
  const labels = [
    { text: 'N', angle: 0 }, { text: 'NE', angle: 45 },
    { text: 'E', angle: 90 }, { text: 'SE', angle: 135 },
    { text: 'S', angle: 180 }, { text: 'SW', angle: 225 },
    { text: 'W', angle: 270 }, { text: 'NW', angle: 315 },
  ];
  labels.forEach(l => {
    const isCardinal = l.text.length === 1;
    const pos = geoPoint(l.angle, labelOffset);
    const marker = L.marker(pos, {
      icon: L.divIcon({
        className: '',
        html: '<div style="color:rgba(255,255,255,' + (isCardinal ? '0.3' : '0.15') +
              ');font-size:' + (isCardinal ? '10' : '8') + 'px;text-align:center;font-family:sans-serif;">' +
              l.text + '</div>',
        iconSize: [20, 14],
        iconAnchor: [10, 7],
      }),
      interactive: false,
    }).addTo(map);
    window.baseOverlays.push(marker);
  });

  // Layer 1 sectors (subtle purple, geo-based)
  const l1Defs = [
    { start: -22.5, end: 67.5, opacity: 0.08 },
    { start: 157.5, end: 247.5, opacity: 0.05 },
    { start: 292.5, end: 337.5, opacity: 0.06 },
  ];
  l1Defs.forEach(s => {
    const pts = [L.latLng(lat, lng)];
    for (let a = s.start; a <= s.end; a += 2) {
      pts.push(geoPoint(a, compassRadiusKm));
    }
    pts.push(geoPoint(s.end, compassRadiusKm));
    const poly = L.polygon(pts, {
      color: '#6B5CE7', fillColor: '#6B5CE7',
      fillOpacity: s.opacity, weight: 0, opacity: 0,
    }).addTo(map);
    window.baseOverlays.push(poly);
  });

  // Planet lines (great circle, global scale)
  const planetLinesDef = [
    { angle: 35, color: '#6B5CE7', opacity: 0.4, symbol: '☽' },
    { angle: 260, color: '#6B5CE7', opacity: 0.3, symbol: '♆' },
    { angle: 150, color: '#6B5CE7', opacity: 0.25, symbol: '♇' },
  ];
  const planetLineDistKm = 20000;
  const planetCenter = turf.point([lng, lat]);
  window.planetSymbolMarkers = [];
  planetLinesDef.forEach(pl => {
    // Great circle line points
    const linePoints = [];
    for (let d = 0; d <= planetLineDistKm; d += planetLineDistKm / 60) {
      const pt = turf.destination(planetCenter, d, pl.angle, { units: 'kilometers' });
      linePoints.push(L.latLng(pt.geometry.coordinates[1], pt.geometry.coordinates[0]));
    }
    const line = L.polyline(linePoints, {
      color: pl.color, weight: 1.5, opacity: pl.opacity, dashArray: '4 6',
    }).addTo(map);
    window.baseOverlays.push(line);

    // Planet symbol marker (will be repositioned dynamically)
    const symMarker = L.marker(mapCenter, {
      icon: L.divIcon({
        className: '',
        html: '<div style="width:28px;height:28px;border-radius:50%;background:rgba(201,168,76,0.9);display:flex;align-items:center;justify-content:center;font-size:15px;color:#1a0a30;text-shadow:none;font-weight:bold;box-shadow:0 0 10px rgba(201,168,76,0.5),0 2px 4px rgba(0,0,0,0.4);">' + pl.symbol + '</div>',
        iconSize: [28, 28],
        iconAnchor: [14, 14],
      }),
      interactive: false,
    }).addTo(map);
    window.baseOverlays.push(symMarker);
    window.planetSymbolMarkers.push({ marker: symMarker, angle: pl.angle });
  });

  // Reposition planet symbols to viewport edge on every map move
  function updatePlanetSymbolPositions() {
    if (!window.planetSymbolMarkers) return;
    const bounds = map.getBounds();
    const mapSize = map.getSize();
    const centerPx = map.latLngToContainerPoint(mapCenter);

    window.planetSymbolMarkers.forEach(ps => {
      const rad = (ps.angle - 90) * Math.PI / 180;
      // Cast ray from center toward angle, find where it hits viewport edge
      const dx = Math.cos(rad);
      const dy = Math.sin(rad);

      // Distance to each edge from center pixel
      let t = Infinity;
      if (dx > 0) t = Math.min(t, (mapSize.x - 30 - centerPx.x) / dx);
      if (dx < 0) t = Math.min(t, (30 - centerPx.x) / dx);
      if (dy > 0) t = Math.min(t, (mapSize.y - 30 - centerPx.y) / dy);
      if (dy < 0) t = Math.min(t, (30 - centerPx.y) / dy);

      // Clamp and convert back to latlng
      t = Math.max(t * 0.85, 20); // 85% toward edge, minimum 20px from center
      const edgePx = L.point(centerPx.x + dx * t, centerPx.y + dy * t);
      const edgeLatLng = map.containerPointToLatLng(edgePx);
      ps.marker.setLatLng(edgeLatLng);
    });
  }

  map.on('move zoom moveend zoomend', updatePlanetSymbolPositions);
  updatePlanetSymbolPositions();

  // Center marker (user location)
  const centerMarker = L.circleMarker(mapCenter, {
    radius: 4, color: '#E8E0D0', fillColor: '#E8E0D0',
    fillOpacity: 0.8, weight: 0,
  }).addTo(map);
  window.baseOverlays.push(centerMarker);

  drawMap(false);
  animate();
}

function drawBlob(ctx, x, y, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, Math.random() * 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawSector(ctx, cx, cy, r, startDeg, endDeg, color) {
  const startRad = (startDeg - 90) * Math.PI / 180;
  const endRad = (endDeg - 90) * Math.PI / 180;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, startRad, endRad);
  ctx.closePath();
  ctx.fill();
}

function drawPlanetLine(ctx, cx, cy, deg, length, color, symbol) {
  const rad = (deg - 90) * Math.PI / 180;
  const endX = cx + Math.cos(rad) * length;
  const endY = cy + Math.sin(rad) * length;

  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(endX, endY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Symbol at end
  ctx.fillStyle = color;
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(symbol, endX + Math.cos(rad) * 12, endY + Math.sin(rad) * 12 + 4);
}

// ===== Draw active sectors with animation =====
function drawActiveSectors(progress) {
  const ctx = mapCtx;
  const radius = Math.min(mapW, mapH) * 0.38;

  // Redraw base map
  drawMap(true);

  // Impact point (NE direction for Cup III / Moon line)
  const impactDeg = 35;
  const impactRad = (impactDeg - 90) * Math.PI / 180;
  const impactX = centerX + Math.cos(impactRad) * radius * 0.6;
  const impactY = centerY + Math.sin(impactRad) * radius * 0.6;

  // Draw active sectors spreading from impact point
  SECTORS_ACTIVE.forEach((sector, i) => {
    // Calculate distance from impact to sector center for cascade delay
    const sectorCenterDeg = (sector.start + sector.end) / 2;
    const dist = Math.abs(sectorCenterDeg - impactDeg);
    const normalizedDist = Math.min(dist, 360 - dist) / 180;
    const delay = normalizedDist * 0.4;
    const sectorProgress = Math.max(0, Math.min(1, (progress - delay) / 0.6));

    if (sectorProgress <= 0) return;

    let color, glowColor;
    const breathe = 0.85 + Math.sin(breathePhase + i * 0.5) * 0.15;

    const r = radius * sectorProgress;
    const startRad = (sector.start - 90) * Math.PI / 180;
    const endRad = (sector.end - 90) * Math.PI / 180;
    const midRad = ((sector.start + sector.end) / 2 - 90) * Math.PI / 180;

    if (sector.type === 'blessed') {
      // === BLESSED: multi-color radial glow (gold → white → cyan) ===
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.arc(centerX, centerY, r, startRad, endRad);
      ctx.closePath();
      ctx.clip();

      // Layer 1: warm gold base
      const baseAlpha = 0.10 * sectorProgress * breathe;
      ctx.fillStyle = `rgba(201, 168, 76, ${baseAlpha})`;
      ctx.fill();

      // Layer 2: center = hot white/gold, mid = gold, edge = cyan
      const gx = centerX + Math.cos(midRad) * r * 0.35;
      const gy = centerY + Math.sin(midRad) * r * 0.35;
      const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, r * 0.8);
      const a = 0.28 * sectorProgress * breathe;
      grad.addColorStop(0, `rgba(255, 250, 220, ${a})`);        // hot white center
      grad.addColorStop(0.25, `rgba(245, 200, 80, ${a * 0.7})`); // warm gold
      grad.addColorStop(0.5, `rgba(100, 200, 180, ${a * 0.4})`); // teal transition
      grad.addColorStop(0.75, `rgba(60, 180, 220, ${a * 0.25})`); // cyan
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, mapW, mapH);

      // Layer 3: pulsing core with color shift
      const corePhase = breathePhase * 2 + i;
      const coreR = Math.floor(255 - Math.sin(corePhase) * 30);
      const coreG = Math.floor(230 + Math.sin(corePhase * 0.7) * 25);
      const coreB = Math.floor(160 + Math.sin(corePhase * 1.3) * 80);
      const corePulse = 0.18 * sectorProgress * (0.6 + Math.sin(corePhase) * 0.4);
      const coreGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r * 0.45);
      coreGrad.addColorStop(0, `rgba(${coreR}, ${coreG}, ${coreB}, ${corePulse})`);
      coreGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = coreGrad;
      ctx.fillRect(0, 0, mapW, mapH);

      // Layer 4: outer cyan mist (slowly drifting)
      const mist = ctx.createRadialGradient(
        centerX + Math.cos(midRad) * r * 0.7,
        centerY + Math.sin(midRad) * r * 0.7,
        0,
        centerX + Math.cos(midRad) * r * 0.7,
        centerY + Math.sin(midRad) * r * 0.7,
        r * 0.4
      );
      const mistAlpha = 0.12 * sectorProgress * (0.5 + Math.sin(breathePhase * 1.5 + i * 2) * 0.5);
      mist.addColorStop(0, `rgba(80, 220, 255, ${mistAlpha})`);
      mist.addColorStop(1, 'transparent');
      ctx.fillStyle = mist;
      ctx.fillRect(0, 0, mapW, mapH);

      ctx.restore();

      // Layer 5: full sector outline (arc + side lines)
      const edgeAlpha = 0.25 * sectorProgress * breathe;
      // Gold outline - full sector shape
      ctx.strokeStyle = `rgba(201, 168, 76, ${edgeAlpha})`;
      ctx.lineWidth = 2;
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'rgba(201, 168, 76, 0.5)';
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + Math.cos(startRad) * r, centerY + Math.sin(startRad) * r);
      ctx.arc(centerX, centerY, r, startRad, endRad);
      ctx.lineTo(centerX, centerY);
      ctx.stroke();
      // Cyan outer glow - full sector shape
      ctx.strokeStyle = `rgba(80, 210, 255, ${0.12 * sectorProgress * breathe})`;
      ctx.lineWidth = 1;
      ctx.shadowBlur = 12;
      ctx.shadowColor = 'rgba(80, 210, 255, 0.4)';
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + Math.cos(startRad) * (r + 3), centerY + Math.sin(startRad) * (r + 3));
      ctx.arc(centerX, centerY, r + 3, startRad, endRad);
      ctx.lineTo(centerX, centerY);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Layer 6: multi-color sparkles
      if (sectorProgress > 0.5) {
        const sparkleColors = [
          [255, 245, 200],  // warm white
          [245, 200, 80],   // gold
          [100, 220, 200],  // teal
          [80, 180, 255],   // cyan
          [200, 160, 255],  // soft purple
          [255, 220, 120],  // amber
        ];
        const sparkleCount = 6;
        for (let s = 0; s < sparkleCount; s++) {
          const angle = startRad + (endRad - startRad) * ((s + 0.5) / sparkleCount);
          const drift = Math.sin(breathePhase * 1.5 + s * 1.1) * 0.15;
          const dist = r * (0.25 + 0.45 * ((Math.sin(breathePhase * 1.8 + s * 1.7) + 1) / 2));
          const sx = centerX + Math.cos(angle + drift) * dist;
          const sy = centerY + Math.sin(angle + drift) * dist;
          const sparkleAlpha = 0.5 * sectorProgress * (0.4 + Math.sin(breathePhase * 3.5 + s * 2.3) * 0.6);
          const sparkleSize = 1.2 + Math.sin(breathePhase * 2.5 + s) * 0.8;
          const sc = sparkleColors[s % sparkleColors.length];

          ctx.fillStyle = `rgba(${sc[0]}, ${sc[1]}, ${sc[2]}, ${sparkleAlpha})`;
          ctx.shadowBlur = 8;
          ctx.shadowColor = `rgba(${sc[0]}, ${sc[1]}, ${sc[2]}, 0.6)`;
          ctx.beginPath();
          ctx.arc(sx, sy, sparkleSize, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

    } else if (sector.type === 'shadow') {
      // === SHADOW: subtle dark purple ===
      drawSector(ctx, centerX, centerY, r, sector.start, sector.end,
        `rgba(45, 27, 78, ${0.14 * sectorProgress * breathe})`);

    } else {
      // === MID: subtle blue-gray with faint inner glow ===
      drawSector(ctx, centerX, centerY, r, sector.start, sector.end,
        `rgba(58, 74, 107, ${0.08 * sectorProgress * breathe})`);

      // Faint radial glow for mid sectors
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.arc(centerX, centerY, r, startRad, endRad);
      ctx.closePath();
      ctx.clip();
      const midGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, r * 0.6);
      midGrad.addColorStop(0, `rgba(100, 120, 160, ${0.06 * sectorProgress * breathe})`);
      midGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = midGrad;
      ctx.fillRect(0, 0, mapW, mapH);
      ctx.restore();
    }
  });

  // (Boosted planet lines now on Leaflet via addBoostedPlanetLines)

  // Seed marker
  if (progress > 0.5 && seedMarker) {
    const markerAlpha = Math.min(1, (progress - 0.5) / 0.3);
    seedMarkerPulse += 0.05;
    const glow = 8 + Math.sin(seedMarkerPulse) * 5;

    ctx.save();
    ctx.globalAlpha = markerAlpha;

    // Outer glow
    const markerGlow = ctx.createRadialGradient(
      seedMarker.x, seedMarker.y, 0,
      seedMarker.x, seedMarker.y, glow + 10
    );
    markerGlow.addColorStop(0, 'rgba(201, 168, 76, 0.4)');
    markerGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = markerGlow;
    ctx.beginPath();
    ctx.arc(seedMarker.x, seedMarker.y, glow + 10, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = GOLD;
    ctx.beginPath();
    ctx.arc(seedMarker.x, seedMarker.y, 4, 0, Math.PI * 2);
    ctx.fill();

    // Symbol
    ctx.fillStyle = `rgba(201, 168, 76, ${0.8 + Math.sin(seedMarkerPulse) * 0.2})`;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🌊', seedMarker.x, seedMarker.y - 12);

    ctx.restore();
  }

  // Impact rings
  impactRings.forEach(ring => {
    const alpha = (1 - ring.progress) * 0.4;
    ctx.strokeStyle = `rgba(201, 168, 76, ${alpha})`;
    ctx.lineWidth = 2 * (1 - ring.progress);
    ctx.beginPath();
    ctx.arc(ring.x, ring.y, ring.progress * radius * 0.8, 0, Math.PI * 2);
    ctx.stroke();
  });
}

// ===== Particle system =====
class Particle {
  constructor(x, y, vx, vy, color, size, life, decay) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.size = size;
    this.life = life;
    this.maxLife = life;
    this.decay = decay;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.life -= this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;

    // Glow
    ctx.shadowBlur = 12;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function spawnImpactParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    const size = 1 + Math.random() * 2.5;
    const life = 0.4 + Math.random() * 0.4;
    const color = Math.random() > 0.3 ? GOLD : GOLD_LIGHT;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      color, size, life, 0.025
    ));
  }
}

function spawnTrailParticle(x, y) {
  const size = 1 + Math.random() * 2;
  const color = Math.random() > 0.5 ? GOLD : PURPLE;
  trailParticles.push(new Particle(
    x + (Math.random() - 0.5) * 6,
    y + (Math.random() - 0.5) * 6,
    (Math.random() - 0.5) * 0.5,
    (Math.random() - 0.5) * 0.5,
    color, size, 0.8, 0.02
  ));
}

function spawnConvergingParticles(targetX, targetY, count) {
  const colors = [
    '#FFFBE6',   // bright white-gold
    '#F5D76E',   // gold
    '#FFE8A0',   // warm white
    '#C9A84C',   // dark gold
  ];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    // Spawn from full screen edges (much wider range)
    const dist = 150 + Math.random() * 250;
    const startX = targetX + Math.cos(angle) * dist;
    const startY = targetY + Math.sin(angle) * dist;
    const speed = 0.012 + Math.random() * 0.018;
    const color = colors[Math.floor(Math.random() * colors.length)];

    const p = new Particle(
      startX, startY,
      (targetX - startX) * speed,
      (targetY - startY) * speed,
      color,
      1 + Math.random() * 2.5,
      1.2 + Math.random() * 0.8,
      0.018
    );
    p.converge = true;
    p.targetX = targetX;
    p.targetY = targetY;
    particles.push(p);
  }
}

// ===== Meteor trail (light beam from top) =====
let meteor = null;

function launchMeteor(targetX, targetY) {
  meteor = {
    x: targetX - 40,
    y: -20,
    targetX: targetX,
    targetY: targetY,
    progress: 0,
    speed: 0.025,
    trail: [],
  };
}

function updateMeteor() {
  if (!meteor) return;
  meteor.progress += meteor.speed;
  meteor.speed += 0.002; // accelerate

  const t = Math.min(1, meteor.progress);
  const ease = t * t; // ease in (accelerate)
  meteor.x = (meteor.targetX - 40) + (40) * ease;
  meteor.y = -20 + (meteor.targetY + 20) * ease;

  // Trail disabled (line only)

  // Pre-fire effect video slightly before impact
  if (t >= 0.6 && !meteor.effectStarted) {
    meteor.effectStarted = true;
    playEffectVideo(meteor.targetX, meteor.targetY);
  }

  // Impact (trigger sectors, stella, etc.)
  if (t >= 1 && !meteor.impacted) {
    meteor.impacted = true;
    onMeteorImpact(meteor.targetX, meteor.targetY);
  }

  if (t >= 1) {
    meteor = null;
  }
}

function drawMeteor(ctx) {
  if (!meteor) return;
  const t = Math.min(1, meteor.progress);
  if (t >= 1) return;

  // Head glow
  ctx.save();
  const headGlow = ctx.createRadialGradient(meteor.x, meteor.y, 0, meteor.x, meteor.y, 12);
  headGlow.addColorStop(0, 'rgba(245, 215, 110, 0.9)');
  headGlow.addColorStop(0.5, 'rgba(201, 168, 76, 0.4)');
  headGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = headGlow;
  ctx.beginPath();
  ctx.arc(meteor.x, meteor.y, 12, 0, Math.PI * 2);
  ctx.fill();

  // Core
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(meteor.x, meteor.y, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ===== Impact handler =====
function onMeteorImpact(x, y) {
  // Screen flash
  const flash = document.getElementById('screenFlash');
  flash.style.transition = 'none';
  flash.style.opacity = '0.6';
  setTimeout(() => {
    flash.style.transition = 'opacity 0.6s ease';
    flash.style.opacity = '0';
  }, 50);

  // Impact rings + converging particles
  impactRings.push({ x, y, progress: 0 });

  setTimeout(() => {
    spawnConvergingParticles(centerX, centerY, 60);
  }, 300);

  // Haptic
  if (navigator.vibrate) navigator.vibrate([30, 50, 30]);

  // Effect video already started before impact (in updateMeteor)

  // Seed marker flag (geo marker added via addBoostedPlanetLines)
  seedMarker = true;

  // Start sector animation + geo sectors + boosted lines (all Leaflet)
  setTimeout(() => {
    sectorAnimating = true;
    sectorAnimProgress = 0;
    createGeoSectors();
    addBoostedPlanetLines();

    // Lift gray veil
    document.getElementById('grayVeil').classList.add('lifted');

    // Show layer indicator + search bar
    document.getElementById('layerIndicator').classList.add('visible');
    document.getElementById('searchBar').classList.add('visible');
  }, 300);

  // Show stella message
  setTimeout(() => {
    document.getElementById('stellaMsg').classList.add('visible');
  }, 1200);

  // Show seed badge
  setTimeout(() => {
    document.getElementById('seedBadge').classList.add('visible');
  }, 800);
}

// ===== Geo-aware sparkles on Canvas =====
function drawGeoSparkles(ctx) {
  if (!window.leafletMap || !window.geoSectorsVisible) return;

  const lat = window.mapCenter[0];
  const lng = window.mapCenter[1];
  const radiusKm = 2000; // sparkles within 2000km range

  const sparkleColors = [
    [255, 250, 220],  // warm white
    [245, 200, 80],   // gold
    [100, 220, 200],  // teal
    [80, 180, 255],   // cyan
    [255, 240, 160],  // light gold
  ];

  // Only sparkle in blessed sectors
  const blessedDefs = [
    { start: 22.5, end: 67.5 },   // NE
    { start: 247.5, end: 292.5 },  // W
  ];

  blessedDefs.forEach((sector, si) => {
    const sparkleCount = 5;
    for (let s = 0; s < sparkleCount; s++) {
      const angleRange = sector.end - sector.start;
      const angle = sector.start + angleRange * ((s + 0.5) / sparkleCount);
      const drift = Math.sin(breathePhase * 1.5 + s * 1.1 + si * 3) * 2;
      const distFrac = 0.2 + 0.5 * ((Math.sin(breathePhase * 1.8 + s * 1.7 + si * 2) + 1) / 2);
      const distKm = radiusKm * distFrac;

      // Geo position of sparkle (turf great circle)
      const center = turf.point([lng, lat]);
      const dest = turf.destination(center, distKm, angle + drift, { units: 'kilometers' });
      const sLat = dest.geometry.coordinates[1];
      const sLng = dest.geometry.coordinates[0];

      // Convert to screen coordinates
      const screenPt = window.leafletMap.latLngToContainerPoint([sLat, sLng]);
      // Adjust for map container offset within phone frame
      const mapContainer = document.getElementById('mapContainer');
      const mapRect = mapContainer.getBoundingClientRect();
      const leafletRect = document.getElementById('leafletMap').getBoundingClientRect();
      const sx = screenPt.x;
      const sy = screenPt.y;

      const sparkleAlpha = 0.5 * sectorAnimProgress * (0.4 + Math.sin(breathePhase * 3.5 + s * 2.3 + si) * 0.6);
      const sparkleSize = 1.2 + Math.sin(breathePhase * 2.5 + s + si) * 0.8;
      const sc = sparkleColors[(s + si * 2) % sparkleColors.length];

      ctx.fillStyle = `rgba(${sc[0]}, ${sc[1]}, ${sc[2]}, ${sparkleAlpha})`;
      ctx.shadowBlur = 8;
      ctx.shadowColor = `rgba(${sc[0]}, ${sc[1]}, ${sc[2]}, 0.6)`;
      ctx.beginPath();
      ctx.arc(sx, sy, sparkleSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  // Center glow pulse
  const centerPt = window.leafletMap.latLngToContainerPoint(window.mapCenter);
  const glowSize = 15 + Math.sin(breathePhase * 2) * 5;
  const glowAlpha = 0.15 + Math.sin(breathePhase * 2) * 0.1;
  const centerGlow = ctx.createRadialGradient(centerPt.x, centerPt.y, 0, centerPt.x, centerPt.y, glowSize);
  centerGlow.addColorStop(0, `rgba(201, 168, 76, ${glowAlpha})`);
  centerGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = centerGlow;
  ctx.beginPath();
  ctx.arc(centerPt.x, centerPt.y, glowSize, 0, Math.PI * 2);
  ctx.fill();
}

// ===== Geodesic arc helper (turf.js) =====
// Returns array of [lat, lng] along the great-circle arc from center at given bearing/distance
function geodesicArc(centerLat, centerLng, radiusKm, startDeg, endDeg, steps) {
  const origin = turf.point([centerLng, centerLat]);
  const points = [];
  for (let s = 0; s <= steps; s++) {
    const bearing = startDeg + (endDeg - startDeg) * (s / steps);
    const dest = turf.destination(origin, radiusKm, bearing, { units: 'kilometers' });
    const [dLng, dLat] = dest.geometry.coordinates;
    points.push(L.latLng(dLat, dLng));
  }
  return points;
}

// ===== Leaflet geo-sector creation =====
// Generate arc points along a great circle at given bearing range
function geodesicArc(lat, lng, radiusKm, startBearing, endBearing, steps) {
  const center = turf.point([lng, lat]);
  const points = [];
  for (let i = 0; i <= steps; i++) {
    const bearing = startBearing + (endBearing - startBearing) * (i / steps);
    const dest = turf.destination(center, radiusKm, bearing, { units: 'kilometers' });
    const coords = dest.geometry.coordinates;
    points.push(L.latLng(coords[1], coords[0]));
  }
  return points;
}

function createGeoSectors() {
  if (window.geoSectorsVisible) return;
  window.geoSectorsVisible = true;

  const lat = window.mapCenter[0];
  const lng = window.mapCenter[1];
  const radiusKm = 20000; // 20,000km - half of earth

  // Test: East and West sectors + great circle boundary lines
  const sectorDefs = [
    [85, 95,    'blessed'],   // True East (narrow band)
    [265, 275,  'blessed'],   // True West (narrow band)
  ];

  // Draw great circle boundary lines explicitly for visual debug
  [90, 270].forEach(bearing => {
    const center = turf.point([lng, lat]);
    const linePoints = [];
    for (let d = 0; d <= 10000; d += 100) {
      const pt = turf.destination(center, d, bearing, { units: 'kilometers' });
      linePoints.push(L.latLng(pt.geometry.coordinates[1], pt.geometry.coordinates[0]));
    }
    L.polyline(linePoints, {
      color: '#ff0000', weight: 2, opacity: 0.8, dashArray: '6 4'
    }).addTo(window.leafletMap);
  });

  const typeStyles = {
    blessed: {
      color: '#C9A84C',
      fillColor: '#C9A84C',
      fillOpacity: 0,
      weight: 2,
      opacity: 0,
    },
    shadow: {
      color: '#6B5CE7',
      fillColor: '#2D1B4E',
      fillOpacity: 0,
      weight: 1,
      opacity: 0,
    },
    mid: {
      color: '#3A4A6B',
      fillColor: '#3A4A6B',
      fillOpacity: 0,
      weight: 1,
      opacity: 0,
    },
  };

  const targetStyles = {
    blessed: { fillOpacity: 0.12, opacity: 0.5, weight: 2 },
    shadow:  { fillOpacity: 0.10, opacity: 0.25, weight: 1 },
    mid:     { fillOpacity: 0.06, opacity: 0.2, weight: 1 },
  };

  sectorDefs.forEach((def, i) => {
    const [startDeg, endDeg, type] = def;
    // Center + geodesic arc points
    // Side edges + outer arc all as great circles
    const center = turf.point([lng, lat]);
    // Left side edge: center → start bearing (great circle path)
    const leftEdge = [];
    for (let d = 0; d <= radiusKm; d += radiusKm / 30) {
      const pt = turf.destination(center, d, startDeg, { units: 'kilometers' });
      leftEdge.push(L.latLng(pt.geometry.coordinates[1], pt.geometry.coordinates[0]));
    }
    // Outer arc
    const arcPoints = geodesicArc(lat, lng, radiusKm, startDeg, endDeg, 50);
    // Right side edge: end bearing → center (great circle path, reversed)
    const rightEdge = [];
    for (let d = radiusKm; d >= 0; d -= radiusKm / 30) {
      const pt = turf.destination(center, d, endDeg, { units: 'kilometers' });
      rightEdge.push(L.latLng(pt.geometry.coordinates[1], pt.geometry.coordinates[0]));
    }
    const points = [...leftEdge, ...arcPoints, ...rightEdge];

    const style = typeStyles[type];
    const polygon = L.polygon(points, { ...style, className: 'sector-' + type }).addTo(window.leafletMap);
    window.geoSectors.push({ polygon, type, index: i });

    // Animate fade-in with cascade delay
    const delay = i * 120;
    const target = targetStyles[type];
    setTimeout(() => {
      let step = 0;
      const maxSteps = 20;
      const fadeIn = setInterval(() => {
        step++;
        const t = step / maxSteps;
        polygon.setStyle({
          fillOpacity: target.fillOpacity * t,
          opacity: target.opacity * t,
          weight: target.weight,
        });
        if (step >= maxSteps) clearInterval(fadeIn);
      }, 30);
    }, delay);
  });

  // Add blessed sector extra glow (second polygon with larger radius, very faint)
  sectorDefs.forEach((def, i) => {
    const [startDeg, endDeg, type] = def;
    if (type !== 'blessed') return;
    const glowRadius = radiusKm * 1.05;
    const arcPoints = geodesicArc(lat, lng, glowRadius, startDeg, endDeg, 24);
    const points = [L.latLng(lat, lng), ...arcPoints];
    const glow = L.polygon(points, {
      color: '#50D2FF',
      fillColor: 'transparent',
      fillOpacity: 0,
      weight: 1,
      opacity: 0.3,
      dashArray: '4 4',
    }).addTo(window.leafletMap);

    setTimeout(() => {
      glow.setStyle({ opacity: 0.3 });
    }, i * 120 + 600);
  });

  // Duplicate sectors at ±360° longitude for seamless world wrap
  function shiftPoints(pts, lngOffset) {
    return pts.map(p => L.latLng(p.lat, p.lng + lngOffset));
  }

  window.geoSectors.forEach(s => {
    const origPts = s.polygon.getLatLngs()[0];
    const targetStyle = targetStyles[s.type];
    [-360, 360].forEach(offset => {
      const shifted = shiftPoints(origPts, offset);
      const copy = L.polygon(shifted, {
        ...typeStyles[s.type],
        className: 'sector-' + s.type,
        fillOpacity: targetStyle.fillOpacity,
        opacity: targetStyle.opacity,
        weight: targetStyle.weight,
      }).addTo(window.leafletMap);
    });
  });
}

// ===== Search & sector detection =====
let searchMarker = null;

function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  // Nominatim geocoding (free, OSM)
  fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) + '&limit=1')
    .then(r => r.json())
    .then(results => {
      if (!results.length) {
        showSearchResult('見つかりませんでした', '', 'mid');
        return;
      }
      const place = results[0];
      const lat = parseFloat(place.lat);
      const lng = parseFloat(place.lon);
      const name = place.display_name.split(',').slice(0, 2).join(', ');

      // Hide stella message
      document.getElementById('stellaMsg').classList.remove('visible');

      // Fly to location
      window.leafletMap.flyTo([lat, lng], 15, { duration: 1 });

      // Place marker
      if (searchMarker) window.leafletMap.removeLayer(searchMarker);
      searchMarker = L.circleMarker([lat, lng], {
        radius: 8, color: '#fff', fillColor: '#C9A84C',
        fillOpacity: 0.9, weight: 2,
      }).addTo(window.leafletMap);

      // Determine which sector this location falls in
      const sector = detectSector(lat, lng);
      showSearchResult(name, sector.message, sector.type);
    })
    .catch(() => {
      showSearchResult('検索エラー', '', 'mid');
    });
}

function detectSector(targetLat, targetLng) {
  const centerLat = window.mapCenter[0];
  const centerLng = window.mapCenter[1];

  // Calculate bearing from center to target using turf
  const from = turf.point([centerLng, centerLat]);
  const to = turf.point([targetLng, targetLat]);
  let bearing = turf.bearing(from, to);
  if (bearing < 0) bearing += 360;

  const distance = turf.distance(from, to, { units: 'kilometers' });

  // Sector definitions
  const sectors = [
    { start: 337.5, end: 22.5,   type: 'mid',     dir: 'N',  label: '北' },
    { start: 22.5,  end: 67.5,   type: 'blessed', dir: 'NE', label: '北東' },
    { start: 67.5,  end: 112.5,  type: 'shadow',  dir: 'E',  label: '東' },
    { start: 112.5, end: 157.5,  type: 'shadow',  dir: 'SE', label: '南東' },
    { start: 157.5, end: 202.5,  type: 'mid',     dir: 'S',  label: '南' },
    { start: 202.5, end: 247.5,  type: 'mid',     dir: 'SW', label: '南西' },
    { start: 247.5, end: 292.5,  type: 'blessed', dir: 'W',  label: '西' },
    { start: 292.5, end: 337.5,  type: 'mid',     dir: 'NW', label: '北西' },
  ];

  let matched = sectors[0];
  for (const s of sectors) {
    if (s.start > s.end) {
      // Wraps around 0 (N sector)
      if (bearing >= s.start || bearing < s.end) { matched = s; break; }
    } else {
      if (bearing >= s.start && bearing < s.end) { matched = s; break; }
    }
  }

  const distText = distance < 1 ? Math.round(distance * 1000) + 'm' : Math.round(distance) + 'km';
  const messages = {
    blessed: '✨ 吉方位（' + matched.label + '・' + distText + '）\nこの場所は金星のエネルギーが流れている方角。今日のデートにぴったり！',
    shadow: '🌙 要注意方位（' + matched.label + '・' + distText + '）\n今日はこの方角は控えめに。別の日なら輝くかも。',
    mid: '💫 中間方位（' + matched.label + '・' + distText + '）\n悪くないけど、最高でもない。気楽に楽しめる方角。',
  };

  return { type: matched.type, message: messages[matched.type] };
}

function showSearchResult(name, message, type) {
  document.getElementById('searchResultName').textContent = name;
  const sectorEl = document.getElementById('searchResultSector');
  sectorEl.textContent = message;
  sectorEl.className = 'search-result-sector ' + type;
  sectorEl.style.whiteSpace = 'pre-line';
  document.getElementById('searchResult').classList.add('visible');
}

function closeSearchResult() {
  document.getElementById('searchResult').classList.remove('visible');
  if (searchMarker) {
    window.leafletMap.removeLayer(searchMarker);
    searchMarker = null;
  }
}

// Enter key to search
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('searchInput')) {
    doSearch();
  }
});

// ===== Effect video playback =====
function playEffectVideo(x, y) {
  const vid = document.getElementById('effectVideo');
  const size = 110; // effect size in px
  vid.style.width = size + 'px';
  vid.style.height = size + 'px';
  vid.style.left = (x - size / 2) + 'px';
  vid.style.top = (y - size / 2) + 'px';
  vid.currentTime = 0;
  vid.playbackRate = 3.0;
  vid.classList.add('playing');
  vid.play().catch(() => {});
  vid.onended = () => {
    vid.classList.remove('playing');
  };
}

// ===== Animation loop =====
function animate() {
  try {
    const ctx = particleCtx;
    ctx.clearRect(0, 0, mapW, mapH);

    // Update breathe
    breathePhase += 0.02;

    // Sector sparkles on Canvas (geo-aware) + globe redraw
    if (sectorAnimating) {
      sectorAnimProgress = Math.min(1, sectorAnimProgress + 0.012);
      drawGeoSparkles(ctx);
    }

    // Update impact rings
    impactRings = impactRings.filter(ring => {
      ring.progress += 0.015;
      return ring.progress < 1;
    });

    // Update & draw meteor line + particles
    updateMeteor();
    drawMeteor(ctx);

    // Update & draw particles (converging)
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      if (p.converge) {
        p.vx += (p.targetX - p.x) * 0.003;
        p.vy += (p.targetY - p.y) * 0.003;
      }
      p.update();
      p.draw(ctx);
    });

    ctx.globalAlpha = 1;
  } catch(e) {
    console.error('animate error:', e);
  }
  // Use setTimeout instead of rAF to avoid background tab throttling
  setTimeout(animate, 16);
}

// ===== User interaction flow =====
function startCardDraw() {
  state = 'cardOverlay';
  document.getElementById('cardOverlay').classList.add('active');
  document.getElementById('ctaButton').classList.add('hidden');
  document.getElementById('preseedPrompt').classList.add('hidden');
}

function flipCard() {
  if (state !== 'cardOverlay') return;
  state = 'flipped';
  document.getElementById('tarotCard').classList.add('flipped');

  // After flip animation, shrink and transition
  setTimeout(() => {
    state = 'transitioning';
    document.getElementById('tarotCard').classList.add('shrinking');

    setTimeout(() => {
      document.getElementById('cardOverlay').classList.remove('active');

      // Impact at center
      const impactX = centerX;
      const impactY = centerY;

      // Meteor trail then impact
      launchMeteor(impactX, impactY);
      state = 'active';
    }, 600);
  }, 1200);
}

function restart() {
  // Reset all state
  state = 'idle';
  particles = [];
  trailParticles = [];
  impactRings = [];
  meteor = null;
  seedMarker = null;
  sectorAnimating = false;
  sectorAnimProgress = 0;

  document.getElementById('cardOverlay').classList.remove('active');
  document.getElementById('tarotCard').classList.remove('flipped', 'shrinking');
  document.getElementById('ctaButton').classList.remove('hidden');
  document.getElementById('preseedPrompt').classList.remove('hidden');
  document.getElementById('grayVeil').classList.remove('lifted');
  document.getElementById('stellaMsg').classList.remove('visible');
  document.getElementById('seedBadge').classList.remove('visible');
  document.getElementById('layerIndicator').classList.remove('visible');
  document.getElementById('screenFlash').style.opacity = '0';
  const vid = document.getElementById('effectVideo');
  vid.pause();
  vid.currentTime = 0;
  vid.classList.remove('playing');

  // Clear geo sectors + boosted lines, but preserve baseOverlays (compass, directions, planet lines)
  if (window.leafletMap) {
    const baseLayers = new Set(window.baseOverlays || []);
    window.leafletMap.eachLayer(layer => {
      if (!(layer instanceof L.TileLayer) && !baseLayers.has(layer)) {
        window.leafletMap.removeLayer(layer);
      }
    });
    window.geoSectors = [];
    window.geoSectorsVisible = false;
    window.boostedLines = null;
  }
  // (Globe reset removed)

  drawMap(false);
}

// ===== Start =====
window.addEventListener('load', init);
window.addEventListener('resize', () => {
  init();
  if (sectorAnimating) drawActiveSectors(sectorAnimProgress);
});
