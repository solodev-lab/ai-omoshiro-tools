<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effect Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A14;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  .stage {
    width: 300px;
    height: 300px;
    position: relative;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
  }
  video {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    mix-blend-mode: screen;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.2s;
  }
  video.playing {
    opacity: 1;
    animation: colorShift 1.5s ease-in-out;
  }
  @keyframes colorShift {
    0%   { filter: hue-rotate(0deg) brightness(1.2) saturate(1.5); }
    25%  { filter: hue-rotate(-30deg) brightness(1.5) saturate(1.8); }
    50%  { filter: hue-rotate(160deg) brightness(1.3) saturate(1.6); }
    75%  { filter: hue-rotate(60deg) brightness(1.4) saturate(1.4); }
    100% { filter: hue-rotate(0deg) brightness(1.0) saturate(1.0); }
  }
  button {
    padding: 12px 30px;
    background: rgba(201, 168, 76, 0.2);
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 25px;
    color: #C9A84C;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 2px;
  }
  button:hover { background: rgba(201, 168, 76, 0.3); }
</style>
</head>
<body>
  <div class="stage">
    <video id="vid" muted playsinline preload="auto" src="effect_impact.mp4"></video>
  </div>
  <button onclick="playEffect()">PLAY EFFECT</button>
<script>
function playEffect() {
  const vid = document.getElementById('vid');
  vid.currentTime = 0;
  vid.playbackRate = 3.0;
  vid.classList.remove('playing');
  void vid.offsetWidth; // force reflow
  vid.classList.add('playing');
  vid.play();
  vid.onended = () => vid.classList.remove('playing');
}
</script>
</body>
</html>
