<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Solara - Tarot Draw Mockup</title>
<link rel="stylesheet" href="shared/styles.css">
<script src="shared/icons.js?v=2"></script>
<script src="shared/nav.js?v=2"></script>
<script src="shared/vibe.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: #E8E0D0;
    font-family: var(--font-body);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    margin: 0; padding: 0;
  }

  .phone-frame {
    width: 100%;
    height: 100vh;
    background: var(--bg-deep);
    position: relative;
    overflow: hidden;
  }

  .status-bar {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #666;
    letter-spacing: 1px;
    z-index: 100;
    background: #0A0A14;
  }

  /* ===== Inner tab: Draw / History ===== */
  .inner-tab-nav {
    display: flex;
    height: 40px;
    background: rgba(15, 15, 30, 0.9);
    border-bottom: 1px solid rgba(201, 168, 76, 0.12);
    z-index: 90;
  }

  .inner-tab-btn {
    flex: 1;
    border: none;
    background: none;
    color: #555;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    position: relative;
    transition: color 0.3s;
  }

  .inner-tab-btn.active { color: #C9A84C; }

  .inner-tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    width: 60%;
    height: 2px;
    background: #C9A84C;
    border-radius: 1px;
  }

  /* ===== Content area ===== */
  .content-area {
    position: absolute;
    top: 90px;
    left: 0; right: 0;
    bottom: 80px;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }
  .content-area::-webkit-scrollbar { display: none; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ===== Draw panel ===== */
  .draw-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 20px 30px;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  /* ===== Location selector ===== */
  .location-selector {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    width: 100%;
  }

  .loc-btn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 10px;
    background: rgba(15, 15, 30, 0.5);
    color: #777;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s;
    line-height: 1.3;
  }

  .loc-btn.active {
    border-color: #C9A84C;
    color: #C9A84C;
    background: rgba(201, 168, 76, 0.08);
  }

  .loc-emoji { display: block; font-size: 16px; margin-bottom: 2px; }

  .custom-loc-input {
    width: 100%;
    margin-bottom: 16px;
    display: none;
  }

  .custom-loc-input.visible { display: block; }

  .input-field {
    width: 100%;
    padding: 10px 14px;
    background: rgba(15, 15, 30, 0.8);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 10px;
    color: #E8E0D0;
    font-size: 13px;
    outline: none;
    transition: border-color 0.3s;
  }

  .input-field:focus { border-color: rgba(201, 168, 76, 0.5); }

  /* ===== Tarot Reading Result ===== */
  .tarot-reading-panel {
    display: none;
    width: 100%;
    margin-top: 16px;
    padding: 18px 16px;
    background: rgba(15, 15, 30, 0.6);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 16px;
    animation: readingFadeIn 0.8s ease-out;
  }
  .tarot-reading-panel.visible { display: block; }
  @keyframes readingFadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .reading-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .reading-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(201, 168, 76, 0.12);
    border: 1px solid rgba(201, 168, 76, 0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .reading-title { font-size: 13px; font-weight: 700; color: #C9A84C; letter-spacing: 1.5px; }
  .reading-body {
    font-size: 13px; line-height: 1.85; color: rgba(232, 224, 208, 0.85);
    margin-bottom: 14px;
  }
  .reading-advice {
    padding: 12px 14px; border-radius: 12px;
    background: rgba(201, 168, 76, 0.06);
    border: 1px solid rgba(201, 168, 76, 0.15);
    font-size: 12px; line-height: 1.7; color: #C9A84C;
  }
  .reading-typing { display: inline; }
  .reading-typing::after {
    content: '▋'; animation: blink 0.8s step-end infinite; color: #C9A84C;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ===== Mood Input ===== */
  .mood-input-wrap {
    width: 100%;
    margin-bottom: 16px;
    padding: 14px 16px;
    background: rgba(15, 15, 30, 0.5);
    border: 1px solid rgba(201, 168, 76, 0.15);
    border-radius: 14px;
  }
  .mood-input-label {
    font-size: 10px; font-weight: 700; color: #C9A84C;
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px;
  }
  .mood-slider-row {
    display: flex; align-items: center; gap: 12px;
  }
  .mood-emoji-left, .mood-emoji-right { font-size: 18px; flex-shrink: 0; }
  .mood-range-wrap { flex: 1; position: relative; }
  .mood-range {
    -webkit-appearance: none; width: 100%; height: 4px;
    border-radius: 2px; outline: none; cursor: pointer;
    background: linear-gradient(90deg, #1A2980, #26D0CE, #F9D976);
  }
  .mood-range::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: linear-gradient(135deg, #F9D976, #F6BD60);
    box-shadow: 0 0 10px rgba(249,217,118,0.4); cursor: grab;
  }
  .mood-range::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #F9D976, #F6BD60);
    box-shadow: 0 0 10px rgba(249,217,118,0.4); cursor: grab;
  }
  .mood-val-display {
    display: flex; justify-content: space-between; align-items: center; margin-top: 8px;
  }
  .mood-val-num { font-size: 18px; font-weight: 700; color: #E8E0D0; }
  .mood-val-desc { font-size: 12px; color: #888; }

  /* ===== 3D Card ===== */
  .card-scene {
    width: 200px;
    height: 320px;
    perspective: 800px;
    margin-bottom: 16px;
  }

  .card-3d {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-3d.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    overflow: hidden;
  }

  /* Card back */
  .card-back {
    background: linear-gradient(135deg, #1a1a3e, #0d0d2b);
    border: 2px solid #C9A84C;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card-back-pattern {
    width: 160px;
    height: 260px;
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(ellipse at center, rgba(107, 92, 231, 0.08) 0%, transparent 70%);
  }

  .card-back-symbol {
    font-size: 48px;
    opacity: 0.6;
    animation: cardPulse 3s ease-in-out infinite;
  }

  .card-back-corners {
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201, 168, 76, 0.15);
    border-radius: 4px;
  }

  .card-back-star {
    position: absolute;
    font-size: 10px;
    color: #C9A84C;
    opacity: 0.3;
  }
  .card-back-star:nth-child(3) { top: 4px; left: 4px; }
  .card-back-star:nth-child(4) { top: 4px; right: 4px; }
  .card-back-star:nth-child(5) { bottom: 4px; left: 4px; }
  .card-back-star:nth-child(6) { bottom: 4px; right: 4px; }

  @keyframes cardPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  /* Card front */
  .card-front {
    background: linear-gradient(180deg, #1a1a3e 0%, #0d0d2b 100%);
    border: 2px solid #C9A84C;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card-element-badge {
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #aaa;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .card-emoji { font-size: 56px; margin-bottom: 12px; filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.4)); }
  .card-name-en { font-size: 14px; color: #C9A84C; letter-spacing: 2px; font-weight: 600; margin-bottom: 4px; text-align: center; }
  .card-name-jp { font-size: 18px; color: #E8E0D0; font-weight: 300; margin-bottom: 8px; }
  .card-keyword { font-size: 13px; color: #999; font-style: italic; }

  .card-planet-line {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #888;
  }

  .tap-hint {
    font-size: 11px;
    color: #555;
    margin-bottom: 16px;
    transition: opacity 0.3s;
    height: 16px;
  }
  .tap-hint.hidden { opacity: 0; }

  .drawn-msg {
    font-size: 13px;
    color: #666;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
    text-align: center;
    min-height: 20px;
  }

  /* ===== Result panel ===== */
  .result-panel {
    width: 100%;
    background: rgba(15, 15, 30, 0.6);
    border: 1px solid rgba(201, 168, 76, 0.15);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    display: none;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease;
  }

  .result-panel.visible { display: block; opacity: 1; transform: translateY(0); }

  .result-title { font-size: 11px; color: #666; letter-spacing: 1.5px; margin-bottom: 12px; }

  .boost-direction { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }

  .compass-mini {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 1.5px solid rgba(201, 168, 76, 0.3);
    position: relative;
    flex-shrink: 0;
  }

  .compass-needle {
    position: absolute;
    width: 2px; height: 24px;
    background: #C9A84C;
    left: 50%; top: 8px;
    transform-origin: bottom center;
    border-radius: 1px;
    box-shadow: 0 0 8px rgba(201, 168, 76, 0.5);
  }

  .compass-labels { position: absolute; inset: 0; font-size: 7px; color: #666; }
  .compass-labels span { position: absolute; }
  .cl-n { top: 2px; left: 50%; transform: translateX(-50%); }
  .cl-e { right: 3px; top: 50%; transform: translateY(-50%); }
  .cl-s { bottom: 2px; left: 50%; transform: translateX(-50%); }
  .cl-w { left: 3px; top: 50%; transform: translateY(-50%); }

  .boost-label { font-size: 20px; font-weight: 600; color: #C9A84C; margin-bottom: 4px; }
  .boost-desc { font-size: 12px; color: #999; line-height: 1.5; }

  .planet-boost-list { display: flex; flex-wrap: wrap; gap: 8px; }

  .planet-badge {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px;
    background: rgba(201, 168, 76, 0.08);
    border: 1px solid rgba(201, 168, 76, 0.2);
    font-size: 11px; color: #C9A84C;
  }

  /* ===== Stella message ===== */
  .stella-msg {
    width: 100%;
    background: rgba(15, 15, 30, 0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(201, 168, 76, 0.1);
    border-radius: 14px;
    padding: 16px;
    opacity: 0;
    transition: opacity 0.6s;
  }
  .stella-msg.visible { opacity: 1; }
  .stella-label { font-size: 10px; color: #C9A84C; letter-spacing: 1px; margin-bottom: 6px; }
  .stella-text { font-size: 13px; color: #ccc; line-height: 1.6; }

  /* ===== Apply to Map button ===== */
  .apply-map-btn {
    display: none;
    width: 100%;
    margin-top: 16px;
    padding: 14px 20px;
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.15), rgba(107, 92, 231, 0.1));
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 30px;
    color: #C9A84C;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .apply-map-btn.visible { display: block; animation: applyBtnAppear 0.6s ease forwards; }
  .apply-map-btn:hover {
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.25), rgba(107, 92, 231, 0.15));
    box-shadow: 0 0 25px rgba(201, 168, 76, 0.3), 0 0 50px rgba(107, 92, 231, 0.1);
    transform: translateY(-1px);
  }
  .apply-map-btn:active { transform: translateY(0); }
  .apply-map-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.15), transparent);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
  }
  @keyframes applyBtnAppear {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== History panel ===== */
  .history-panel { padding: 16px 16px 30px; }

  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: #444;
    font-size: 13px;
    line-height: 1.8;
  }

  .history-card {
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    border-left: 3px solid #C9A84C;
    background: rgba(15, 15, 30, 0.5);
  }

  .history-card[data-element="fire"]  { border-left-color: #FF6B35; }
  .history-card[data-element="water"] { border-left-color: #4169E1; }
  .history-card[data-element="air"]   { border-left-color: #87CEEB; }
  .history-card[data-element="earth"] { border-left-color: #2E8B57; }

  .history-card-main {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .history-card-main:hover { background: rgba(255,255,255,0.02); }

  .history-card-emoji {
    font-size: 28px;
    width: 40px;
    text-align: center;
    flex-shrink: 0;
  }

  .history-card-info { flex: 1; min-width: 0; }

  .history-card-name {
    font-size: 14px;
    color: #E8E0D0;
    margin-bottom: 2px;
    font-weight: 500;
  }

  .history-card-keyword {
    font-size: 11px;
    color: #999;
    font-style: italic;
    margin-bottom: 4px;
  }

  .history-card-meta {
    font-size: 10px;
    color: #555;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .history-card-chevron {
    color: #555;
    font-size: 14px;
    flex-shrink: 0;
    transition: transform 0.3s;
    width: 20px;
    text-align: center;
  }

  .history-card.expanded .history-card-chevron { transform: rotate(180deg); }

  /* Expandable detail */
  .history-card-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.3s ease;
    padding: 0 14px;
    background: rgba(10, 10, 20, 0.4);
  }

  .history-card.expanded .history-card-detail {
    max-height: 400px;
    padding: 14px;
  }

  .detail-boost-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .detail-boost-dir {
    font-size: 18px;
    font-weight: 600;
    color: #C9A84C;
  }

  .detail-boost-text {
    font-size: 11px;
    color: #999;
  }

  .detail-planets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .detail-planet-tag {
    padding: 3px 8px;
    border-radius: 12px;
    background: rgba(201, 168, 76, 0.06);
    border: 1px solid rgba(201, 168, 76, 0.15);
    font-size: 10px;
    color: #C9A84C;
  }

  /* Synchronicity input */
  .sync-section {
    border-top: 1px solid rgba(255,255,255,0.04);
    padding-top: 10px;
  }

  .sync-label {
    font-size: 10px;
    color: #666;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .sync-input {
    width: 100%;
    padding: 8px 10px;
    background: rgba(15, 15, 30, 0.6);
    border: 1px solid rgba(201, 168, 76, 0.12);
    border-radius: 8px;
    color: #E8E0D0;
    font-size: 12px;
    outline: none;
    resize: none;
    min-height: 50px;
    transition: border-color 0.3s;
    font-family: inherit;
  }

  .sync-input:focus { border-color: rgba(201, 168, 76, 0.3); }

  .sync-input::placeholder { color: #444; }

  .sync-saved {
    font-size: 9px;
    color: #C9A84C;
    opacity: 0;
    transition: opacity 0.3s;
    margin-top: 4px;
    text-align: right;
  }

  .sync-saved.show { opacity: 1; }

  /* History header */
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 2px;
  }

  .history-title { font-size: 12px; color: #666; letter-spacing: 1.5px; }

  .history-clear {
    font-size: 10px;
    color: #444;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
  }
  .history-clear:hover { color: #888; }

  /* Bottom nav — styled by shared/styles.css */

  /* ===== Particle canvas ===== */
  #particleCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 200;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="phone-frame cosmic-bg">
  <div class="status-bar">S O L A R A</div>

  <!-- Inner tabs: Draw / History -->
  <div class="inner-tab-nav">
    <button class="inner-tab-btn active" data-tab="draw">&#x1f0cf; TAROT DRAW</button>
    <button class="inner-tab-btn" data-tab="history">&#x1f4dc; HISTORY</button>
  </div>

  <div class="content-area">
    <!-- ===== Draw Tab ===== -->
    <div class="tab-panel active" id="drawPanel">
      <div class="draw-panel">
        <!-- 3D Card -->
        <div class="card-scene" id="cardScene">
          <div class="card-3d" id="card3d">
            <div class="card-face card-back">
              <div class="card-back-pattern">
                <div class="card-back-symbol">&#x2728;</div>
                <div class="card-back-corners"></div>
                <span class="card-back-star">&#x2726;</span>
                <span class="card-back-star">&#x2726;</span>
                <span class="card-back-star">&#x2726;</span>
                <span class="card-back-star">&#x2726;</span>
              </div>
            </div>
            <div class="card-face card-front" id="cardFront">
              <div class="card-element-badge" id="cardElement"></div>
              <div class="card-emoji" id="cardEmoji"></div>
              <div class="card-name-en" id="cardNameEn"></div>
              <div class="card-name-jp" id="cardNameJp"></div>
              <div class="card-keyword" id="cardKeyword"></div>
              <div class="card-planet-line" id="cardPlanet"></div>
            </div>
          </div>
        </div>

        <div class="tap-hint" id="tapHint">&#x1f446; タップしてカードを引く</div>

        <div class="drawn-msg" id="drawnMsg"></div>

        <!-- Stella -->
        <div class="stella-msg" id="stellaMsg">
          <div class="stella-label">&#x2728; Stella</div>
          <div class="stella-text" id="stellaText"></div>
        </div>

        <!-- Tarot Reading Result -->
        <div class="tarot-reading-panel" id="tarotReadingPanel">
          <div class="reading-header">
            <div class="reading-icon">🔮</div>
            <div class="reading-title">✦ TAROT READING</div>
          </div>
          <div class="reading-body" id="tarotReadingBody"></div>
          <div class="reading-advice" id="tarotReadingAdvice"></div>
        </div>

      </div>
    </div>

    <!-- ===== History Tab ===== -->
    <div class="tab-panel" id="historyPanel">
      <div class="history-panel">
        <div class="history-header">
          <div class="history-title">NATAL TAROT HISTORY</div>
          <button class="history-clear" onclick="clearHistory()">CLEAR</button>
        </div>
        <div id="historyList"></div>
      </div>
    </div>
  </div>

  <!-- Particle canvas -->

// ===== Stella Message Generator =====
function generateStellaMsg(card, planetJP) {
  var templates = [
    '『' + card.nameJP + '』が今日の種。' + card.keyword + 'のエネルギーが' + planetJP + 'を通じてあなたに届いているよ。',
    '今日のSeedは『' + card.nameJP + '』。' + planetJP + 'が' + card.keyword + 'の光を運んでいる。心を開いてみて。',
    '『' + card.nameJP + '』が目覚めた。' + planetJP + 'の力が' + card.keyword + 'を引き出している。',
    '今日は' + planetJP + 'が活性化。『' + card.nameJP + '』の' + card.keyword + 'を味方につけて。'
  ];
  var d = new Date();
  var seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  return templates[seed % templates.length];
}

var LOC_LABELS = { home: '🏠 自宅', gps: '📍 現在地', custom: '' };

// ===== State =====
var selectedLocation = 'home';
var isDrawn = false;

// ===== Helpers =====
function getToday() {
  return new Date().toISOString().split('T')[0];
}

function getNowTime() {
  return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

function getCardInfo(card) {
  var isMajor = card.id !== undefined;
  var planet = isMajor ? card.planet : SUIT_MAP[card.suit].planets[0];
  var element = isMajor ? card.element : SUIT_MAP[card.suit].element;
  var emoji = isMajor ? card.emoji : SUIT_MAP[card.suit].emoji;
  var planets = isMajor ? [planet] : SUIT_MAP[card.suit].planets;
  var ps = PLANET_SYMBOLS[planet];
  return { planet: planet, element: element, emoji: emoji, planets: planets, planetSymbol: ps };
}

// ===== Location =====
function selectLocation(loc) {
  selectedLocation = loc;
  document.querySelectorAll('.loc-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.loc === loc);
  });
  var wrap = document.getElementById('customLocWrap');
  if (wrap) wrap.classList.toggle('visible', loc === 'custom');
}

function getLocationLabel() {
  if (selectedLocation === 'custom') {
    var input = document.getElementById('customLocInput');
    return '📍 ' + (input && input.value.trim() ? input.value.trim() : '指定場所');
  }
  return LOC_LABELS[selectedLocation];
}

// ===== Card Draw =====
function initCardTap() {
  var scene = document.getElementById('cardScene');
  scene.style.cursor = 'pointer';

  scene.onclick = function() {
    if (isDrawn) return;
    isDrawn = true;

    var card = ALL_CARDS[Math.floor(Math.random() * ALL_CARDS.length)];
    var info = getCardInfo(card);

    // Populate card front
    document.getElementById('cardElement').innerHTML =
      ELEMENT_EMOJI[info.element] + ' ' + ELEMENT_NAMES[info.element] +
      ' <span style="color:#555">·</span> ' +
      (card.id !== undefined ? 'MAJOR' : card.suit.toUpperCase());
    document.getElementById('cardEmoji').textContent = info.emoji;
    document.getElementById('cardNameEn').textContent = card.displayName;
    document.getElementById('cardNameJp').textContent = card.nameJP;
    document.getElementById('cardKeyword').textContent = card.keyword;
    document.getElementById('cardPlanet').innerHTML =
      '<span style="color:' + info.planetSymbol.color + '">' +
      info.planetSymbol.symbol + '</span> ' + info.planetSymbol.nameJP + ' Line';

    // Set element border color on card front
    document.getElementById('cardFront').style.borderColor = ELEMENT_COLORS[info.element];

    // Flip
    document.getElementById('card3d').classList.add('flipped');
    document.getElementById('tapHint').classList.add('hidden');
    document.getElementById('drawnMsg').textContent = '✓ 本日のカードは引き済み';

    // Particles
    var rect = scene.getBoundingClientRect();
    var frameRect = document.querySelector('.phone-frame').getBoundingClientRect();
    spawnParticles(
      rect.left - frameRect.left + rect.width / 2,
      rect.top - frameRect.top + rect.height / 2
    );

    // Show Stella + reading after flip animation
    setTimeout(function() {
      document.getElementById('stellaText').textContent = generateStellaMsg(card, info.planetSymbol.nameJP);
      setTimeout(function() {
        document.getElementById('stellaMsg').classList.add('visible');
      }, 200);

      // Show tarot reading after stella
      setTimeout(function() {
        showTarotReading(card, info);
      }, 700);

      saveHistory(card, info);
    }, 900);
  };
}

// ===== History =====
var HISTORY_KEY = 'solara_natal_history';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch(e) { return []; }
}

function saveHistory(card, info) {
  var entry = {
    date: getToday(),
    time: getNowTime(),
    location: getLocationLabel(),
    cardName: card.displayName,
    nameJP: card.nameJP,
    keyword: card.keyword,
    emoji: info.emoji,
    element: info.element,
    planet: info.planetSymbol.nameJP,
    planetSymbol: info.planetSymbol.symbol,
    planetColor: info.planetSymbol.color,
    planets: info.planets.map(function(p) {
      return { name: PLANET_SYMBOLS[p].nameJP, symbol: PLANET_SYMBOLS[p].symbol, color: PLANET_SYMBOLS[p].color };
    }),
    stellaMsg: document.getElementById('stellaText').textContent,
    synchronicity: '',
    timestamp: Date.now()
  };
  var hist = loadHistory();
  hist.unshift(entry);
  if (hist.length > 50) hist.length = 50;
  localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
  renderHistory();
}

function renderHistory() {
  var container = document.getElementById('historyList');
  var hist = loadHistory();
  if (hist.length === 0) {
    container.innerHTML = '<div class="history-empty">まだ履歴がありません<br><br>TAROT DRAW タブでカードを引くと<br>ここに記録されます</div>';
    return;
  }
  container.innerHTML = hist.map(function(h, i) {
    return '<div class="history-card" data-element="' + h.element + '" id="hcard' + i + '">' +
      '<div class="history-card-main" onclick="toggleHistoryCard(' + i + ')">' +
        '<div class="history-card-emoji">' + h.emoji + '</div>' +
        '<div class="history-card-info">' +
          '<div class="history-card-name">' + h.nameJP + '</div>' +
          '<div class="history-card-keyword">' + h.keyword + '</div>' +
          '<div class="history-card-meta">' +
            '<span style="color:' + (ELEMENT_COLORS[h.element] || '#888') + '">' + (ELEMENT_EMOJI[h.element] || '') + ' ' + (ELEMENT_NAMES[h.element] || '') + '</span>' +
            '<span>' + h.location + '</span>' +
            '<span>' + h.date + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="history-card-chevron">&#x25BC;</div>' +
      '</div>' +
      '<div class="history-card-detail">' +
        '<div class="detail-boost-row">' +
          '<div class="detail-boost-text">' + h.planet + '(' + h.planetSymbol + ')</div>' +
        '</div>' +
        '<div class="sync-section">' +
          '<div class="sync-label">&#x1f517; SYNCHRONICITY</div>' +
          '<textarea class="sync-input" placeholder="偶然の一致や気づきをメモ..." oninput="saveSynchronicity(' + i + ', this.value)" onfocus="this.parentNode.querySelector(\'.sync-saved\').classList.remove(\'show\')">' + (h.synchronicity || '') + '</textarea>' +
          '<div class="sync-saved" id="syncSaved' + i + '">saved</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleHistoryCard(i) {
  document.getElementById('hcard' + i).classList.toggle('expanded');
}

function saveSynchronicity(index, value) {
  var hist = loadHistory();
  if (hist[index]) {
    hist[index].synchronicity = value;
    localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
    var saved = document.getElementById('syncSaved' + index);
    saved.classList.add('show');
    setTimeout(function() { saved.classList.remove('show'); }, 1500);
  }
}

function clearHistory() {
  if (!confirm('履歴をすべて削除しますか？')) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

  document.getElementById('drawnMsg').textContent = '✓ 本日のカードは引き済み';
  document.getElementById('cardScene').style.cursor = 'default';

  // Restore card front from history
  var elemKey = h.element || '';
  var elemEmoji = ELEMENT_EMOJI[elemKey] || '';
  var elemName = ELEMENT_NAMES[elemKey] || '';
  var suitLabel = (h.cardName && h.cardName.match(/^(WAND|CUP|SWORD|PENTACLE)/i))
    ? h.cardName.split(' ')[0].toUpperCase()
    : 'MAJOR';

  document.getElementById('cardElement').innerHTML =
    elemEmoji + ' ' + elemName + ' <span style="color:#555">·</span> ' + suitLabel;
  document.getElementById('cardEmoji').textContent = h.emoji || '';
  document.getElementById('cardNameEn').textContent = h.cardName || '';
  document.getElementById('cardNameJp').textContent = h.nameJP || '';
  document.getElementById('cardKeyword').textContent = h.keyword || '';
  document.getElementById('cardPlanet').innerHTML =
    '<span style="color:' + (h.planetColor || '#C9A84C') + '">' +
    (h.planetSymbol || '') + '</span> ' + (h.planet || '') + ' Line';

  if (ELEMENT_COLORS[elemKey]) {
    document.getElementById('cardFront').style.borderColor = ELEMENT_COLORS[elemKey];
  }

  // Flip card to show front (no animation)
  document.getElementById('card3d').classList.add('flipped');

  if (h.stellaMsg) {
    document.getElementById('stellaText').textContent = h.stellaMsg;
    document.getElementById('stellaMsg').classList.add('visible');
  }

  // Restore tarot reading (from AI cache or fallback)
  var cardObj = { id: h.cardId, nameJP: h.nameJP, nameEN: h.cardName, keyword: h.keyword, planet: h.planet };
  var infoObj = { element: h.element, dir: h.dir, planetSymbol: { nameJP: h.planet } };
  showTarotReading(cardObj, infoObj);
}

// ===== Particle system =====
var canvas = document.getElementById('particleCanvas');
var ctx = canvas.getContext('2d');
var particles = [];
var animRunning = false;

function resizeCanvas() {
  var frame = document.querySelector('.phone-frame');
  canvas.width = frame.offsetWidth;
  canvas.height = frame.offsetHeight;
}

function spawnParticles(cx, cy) {
  var colors = ['#C9A84C', '#FFD700', '#E8E0D0', '#6B5CE7', '#00CED1'];
  for (var i = 0; i < 40; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 4;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 1 + Math.random() * 3,
      life: 1,
      decay: 0.015 + Math.random() * 0.02
    });
  }
  if (!animRunning) { animRunning = true; animLoop(); }
}

function animLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(function(p) { return p.life > 0; });
  particles.forEach(function(p) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.03;
    p.life -= p.decay;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  if (particles.length > 0) { setTimeout(animLoop, 16); }
  else { animRunning = false; }
}

var TAROT_API_URL = 'http://127.0.0.1:3915/api/tarot-reading';

function getTarotCacheKey(card) {
  var d = new Date();
  var ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  var cid = card.id !== undefined ? card.id : (card.nameEN || 'unknown');
  return 'tarot_ai_reading_' + cid + '_' + ds;
}

function showTarotReading(card, info) {
  var panel = document.getElementById('tarotReadingPanel');
  var body = document.getElementById('tarotReadingBody');
  var advice = document.getElementById('tarotReadingAdvice');
  if (!panel || !body) return;

  // Check cache
  var cacheKey = getTarotCacheKey(card);
  var cached = null;
  try { cached = JSON.parse(localStorage.getItem(cacheKey)); } catch(e) {}
  if (cached && cached.reading) {
    body.textContent = cached.reading;
    advice.textContent = cached.advice || '';
    panel.classList.add('visible');
    return;
  }

  // Loading indicator
  body.innerHTML = '<span class="reading-typing" id="readingTyping">✦ 星を読み解いています...</span>';
  advice.textContent = '';
  panel.classList.add('visible');

  // Get mood value
  var mood = 0;
  try { mood = parseFloat(localStorage.getItem('solara_mood') || '0'); } catch(e) {}

  var today = new Date();
  var dateStr = today.getFullYear() + '/' + (today.getMonth() + 1) + '/' + today.getDate();

  var payload = {
    nameJP: card.nameJP || card.displayName || '',
    nameEN: card.nameEN || card.displayName || '',
    keyword: card.keyword || '',
    element: info.element || '',
    planet: card.planet || '',
    mood: mood,
    date: dateStr,
    reversed: false
  };

  fetch(TAROT_API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(r) {
    if (!r.ok) throw new Error('API error: ' + r.status);
    return r.json();
  })
  .then(function(data) {
    if (data.error) throw new Error(data.error);
    try { localStorage.setItem(cacheKey, JSON.stringify(data)); } catch(e) {}
    typewriteReading(panel, body, advice, data.reading || '', data.advice || '');
  })
  .catch(function(err) {
    console.warn('Tarot API fallback:', err.message);
    showFallbackReading(card, info, panel, body, advice);
  });
}

function typewriteReading(panel, body, advice, text, adviceText) {
  body.innerHTML = '<span class="reading-typing" id="readingTyping"></span>';
  advice.textContent = '';
  panel.classList.add('visible');

  var typingEl = document.getElementById('readingTyping');
  var idx = 0;
  var timer = setInterval(function() {
    if (idx < text.length) {
      typingEl.textContent += text[idx];
      idx++;
    } else {
      clearInterval(timer);
      typingEl.classList.remove('reading-typing');
      setTimeout(function() { advice.textContent = adviceText; }, 300);
    }
  }, 25);
}

function showFallbackReading(card, info, panel, body, advice) {
  var element = info.element || 'fire';
  var readings = TAROT_READINGS[element] || TAROT_READINGS.fire;
  var text = readings[Math.floor(Math.random() * readings.length)];
  text = text.replace(/\{card\}/g, card.nameJP || card.displayName || card.nameEN);
  text = text.replace(/\{keyword\}/g, card.keyword || '変容');

  var dirLabel = info.dir ? info.dir.label : '北東';
  var adviceText = TAROT_ADVICES[Math.floor(Math.random() * TAROT_ADVICES.length)];
  adviceText = adviceText.replace(/\{dir\}/g, dirLabel);
  adviceText = adviceText.replace(/\{keyword\}/g, card.keyword || '変容');

  typewriteReading(panel, body, advice, text, adviceText);
}

// ===== Mood Slider =====
var MOOD_DESCS = [
  [-1.0, 'Deep stillness', '🌑'],
  [-0.6, 'Heavy energy', '🌫️'],
  [-0.3, 'Quiet & low', '💧'],
  [0.0, 'Neutral orbit', '〰️'],
  [0.3, 'Gentle flow', '🌊'],
  [0.6, 'Rising energy', '✨'],
  [0.9, 'Full radiance', '☀️'],
];

function getMoodDesc(v) {
  for (var i = MOOD_DESCS.length - 1; i >= 0; i--) {
    if (v >= MOOD_DESCS[i][0]) return MOOD_DESCS[i];
  }
  return MOOD_DESCS[0];
}

function updateMoodDisplay() {
  var slider = document.getElementById('moodSlider');
  if (!slider) return;
  var val = parseInt(slider.value) / 100;
  var desc = getMoodDesc(val);
  var numEl = document.getElementById('moodValNum');
  var descEl = document.getElementById('moodValDesc');
  if (numEl) numEl.textContent = (val >= 0 ? '+' : '') + val.toFixed(1);
  if (descEl) descEl.textContent = desc[2] + ' ' + desc[1];
  try { localStorage.setItem('solara_mood', JSON.stringify(val)); } catch(e) {}
}

function loadSavedMood() {
  try {
    var saved = JSON.parse(localStorage.getItem('solara_mood'));
    if (saved !== null && !isNaN(saved)) {
      var slider = document.getElementById('moodSlider');
      if (slider) {
        slider.value = Math.round(saved * 100);
        updateMoodDisplay();
      }
    }
  } catch(e) {}
}

function init() {
  resizeCanvas();
  renderHistory();
  checkTodayDraw();
  initCardTap();
  loadSavedMood();
}
