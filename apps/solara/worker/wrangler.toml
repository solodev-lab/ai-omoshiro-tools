name = "solara-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# カスタムドメイン (solodev-lab.com は Cloudflare で DNS 管理中)
# custom_domain = true で Cloudflare が DNS + SSL を全自動発行
routes = [
  { pattern = "solara-api.solodev-lab.com", custom_domain = true }
]

# workers.dev サブドメイン も有効化 (デバッグ用 fallback)
workers_dev = true

[vars]
# GEMINI_API_KEY は wrangler secret put GEMINI_API_KEY で設定
# GOOGLE_PLACES_KEY は wrangler secret put GOOGLE_PLACES_KEY で設定
