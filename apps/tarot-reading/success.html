<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIタロット占い - 5枚引き鑑定結果</title>

    <!-- AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1896365115623823" crossorigin="anonymous"></script>

    <!-- Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JX7SCK9ECB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-JX7SCK9ECB');

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="../../" class="home-btn" style="display:inline-block;margin:8px 0 0;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#999;text-decoration:none;font-size:0.8rem;transition:all 0.2s;"
           onmouseover="this.style.color='#9b59b6';this.style.borderColor='#9b59b6'"
           onmouseout="this.style.color='#999';this.style.borderColor='rgba(255,255,255,0.15)'">
            &lt; ツール一覧に戻る
        </a>

        <header>
            <h1>🔮 AIタロット占い</h1>
            <p class="subtitle">5枚引き - ケルト十字簡易版</p>
        </header>

        <main>
            <!-- カードシャッフルセクション -->
            <section class="shuffle-section" id="shuffleSection">
                <h2 style="font-size:1.1rem;color:#c89cf5;margin-bottom:8px;" id="shuffleTitle">決済完了！カードを5枚選んでください</h2>
                <div class="shuffle-area" id="shuffleArea"></div>
                <p class="shuffle-instruction" id="shuffleInstruction">カードをタップして選んでください</p>
                <p class="shuffle-status" id="shuffleStatus">あと5枚選んでください</p>
            </section>

            <!-- 分析中セクション -->
            <section class="analyzing-section" id="analyzingSection" style="display:none;">
                <div class="crystal-ball">🔮</div>
                <p class="analyzing-text">プレミアム鑑定を実行中...</p>
                <p class="analyzing-status" id="analyzingStatus">星の配置を確認中...</p>
                <div class="analyzing-dots">
                    <span></span><span></span><span></span>
                </div>
            </section>

            <!-- 結果セクション -->
            <section class="result-section" id="resultSection" style="display:none;">
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-mode-label">🎴 5枚引き（ケルト十字簡易版）</div>
                        <div class="result-title">プレミアム鑑定結果</div>
                    </div>
                    <div class="drawn-cards" id="drawnCards"></div>
                    <div class="reading-section" id="readingSection"></div>
                    <div class="overall-reading" id="overallReading"></div>
                    <div class="advice-box" id="adviceBox"></div>
                    <div class="lucky-items" id="luckyItems"></div>
                </div>

                <div class="share-buttons">
                    <button class="share-btn share-x" id="shareXBtn">𝕏 でシェア</button>
                    <button class="share-btn share-line" id="shareLINEBtn">LINE</button>
                    <button class="share-btn share-copy" id="copyBtn">📋 コピー</button>
                </div>

                <a href="./" class="retry-btn" style="text-decoration:none;text-align:center;display:block;">🔮 トップに戻る</a>
            </section>

            <!-- エラーセクション -->
            <section id="errorSection" style="display:none;text-align:center;padding:40px 20px;">
                <p style="font-size:3rem;margin-bottom:16px;">⚠️</p>
                <p style="color:#e74c3c;font-size:1.1rem;margin-bottom:12px;" id="errorMessage">決済の検証に失敗しました</p>
                <a href="./" style="color:#9b59b6;text-decoration:underline;">タロット占いトップに戻る</a>
            </section>
        </main>

        <footer>
            <p>※ エンタメ目的の占いです。重要な判断にはご自身の意思を優先してください。</p>
            <p class="copyright">© 2026 SoloDev Lab</p>
            <div class="footer-nav" style="margin-top:12px;font-size:0.75rem;">
                <a href="../../index.html" style="color:#888;text-decoration:none;margin:0 6px;">トップ</a>
                <a href="../../privacy.html" style="color:#888;text-decoration:none;margin:0 6px;">プライバシーポリシー</a>
                <a href="../../contact.html" style="color:#888;text-decoration:none;margin:0 6px;">お問い合わせ</a>
            </div>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script src="cards.js"></script>
    <script>
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:8787'
        : 'https://ai-omoshiro-api.kojifo369.workers.dev';

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');

        if (!sessionId) {
            showError('セッションIDが見つかりません。');
            return;
        }

        // DOM
        const shuffleSection = document.getElementById('shuffleSection');
        const analyzingSection = document.getElementById('analyzingSection');
        const resultSection = document.getElementById('resultSection');
        const shuffleArea = document.getElementById('shuffleArea');
        const shuffleStatus = document.getElementById('shuffleStatus');
        const shuffleInstruction = document.getElementById('shuffleInstruction');
        const analyzingStatus = document.getElementById('analyzingStatus');
        const drawnCards = document.getElementById('drawnCards');
        const readingSection = document.getElementById('readingSection');
        const overallReading = document.getElementById('overallReading');
        const adviceBox = document.getElementById('adviceBox');
        const luckyItems = document.getElementById('luckyItems');
        const toast = document.getElementById('toast');

        let selectedCards = [];
        const requiredCards = 5;
        const shuffledDeck = [...ALL_CARDS].sort(() => Math.random() - 0.5);

        renderShuffleCards();

        function renderShuffleCards() {
            shuffleArea.innerHTML = '';
            const totalCards = 12;
            const areaWidth = shuffleArea.offsetWidth || 360;
            const areaHeight = shuffleArea.offsetHeight || 240;
            const cardW = window.innerWidth <= 600 ? 65 : 80;
            const cardH = window.innerWidth <= 600 ? 100 : 120;

            for (let i = 0; i < totalCards; i++) {
                const card = document.createElement('div');
                card.className = 'tarot-card-back';
                card.dataset.index = i;

                const angle = (i - totalCards / 2) * 10;
                const centerX = areaWidth / 2 - cardW / 2;
                const centerY = areaHeight / 2 - cardH / 2 + 20;
                const radius = 130;
                const rad = (angle * Math.PI) / 180;
                const x = centerX + Math.sin(rad) * radius;
                const y = centerY - Math.cos(rad) * (radius * 0.3) + Math.abs(Math.sin(rad)) * 30;

                card.style.left = x + 'px';
                card.style.top = y + 'px';
                card.style.transform = `rotate(${angle}deg)`;
                card.style.zIndex = i;
                card.style.opacity = '0';
                card.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                setTimeout(() => { card.style.opacity = '1'; }, i * 60);

                card.addEventListener('click', () => selectCard(card, i));
                shuffleArea.appendChild(card);
            }
        }

        function selectCard(cardEl, index) {
            if (cardEl.classList.contains('selected')) return;
            if (selectedCards.length >= requiredCards) return;

            cardEl.classList.add('selected');

            const deckIndex = index % shuffledDeck.length;
            const cardData = shuffledDeck[deckIndex];
            const isReversed = Math.random() < 0.4;

            selectedCards.push({
                ...cardData,
                isReversed,
                meaning: isReversed ? cardData.reversed : cardData.upright
            });

            shuffleStatus.textContent = selectedCards.length < requiredCards
                ? `あと${requiredCards - selectedCards.length}枚選んでください`
                : '全てのカードが選ばれました！';

            if (selectedCards.length >= requiredCards) {
                shuffleInstruction.textContent = 'プレミアム鑑定を開始します...';
                setTimeout(() => startAnalyzing(), 800);
            }
        }

        function startAnalyzing() {
            shuffleSection.style.display = 'none';
            analyzingSection.style.display = 'block';

            const statuses = [
                '決済を確認中...',
                '星の配置を確認中...',
                'カードの深層を読み解いています...',
                '5枚のカードの関係性を分析中...',
                '運命の糸を紡いでいます...',
                'プレミアム鑑定をまとめています...'
            ];

            const cardsPayload = selectedCards.map(c => ({
                name: c.name,
                isReversed: c.isReversed,
                meaning: c.meaning
            }));

            const aiPromise = fetch(API_URL + '/api/stripe/verify-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, cards: cardsPayload })
            }).then(r => {
                if (!r.ok) throw new Error('Verification failed');
                return r.json();
            }).then(json => {
                if (!json.success) throw new Error('Invalid response');
                return json.data;
            });

            let i = 0;
            const interval = setInterval(() => {
                if (i < statuses.length) {
                    analyzingStatus.textContent = statuses[i];
                }
                if (i >= statuses.length) {
                    clearInterval(interval);
                    aiPromise.then(data => {
                        setTimeout(() => showResult(data), 500);
                    }).catch(err => {
                        console.error('Verify error:', err);
                        showError('鑑定の生成に失敗しました。お手数ですが、お問い合わせください。');
                    });
                }
                i++;
            }, 800);
        }

        function showResult(aiData) {
            analyzingSection.style.display = 'none';
            resultSection.style.display = 'block';

            // カード表示
            drawnCards.innerHTML = '';
            selectedCards.forEach((card, i) => {
                const pos = FIVE_CARD_POSITIONS[i];
                const div = document.createElement('div');
                div.className = 'drawn-card';
                div.style.animationDelay = (i * 0.15) + 's';
                div.innerHTML = `
                    <div class="position-label">${pos.icon} ${pos.name}</div>
                    <div class="card-emoji">${card.emoji}</div>
                    <div class="card-name">${card.name}</div>
                    <span class="card-direction ${card.isReversed ? 'reversed' : 'upright'}">
                        ${card.isReversed ? '逆位置 ↓' : '正位置 ↑'}
                    </span>
                    <div class="card-meaning">${card.meaning}</div>
                `;
                drawnCards.appendChild(div);
            });

            // AI鑑定
            readingSection.innerHTML = '';
            if (aiData) {
                const blocks = [
                    { title: '🔵 現在の状況', text: aiData.current },
                    { title: '🔴 障害・課題', text: aiData.obstacle },
                    { title: '⏪ 過去の影響', text: aiData.past_influence },
                    { title: '⏩ 未来の可能性', text: aiData.future_potential },
                    { title: '⭐ 最終結論', text: aiData.conclusion }
                ];
                blocks.forEach(b => {
                    if (b.text) {
                        readingSection.innerHTML += `
                            <div class="reading-block">
                                <div class="block-title">${b.title}</div>
                                <div class="block-text">${b.text}</div>
                            </div>
                        `;
                    }
                });
            }

            const overall = aiData?.overall || 'カードがあなたに大切なメッセージを伝えています。';
            overallReading.innerHTML = `
                <div class="overall-title">✨ 総合鑑定</div>
                <div class="overall-text">${overall}</div>
            `;

            const advice = aiData?.advice || '直感を信じて、一歩踏み出してみましょう。';
            adviceBox.innerHTML = `
                <div class="advice-label">💡 具体的なアクションアドバイス</div>
                <div class="advice-text">${advice}</div>
            `;

            luckyItems.innerHTML = '';
            if (aiData?.lucky_item) {
                luckyItems.innerHTML = `
                    <div class="lucky-item">
                        <div class="lucky-label">ラッキーアイテム</div>
                        <div class="lucky-value">${aiData.lucky_item}</div>
                    </div>
                `;
            }
        }

        // シェア
        function getShareText() {
            const card = selectedCards[0];
            return `🔮 AIタロット占い（5枚引きプレミアム）\n${card.emoji} ${card.name}（${card.isReversed ? '逆位置' : '正位置'}）\n`;
        }

        document.getElementById('shareXBtn').addEventListener('click', () => {
            const text = getShareText();
            const url = encodeURIComponent(window.location.origin + '/apps/tarot-reading/');
            window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}&url=${url}`, '_blank');
        });

        document.getElementById('shareLINEBtn').addEventListener('click', () => {
            const text = getShareText();
            const appUrl = window.location.origin + '/apps/tarot-reading/';
            window.open(`https://line.me/R/msg/text/${encodeURIComponent(text + '\n' + appUrl)}`, '_blank');
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const text = getShareText() + window.location.origin + '/apps/tarot-reading/';
            navigator.clipboard.writeText(text).then(() => showToast('コピーしました！'));
        });

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    });

    function showError(msg) {
        document.getElementById('shuffleSection').style.display = 'none';
        document.getElementById('analyzingSection').style.display = 'none';
        const errorSection = document.getElementById('errorSection');
        errorSection.style.display = 'block';
        document.getElementById('errorMessage').textContent = msg;
    }
    </script>
</body>
</html>
