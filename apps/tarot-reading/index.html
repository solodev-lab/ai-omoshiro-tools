<body>
    <div class="container">
        <!-- ホームボタン -->
        <a href="../../" class="home-btn" style="display:inline-block;margin:8px 0 0;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#999;text-decoration:none;font-size:0.8rem;transition:all 0.2s;"
           onmouseover="this.style.color='#9b59b6';this.style.borderColor='#9b59b6'"
           onmouseout="this.style.color='#999';this.style.borderColor='rgba(255,255,255,0.15)'">
            &lt; ツール一覧に戻る
        </a>

        <header>
            <h1>🔮 AIタロット占い</h1>
            <p class="subtitle">神秘のカードがあなたの運命を読み解く</p>
        </header>

        <main>
            <!-- モード選択セクション -->
            <section class="mode-section" id="modeSection">
                <div class="mode-card">
                    <p style="font-size:3rem;margin-bottom:12px;">🔮✨🃏</p>
                    <p style="color:#ccc;font-size:0.9rem;margin-bottom:20px;">
                        78枚のタロットカードから<br>AIがあなただけの鑑定を行います
                    </p>
                    <div class="mode-grid">
                        <button class="mode-btn" data-mode="one-card">
                            <div class="mode-emoji">🎴</div>
                            <div class="mode-name">1枚引き（ワンオラクル）</div>
                            <div class="mode-desc">今日の運勢やYes/Noをシンプルに占う</div>
                        </button>
                        <button class="mode-btn" data-mode="three-card">
                            <div class="mode-emoji">🎴🎴🎴</div>
                            <div class="mode-name">3枚引き（過去・現在・未来）</div>
                            <div class="mode-desc">時間軸に沿って流れを読み解く</div>
                        </button>
                        <button class="mode-btn premium" data-mode="five-card">
                            <div class="mode-emoji">🎴🎴🎴🎴🎴</div>
                            <div class="mode-name">5枚引き（ケルト十字簡易版）<span class="price-tag">¥300</span></div>
                            <div class="mode-desc">現状・障害・過去・未来・結論を徹底鑑定</div>
                        </button>
                    </div>
                </div>
            </section>

            <!-- カードシャッフルセクション -->
            <section class="shuffle-section" id="shuffleSection" style="display:none;">
                <h2 style="font-size:1.1rem;color:#c89cf5;margin-bottom:8px;" id="shuffleTitle">カードをシャッフル中...</h2>
                <div class="shuffle-area" id="shuffleArea"></div>
                <div id="cardSlots" style="display:none;margin:20px auto 0;max-width:400px;justify-content:center;gap:16px;">
                    <div style="text-align:center;flex:1;">
                        <div style="font-size:0.8rem;color:#c89cf5;margin-bottom:8px;font-weight:700;">⏪ 過去</div>
                        <div id="slotCard0" style="width:80px;height:120px;margin:0 auto;border:2px dashed rgba(155,89,182,0.4);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);transition:all 0.4s ease;"></div>
                    </div>
                    <div style="text-align:center;flex:1;">
                        <div style="font-size:0.8rem;color:#c89cf5;margin-bottom:8px;font-weight:700;">🔵 現在</div>
                        <div id="slotCard1" style="width:80px;height:120px;margin:0 auto;border:2px dashed rgba(155,89,182,0.4);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);transition:all 0.4s ease;"></div>
                    </div>
                    <div style="text-align:center;flex:1;">
                        <div style="font-size:0.8rem;color:#c89cf5;margin-bottom:8px;font-weight:700;">⏩ 未来</div>
                        <div id="slotCard2" style="width:80px;height:120px;margin:0 auto;border:2px dashed rgba(155,89,182,0.4);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);transition:all 0.4s ease;"></div>
                    </div>
                </div>
                <!-- 5枚引き用カード置き場（ケルト十字簡易版） -->
                <div id="fiveCardSlots" style="display:none;margin:20px auto 0;max-width:360px;">
                    <!-- 上段: 最終結論 -->
                    <div style="text-align:center;margin-bottom:12px;">
                        <div style="font-size:0.75rem;color:#f1c40f;margin-bottom:6px;font-weight:700;">⭐ 最終結論</div>
                        <div id="slotFive4" style="width:72px;height:108px;margin:0 auto;border:2px dashed rgba(241,196,15,0.3);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);transition:all 0.4s ease;"></div>
                    </div>
                    <!-- 中段: 過去 / 現在+障害 / 未来 -->
                    <div style="display:flex;justify-content:center;align-items:center;gap:12px;">
                        <div style="text-align:center;">
                            <div style="font-size:0.75rem;color:#c89cf5;margin-bottom:6px;font-weight:700;">⏪ 過去</div>
                            <div id="slotFive2" style="width:72px;height:108px;margin:0 auto;border:2px dashed rgba(155,89,182,0.4);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);transition:all 0.4s ease;"></div>
                        </div>
                        <!-- 中央: 現在の上に障害を重ねる -->
                        <div style="text-align:center;position:relative;">
                            <div style="font-size:0.75rem;color:#c89cf5;margin-bottom:6px;font-weight:700;">🔵 現在 / 🔴 障害</div>
                            <div style="position:relative;width:90px;height:120px;margin:0 auto;">
                                <div id="slotFive0" style="position:absolute;left:5px;top:6px;width:72px;height:108px;border:2px dashed rgba(155,89,182,0.4);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);transition:all 0.4s ease;z-index:1;"></div>
                                <div id="slotFive1" style="position:absolute;left:12px;top:0;width:72px;height:108px;border:2px dashed rgba(231,76,60,0.4);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);transition:all 0.4s ease;z-index:2;transform:rotate(-12deg);"></div>
                            </div>
                        </div>
                        <div style="text-align:center;">
                            <div style="font-size:0.75rem;color:#c89cf5;margin-bottom:6px;font-weight:700;">⏩ 未来</div>
                            <div id="slotFive3" style="width:72px;height:108px;margin:0 auto;border:2px dashed rgba(155,89,182,0.4);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);transition:all 0.4s ease;"></div>
                        </div>
                    </div>
                </div>
                <p class="shuffle-instruction" id="shuffleInstruction">カードをタップして選んでください</p>
                <p class="shuffle-status" id="shuffleStatus"></p>
            </section>

            <!-- 分析中セクション -->
            <section class="analyzing-section" id="analyzingSection" style="display:none;">
                <div class="crystal-ball">🔮</div>
                <p class="analyzing-text">カードの意味を読み解いています...</p>
                <p class="analyzing-status" id="analyzingStatus">星の配置を確認中...</p>
                <div class="analyzing-dots">
                    <span></span><span></span><span></span>
                </div>
            </section>

            <!-- 結果セクション -->
            <section class="result-section" id="resultSection" style="display:none;">
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-mode-label" id="resultModeLabel"></div>
                        <div class="result-title" id="resultTitle">タロット鑑定結果</div>
                    </div>

                    <!-- 引いたカード一覧 -->
                    <div class="drawn-cards" id="drawnCards"></div>

                    <!-- AI鑑定結果 -->
                    <div class="reading-section" id="readingSection"></div>

                    <!-- 総合メッセージ -->
                    <div class="overall-reading" id="overallReading"></div>

                    <!-- アドバイス -->
                    <div class="advice-box" id="adviceBox"></div>

                    <!-- ラッキーアイテム -->
                    <div class="lucky-items" id="luckyItems"></div>
                </div>

                <!-- シェアボタン -->
                <div class="share-buttons">
                    <button class="share-btn share-x" id="shareXBtn">𝕏 でシェア</button>
                    <button class="share-btn share-line" id="shareLINEBtn">LINE</button>
                    <button class="share-btn share-copy" id="copyBtn">📋 コピー</button>
                </div>

                <button class="retry-btn" id="retryBtn">🔮 もう一度占う</button>
            </section>
        </main>

        <footer>
            <p>※ 占い結果を保証することはできません。重要な判断にはご自身の意思を優先してください。</p>

                <a href="../../contact.html" style="color:#888;text-decoration:none;margin:0 6px;">お問い合わせ</a>
            </div>
        </footer>
    </div>
