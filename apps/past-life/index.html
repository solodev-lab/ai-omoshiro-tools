<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI前世診断 | あなたの前世を占います</title>
    <meta name="description" content="5つの直感的な質問に答えるだけで、AIがあなたの前世を診断。16タイプの前世からあなたの魂のルーツを明らかにします。">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JX7SCK9ECB"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JX7SCK9ECB');</script>
    <!-- OGP -->
    <meta property="og:title" content="AI前世診断 | あなたの前世は何だった？">
    <meta property="og:description" content="5つの質問であなたの前世を占います。魂の記憶を呼び覚まそう！">
    <meta property="og:image" content="https://solodev-lab.github.io/ai-omoshiro-tools/apps/past-life/ogp.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://solodev-lab.github.io/ai-omoshiro-tools/apps/past-life/ogp.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI前世診断</h1>
            <p class="subtitle">5つの質問で、あなたの前世を占います。</p>
        </header>

        <main>
            <!-- スタート画面 -->
            <section class="start-section" id="startSection">
                <div class="start-card">
                    <div class="mystical-orb">
                        <span class="orb-emoji">🔮</span>
                    </div>
                    <p class="start-desc">あなたの魂に刻まれた記憶を呼び覚まします。<br>直感を信じて、5つの質問に答えてください。</p>
                    <div class="start-types">
                        <span>🏛️</span><span>⚔️</span><span>📜</span><span>👑</span>
                        <span>🎨</span><span>🐉</span><span>🌙</span><span>🔮</span>
                    </div>
                    <button class="start-btn" id="startBtn">前世を占う 🔮</button>
                    <p class="start-note">※ 所要時間：約30秒</p>
                </div>
            </section>

            <!-- 質問セクション -->
            <section class="question-section" id="questionSection" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">1 / 5</p>

                <div class="question-card" id="questionCard">
                    <p class="question-text" id="questionText"></p>
                    <div class="choices" id="choicesContainer"></div>
                </div>
            </section>

            <!-- 分析中セクション -->
            <section class="analyzing-section" id="analyzingSection" style="display: none;">
                <div class="analyzing-card">
                    <div class="crystal-animation">🔮</div>
                    <p class="analyzing-text">前世の記憶を探索中...</p>
                    <div class="analyzing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <p class="analyzing-sub" id="analyzingStatus">魂の記憶にアクセスしています</p>
                </div>
            </section>

            <!-- 結果セクション -->
            <section class="result-section" id="resultSection" style="display: none;">
                <div class="result-card" id="resultCard">
                    <p class="result-label">あなたの前世は…</p>
                    <div class="result-type">
                        <span class="result-emoji" id="resultEmoji"></span>
                    </div>
                    <div class="rarity-badge" id="rarityBadge"></div>
                    <h2 class="result-name" id="resultName"></h2>
                    <p class="result-era" id="resultEra"></p>
                    <p class="result-description" id="resultDescription"></p>

                    <div class="result-details">
                        <div class="detail-box traits-box">
                            <h3>✨ 前世の特徴</h3>
                            <ul id="resultTraits"></ul>
                        </div>
                        <div class="detail-box lucky-box">
                            <h3>🍀 ラッキーアイテム</h3>
                            <p id="resultLuckyItem"></p>
                        </div>
                    </div>
                </div>

                <div class="action-buttons share-buttons">
                    <button class="action-btn btn-x" id="shareXBtn">𝕏 でシェア</button>
                    <button class="action-btn btn-line" id="shareLINEBtn">LINE で送る</button>
                    <button class="action-btn btn-copy" id="copyBtn">📋 コピー</button>
                </div>
                <div class="action-buttons">
                    <button class="action-btn btn-retry" id="retryBtn">🔄 もう一度占う</button>
                    <button class="action-btn btn-history" id="historyBtn">📜 診断履歴</button>
                </div>

                <!-- 履歴セクション -->
                <div class="history-section" id="historySection" style="display: none;">
                    <h3 class="history-title">📜 診断履歴</h3>
                    <div id="historyList"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>※ エンタメ目的の診断です。科学的根拠はありません。</p>
            <p class="copyright">&copy; 2026 AIおもしろツール集</p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
