<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JX7SCK9ECB"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JX7SCK9ECB');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIペット名づけ | ペットにぴったりの名前を生成</title>
    <meta name="description" content="ペットの種類と性格を選ぶだけで、ぴったりの名前をAIが提案。和名・洋名・ユニーク名まで。">
    <meta property="og:title" content="AIペット名づけ">
    <meta property="og:description" content="ペットの種類と性格からぴったりの名前を提案。和名・洋名・食べ物系・ユニーク。">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta property="og:image" content="https://solodev-lab.github.io/ai-omoshiro-tools/apps/pet-namer/ogp.png">
    <meta name="twitter:image" content="https://solodev-lab.github.io/ai-omoshiro-tools/apps/pet-namer/ogp.png">
    <meta name="twitter:title" content="AIペット名づけ">
    <meta name="twitter:description" content="ペットの種類と性格からぴったりの名前を提案。和名・洋名・食べ物系・ユニーク。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="../../" class="home-btn" style="display:inline-block;margin:8px 0 0;padding:6px 16px;border-radius:20px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#999;text-decoration:none;font-size:0.8rem;transition:all 0.2s;" onmouseover="this.style.color='#56ccf2';this.style.borderColor='#56ccf2'" onmouseout="this.style.color='#999';this.style.borderColor='rgba(255,255,255,0.15)'">< ツール一覧に戻る</a>
        <header>
            <h1>🐾 AIペット名づけ</h1>
            <p class="subtitle">大切な家族に、最高の名前を。</p>
        </header>

        <main>
            <section class="input-section">
                <div class="step">
                    <h2><span class="step-num">1</span> ペットの種類は？</h2>
                    <div class="pet-grid" id="petGrid">
                        <button class="pet-btn" data-value="犬">🐕 犬</button>
                        <button class="pet-btn" data-value="猫">🐈 猫</button>
                        <button class="pet-btn" data-value="うさぎ">🐇 うさぎ</button>
                        <button class="pet-btn" data-value="ハムスター">🐹 ハムスター</button>
                        <button class="pet-btn" data-value="鳥">🐦 鳥</button>
                        <button class="pet-btn" data-value="魚">🐟 魚</button>
                        <button class="pet-btn" data-value="爬虫類">🦎 爬虫類</button>
                        <button class="pet-btn" data-value="カメ">🐢 カメ</button>
                    </div>
                </div>

                <div class="step">
                    <h2><span class="step-num">2</span> 性格・雰囲気は？</h2>
                    <div class="vibe-grid" id="vibeGrid">
                        <button class="vibe-btn" data-value="元気">⚡ 元気いっぱい</button>
                        <button class="vibe-btn" data-value="おっとり">☁️ おっとり</button>
                        <button class="vibe-btn" data-value="甘えん坊">💕 甘えん坊</button>
                        <button class="vibe-btn" data-value="ツンデレ">😼 ツンデレ</button>
                        <button class="vibe-btn" data-value="賢い">🎓 賢い</button>
                        <button class="vibe-btn" data-value="やんちゃ">💥 やんちゃ</button>
                        <button class="vibe-btn" data-value="おとなしい">🌙 おとなしい</button>
                        <button class="vibe-btn" data-value="食いしん坊">🍖 食いしん坊</button>
                    </div>
                </div>

                <div class="step">
                    <h2><span class="step-num">3</span> 名前のテイスト</h2>
                    <div class="style-buttons" id="styleButtons">
                        <button class="style-btn" data-value="japanese">
                            <span class="style-emoji">🇯🇵</span>
                            <span class="style-label">和名</span>
                        </button>
                        <button class="style-btn" data-value="western">
                            <span class="style-emoji">🌍</span>
                            <span class="style-label">洋名</span>
                        </button>
                        <button class="style-btn" data-value="food">
                            <span class="style-emoji">🍙</span>
                            <span class="style-label">食べ物系</span>
                        </button>
                        <button class="style-btn" data-value="unique">
                            <span class="style-emoji">✨</span>
                            <span class="style-label">ユニーク</span>
                        </button>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn" disabled>
                    名前を考える 🐾
                </button>
            </section>

            <section class="result-section" id="resultSection" style="display: none;">
                <div class="result-card">
                    <div class="result-tags">
                        <span class="tag pet-tag" id="resultPet"></span>
                        <span class="tag vibe-tag" id="resultVibe"></span>
                        <span class="tag style-tag" id="resultStyle"></span>
                    </div>

                    <div class="name-showcase">
                        <div class="main-name" id="mainName"></div>
                        <div class="name-meaning" id="nameMeaning"></div>
                    </div>

                    <div class="alt-names">
                        <h3>他の候補</h3>
                        <div class="alt-list" id="altList"></div>
                    </div>

                    <div class="name-stats">
                        <div class="stat-row">
                            <span class="stat-label">呼びやすさ</span>
                            <div class="stat-bar"><div class="stat-fill call-fill" id="callFill"></div></div>
                            <span class="stat-value" id="callValue"></span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">覚えやすさ</span>
                            <div class="stat-bar"><div class="stat-fill memo-fill" id="memoFill"></div></div>
                            <span class="stat-value" id="memoValue"></span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">かわいさ</span>
                            <div class="stat-bar"><div class="stat-fill cute-fill" id="cuteFill"></div></div>
                            <span class="stat-value" id="cuteValue"></span>
                        </div>
                    </div>

                    <div class="tip" id="tipText"></div>
                </div>

                <div class="share-buttons">
                    <button class="btn-x" id="shareXBtn">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                        Xでシェア
                    </button>
                    <button class="btn-line" id="shareLINEBtn">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
                        LINEで送る
                    </button>
                    <button class="btn-copy" id="copyBtn">📋 コピー</button>
                    <button class="btn-retry" id="retryBtn">🔄 別の名前</button>
                </div>
            </section>
        </main>

        <footer>
            <p>※ 名前は飼い主さんの愛情が一番大事。AIは参考程度に。</p>
            <p class="copyright">© 2026 AIペット名づけ</p>
            <div class="footer-nav" style="margin-top:12px;font-size:0.75rem;">
                <a href="../../index.html" style="color:#888;text-decoration:none;margin:0 6px;">トップ</a>
                <a href="../../privacy.html" style="color:#888;text-decoration:none;margin:0 6px;">プライバシーポリシー</a>
                <a href="../../contact.html" style="color:#888;text-decoration:none;margin:0 6px;">お問い合わせ</a>
            </div>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script src="petnames.js"></script>
    <script src="app.js"></script>
</body>
</html>
