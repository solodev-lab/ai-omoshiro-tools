<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI性格タイプ診断 | 10問でわかるあなたの本当の性格</title>
    <meta name="description" content="たった10問の質問にAIが分析。16タイプからあなたの性格を診断します。">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JX7SCK9ECB"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JX7SCK9ECB');</script>
    <!-- OGP -->
    <meta property="og:title" content="AI性格タイプ診断 | あなたは16タイプのどれ？">
    <meta property="og:description" content="10問の質問でAIがあなたの性格を分析。結果をシェアしよう！">
    <meta property="og:image" content="https://solodev-lab.github.io/ai-omoshiro-tools/apps/personality-diagnosis/ogp.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://solodev-lab.github.io/ai-omoshiro-tools/apps/personality-diagnosis/ogp.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 AI性格タイプ診断</h1>
            <p class="subtitle">10問の質問で、あなたの本当の性格を分析します。</p>
        </header>

        <main>
            <!-- スタート画面 -->
            <section class="start-section" id="startSection">
                <div class="start-card">
                    <p class="start-desc">AIがあなたの回答パターンを分析し、<br>16タイプの中からあなたの性格を診断します。</p>
                    <div class="start-types">
                        <span>🧠</span><span>🔬</span><span>👑</span><span>💡</span>
                        <span>🔮</span><span>🌙</span><span>🌟</span><span>🔥</span>
                        <span>📋</span><span>🛡️</span><span>⚖️</span><span>🤝</span>
                        <span>🔧</span><span>🎨</span><span>🏄</span><span>🎭</span>
                    </div>
                    <button class="start-btn" id="startBtn">診断スタート 🚀</button>
                    <p class="start-note">※ 所要時間：約1分</p>
                </div>
            </section>

            <!-- 質問セクション -->
            <section class="question-section" id="questionSection" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">1 / 10</p>

                <div class="question-card" id="questionCard">
                    <p class="question-text" id="questionText"></p>
                    <div class="choices">
                        <button class="choice-btn" id="choiceA">
                            <span class="choice-emoji" id="choiceAEmoji"></span>
                            <span class="choice-label" id="choiceALabel"></span>
                        </button>
                        <button class="choice-btn" id="choiceB">
                            <span class="choice-emoji" id="choiceBEmoji"></span>
                            <span class="choice-label" id="choiceBLabel"></span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- 分析中セクション -->
            <section class="analyzing-section" id="analyzingSection" style="display: none;">
                <div class="analyzing-card">
                    <div class="brain-animation">🧠</div>
                    <p class="analyzing-text">AIが性格を分析中...</p>
                    <div class="analyzing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <p class="analyzing-sub" id="analyzingStatus">回答パターンを解析しています</p>
                </div>
            </section>

            <!-- 結果セクション -->
            <section class="result-section" id="resultSection" style="display: none;">
                <div class="result-card" id="resultCard">
                    <p class="result-label">あなたの性格タイプは…</p>
                    <div class="result-type">
                        <span class="result-emoji" id="resultEmoji"></span>
                        <span class="result-code" id="resultCode"></span>
                    </div>
                    <h2 class="result-catchphrase" id="resultCatchphrase"></h2>
                    <p class="result-description" id="resultDescription"></p>

                    <div class="result-details">
                        <div class="detail-box strengths">
                            <h3>💪 強み</h3>
                            <ul id="resultStrengths"></ul>
                        </div>
                        <div class="detail-box weaknesses">
                            <h3>😅 弱み</h3>
                            <ul id="resultWeaknesses"></ul>
                        </div>
                    </div>

                    <div class="compatibility-box" id="compatibilityBox">
                        <h3>💕 相性の良いタイプ</h3>
                        <p id="compatibilityText"></p>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn" id="shareBtn">🐦 結果をシェア</button>
                    <button class="action-btn" id="copyBtn">📋 コピー</button>
                    <button class="action-btn" id="retryBtn">🔄 もう一度診断</button>
                </div>
            </section>
        </main>

        <footer>
            <p>※ エンタメ目的の診断です。科学的根拠はありません。</p>
            <p class="copyright">© 2026 AI性格タイプ診断</p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script src="questions.js"></script>
    <script src="types.js"></script>
    <script src="app.js"></script>
</body>
</html>
