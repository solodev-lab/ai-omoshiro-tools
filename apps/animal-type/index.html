<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI動物タイプ診断 | 7問でわかるあなたの動物タイプ</title>
    <meta name="description" content="たった7問の質問でAIがあなたの動物タイプを診断。12タイプからあなたにぴったりの動物は？">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JX7SCK9ECB"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JX7SCK9ECB');</script>
    <!-- OGP -->
    <meta property="og:title" content="AI動物タイプ診断 | あなたは何の動物？">
    <meta property="og:description" content="7問の質問でAIがあなたの動物タイプを分析。結果をシェアしよう！">
    <meta property="og:image" content="https://solodev-lab.github.io/ai-omoshiro-tools/apps/animal-type/ogp.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://solodev-lab.github.io/ai-omoshiro-tools/apps/animal-type/ogp.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐾 AI動物タイプ診断</h1>
            <p class="subtitle">7問の質問で、あなたの動物タイプを診断します。</p>
        </header>

        <main>
            <!-- スタート画面 -->
            <section class="start-section" id="startSection">
                <div class="start-card">
                    <p class="start-desc">AIがあなたの回答パターンを分析し、<br>12タイプの中からあなたの動物タイプを診断します。</p>
                    <div class="start-types">
                        <span>🐱</span><span>🐶</span><span>🦊</span><span>🐻</span>
                        <span>🦁</span><span>🐰</span><span>🦅</span><span>🐬</span>
                        <span>🦉</span><span>🐺</span><span>🐼</span><span>🦋</span>
                    </div>
                    <button class="start-btn" id="startBtn">診断スタート 🚀</button>
                    <p class="start-note">※ 所要時間：約1分</p>
                </div>
            </section>

            <!-- 質問セクション -->
            <section class="question-section" id="questionSection" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">1 / 7</p>

                <div class="question-card" id="questionCard">
                    <p class="question-text" id="questionText"></p>
                    <div class="choices" id="choicesContainer"></div>
                </div>
            </section>

            <!-- 分析中セクション -->
            <section class="analyzing-section" id="analyzingSection" style="display: none;">
                <div class="analyzing-card">
                    <div class="brain-animation">🐾</div>
                    <p class="analyzing-text">AIが動物タイプを分析中...</p>
                    <div class="analyzing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <p class="analyzing-sub" id="analyzingStatus">回答パターンを解析しています</p>
                </div>
            </section>

            <!-- 結果セクション -->
            <section class="result-section" id="resultSection" style="display: none;">
                <div class="result-card" id="resultCard">
                    <p class="result-label">あなたの動物タイプは…</p>
                    <div class="result-type">
                        <span class="result-emoji" id="resultEmoji"></span>
                    </div>
                    <h2 class="result-name" id="resultName"></h2>
                    <p class="result-subtitle" id="resultSubtitle"></p>
                    <p class="result-description" id="resultDescription"></p>

                    <div class="result-details">
                        <div class="detail-box traits-box">
                            <h3>🌟 特徴</h3>
                            <ul id="resultTraits"></ul>
                        </div>
                        <div class="detail-box advice-box">
                            <h3>💡 アドバイス</h3>
                            <p id="resultAdvice"></p>
                        </div>
                    </div>

                    <div class="compatibility-box" id="compatibilityBox">
                        <h3>💕 相性の良い動物</h3>
                        <p id="compatibilityText"></p>
                    </div>
                </div>

                <div class="action-buttons share-buttons">
                    <button class="action-btn btn-x" id="shareXBtn">𝕏 でシェア</button>
                    <button class="action-btn btn-line" id="shareLINEBtn">LINE で送る</button>
                    <button class="action-btn btn-copy" id="copyBtn">📋 コピー</button>
                </div>
                <div class="action-buttons">
                    <button class="action-btn btn-retry" id="retryBtn">🔄 もう一度診断</button>
                </div>

                <!-- 診断履歴 -->
                <div class="history-section" id="historySection" style="display: none;">
                    <h3 class="history-title">📋 診断履歴</h3>
                    <div class="history-list" id="historyList"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>※ エンタメ目的の診断です。科学的根拠はありません。</p>
            <p class="copyright">&copy; 2026 AIおもしろツール集</p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
