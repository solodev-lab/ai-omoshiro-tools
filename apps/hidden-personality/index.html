        <header>
            <h1>🎭 AI裏性格診断</h1>
            <p class="subtitle">8つの質問で、表の顔と裏の顔のギャップを暴きます。</p>
        </header>

        <main>
            <!-- スタート画面 -->
            <section class="start-section" id="startSection">
                <div class="start-card">
                    <p class="start-desc">あなたが見せている「表の顔」と<br>隠している「裏の顔」——<br>そのギャップ、AIが暴きます。</p>
                    <div class="start-emojis">
                        <span>😇</span><span>→</span><span>😈</span>
                        <span>🤡</span><span>→</span><span>🧠</span>
                        <span>💪</span><span>→</span><span>😿</span>
                        <span>😊</span><span>→</span><span>🔥</span>
                    </div>
                    <button class="start-btn" id="startBtn">診断スタート 🔮</button>
                    <p class="start-note">※ 所要時間：約1分</p>
                </div>
            </section>

            <!-- 質問セクション -->
            <section class="question-section" id="questionSection" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">1 / 8</p>

                <div class="question-card" id="questionCard">
                    <p class="question-number" id="questionNumber">Q1</p>
                    <p class="question-text" id="questionText"></p>
                    <div class="choices" id="choicesContainer"></div>
                </div>
            </section>

            <!-- 分析中セクション -->
            <section class="analyzing-section" id="analyzingSection" style="display: none;">
                <div class="analyzing-card">
                    <div class="mask-animation">🎭</div>
                    <p class="analyzing-text">AIが裏の顔を解析中...</p>
                    <div class="analyzing-dots">
                        <span></span><span></span><span></span>
                    </div>
                    <p class="analyzing-sub" id="analyzingStatus">表の顔データを収集しています</p>
                </div>
            </section>

            <!-- 結果セクション -->
            <section class="result-section" id="resultSection" style="display: none;">
                <!-- 表の顔カード -->
                <div class="flip-container" id="flipContainer">
                    <div class="flip-card" id="flipCard">
                        <div class="flip-front" id="flipFront">
                            <p class="card-label">あなたの表の顔</p>
                            <span class="card-emoji" id="frontEmoji"></span>
                            <h2 class="card-title" id="frontTitle"></h2>
                            <p class="card-desc" id="frontDesc"></p>
                        </div>
                        <div class="flip-back" id="flipBack">
                            <p class="card-label">あなたの裏の顔</p>
                            <span class="card-emoji" id="backEmoji"></span>
                            <h2 class="card-title" id="backTitle"></h2>
                            <p class="card-desc" id="backDesc"></p>
                        </div>
                    </div>
                </div>

                <button class="reveal-btn" id="revealBtn">🔮 裏の顔を暴く</button>

                <!-- ギャップメーター -->
                <div class="gap-meter" id="gapMeter" style="display: none;">
                    <h3 class="gap-label">ギャップ度</h3>
                    <div class="gap-bar">
                        <div class="gap-fill" id="gapFill"></div>
                    </div>
                    <p class="gap-score" id="gapScore"></p>
                </div>

                <!-- アドバイス -->
                <div class="advice-box" id="adviceBox" style="display: none;">
                    <h3>💬 AIからのひとこと</h3>
                    <p id="adviceText"></p>
                </div>

                <!-- AI深層分析 -->
                <div class="ai-analysis-box" id="aiAnalysisBox" style="display: none;">
                    <h3>🤖 AI深層分析</h3>
                    <p id="aiAnalysisText"></p>
                </div>

                <div class="action-buttons share-buttons" id="shareButtons" style="display: none;">
                    <button class="action-btn btn-x" id="shareXBtn">&#x1D54F; でシェア</button>
                    <button class="action-btn btn-line" id="shareLINEBtn">LINE で送る</button>
                    <button class="action-btn btn-copy" id="copyBtn">&#x1F4CB; コピー</button>
                </div>
                <div class="action-buttons" id="retryButtons" style="display: none;">
                    <button class="action-btn btn-retry" id="retryBtn">&#x1F504; もう一度診断</button>
                </div>
            </section>

            <!-- 履歴セクション -->
            <section class="history-section" id="historySection" style="display: none;">
                <h3 class="history-title">📜 診断履歴</h3>
                <div class="history-list" id="historyList"></div>
            </section>
